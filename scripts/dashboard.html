    <div class="tele-head">
      <div class="cap">Node telemetry</div>
      <div class="sub">RAM · SSH · auto 2 s</div>
    </div>
  `;
}

// LED bar segments based on usage %
// 0-50: blue, 60-70: green, 80: yellow, 90: orange, 100: red
function ledSegments(pct) {
  const filled = Math.min(10, Math.ceil(pct / 10));
  const segs = [];
  for (let i = 1; i <= 10; i++) {
    let cls = "";
    if (i <= filled) {
      if (i <= 5) cls = "on-blue";
      else if (i <= 7) cls = "on-green";
      else if (i === 8) cls = "on-yellow";
      else if (i === 9) cls = "on-orange";
      else cls = "on-red";
    }
    segs.push(`<div class="${cls}"></div>`);
  }
  return segs.join("");
}

function renderTelemetryNodes(a, clusterId) {
  // Real per-host telemetry from /admin/nodes/telemetry (cached 4s server-side).
  const argoNodes = (a?.nodes || 0);
  const hadesLoaded = false;
  const heldByHades = new Set();
  const tele = clusterTelemetry(clusterId);
  const clusterLoaded = !!clusterState(clusterId)?.loaded;
  if (!tele.length) {
    return `<div class="empty-state" style="padding:20px 0">Telemetry probe pending…</div>`;
  }
  return tele.map((h, idx) => {
    const rank = idx;
    const isHeld = false;
    const ramUsed = gbBytes(h.ram_used_bytes);
    const ramTotal = gbBytes(h.ram_total_bytes);
    const pct = h.ram_pct != null ? Math.round(h.ram_pct) : 0;
    const cls = isHeld ? "held" : "";
    const master = rank === 0;
    const ipStatus = !h.reachable ? `${h.label} · unreachable` :
                     `${h.label} · ${h.latency_ms} ms`;
    return `
      <div class="node-row ${cls}">
        <div class="row1">
          <div class="id-line">
            <div class="rank-pill ${master?"master":""}">
              <div class="num">${isHeld ? "—" : rank}</div>
            </div>
            <div class="host">${h.id}</div>
            <div class="ip">${escapeHtml(ipStatus)}</div>
          </div>
          <div class="pct-stack">
            <div class="pct">${h.reachable ? pct : "—"}</div>
            <div class="pct-sm">%</div>
            <div class="gb">${h.reachable ? `${ramUsed.toFixed(0)} / ${ramTotal.toFixed(0)} GB` : "—"}</div>
          </div>
        </div>
        <div class="led-bar">${h.reachable ? ledSegments(pct) : ledSegments(0)}</div>
        ${h.reachable ? renderNodeDiag(h, clusterLoaded) : ""}
      </div>
    `;
  }).join("");
}

// Per-node diagnostic line: runner.py procs + RDMA port states.
// Surface for monitoring without SSHing in — exposes everything that lets us
// catch zombies (proc alive when pool is unloaded), spot which rank carries
// the model (biggest RSS), or detect a JACCL-degraded port (state != ACTIVE).
function renderNodeDiag(h, clusterLoaded) {
  const runners = h.runner_procs || [];
  const ports = h.rdma_ports || [];

  // Runner pill: green when count matches expectation, red on orphans
  // (runners alive but no pool loaded — the bug we hit today).
  let runnerHtml = "";
  if (h.runner_count != null) {
    const isOrphan = h.runner_count > 0 && !clusterLoaded;
    const heavy = runners[0];
    const rss = heavy ? `${(heavy.rss_bytes / (1024**3)).toFixed(0)} GB` : "";
    const pid = heavy ? `pid ${heavy.pid}` : "";
    const cpu = heavy && heavy.cpu_pct > 0 ? ` · ${heavy.cpu_pct.toFixed(0)}% cpu` : "";
    const label = h.runner_count === 0
      ? "no runner"
      : `${h.runner_count} runner${h.runner_count > 1 ? "s" : ""} · ${pid} · ${rss}${cpu}`;
    const cls = isOrphan ? "diag-pill orphan" :
                h.runner_count > 0 ? "diag-pill ok" :
                "diag-pill dim";
    const tip = isOrphan ? "Orphan: runner.py alive but cluster says not loaded" : "";
    runnerHtml = `<span class="${cls}" title="${tip}">${label}</span>`;
  }

  // RDMA pill: counts ACTIVE/total. Only show on hosts with an IB stack.
  let rdmaHtml = "";
  if (ports.length) {
    const active = ports.filter(p => p.state === "ACTIVE").length;
    const total = ports.length;
    const allDown = active === 0;
    const cls = allDown ? "diag-pill dim" :
                active === total ? "diag-pill ok" :
                "diag-pill ok";  // partial-active is normal (wiring uses subset)
    const tip = ports.map(p => `${p.name}:${p.state}`).join(", ");
    rdmaHtml = `<span class="${cls}" title="${tip}">RDMA ${active}/${total}</span>`;
  }

  if (!runnerHtml && !rdmaHtml) return "";
  return `<div class="diag-line">${runnerHtml}${rdmaHtml}</div>`;
}

// Smallest node count that fits a model on the given cluster. Walks 1..N
// against capacity_by_nodes and returns the first N where the model
// fits. Returns null when we have no size info (size unknown / cluster
// caps not yet probed). When even max nodes won't fit, returns the max
// (so caller can present "won't fit at max" rather than silently nothing).
//
// Reads capacity from `state.cluster_defs[cluster].capacity_by_nodes`
// (sourced by /admin/clusters/{id}), NOT from the runtime status — the
// status endpoint omits the table when no pool is loaded.
function optimalNodesForModel(cluster, selectedModel) {
  const modelList = state.cluster_models?.[cluster] || state.default_models || [];
  const m = (modelList || []).find(x => x.id === selectedModel);
  if (!m || !m.size_bytes) return null;
  const caps = state.cluster_defs?.[cluster]?.capacity_by_nodes
            || state.default?.capacity_by_nodes;
  if (!caps) return null;
  const avail = Object.keys(caps).map(k => parseInt(k, 10))
    .filter(n => !Number.isNaN(n))
    .sort((a, b) => a - b);
  if (avail.length === 0) return null;
  for (const n of avail) {
    const c = caps[String(n)];
    if (c?.max_loadable_bytes && m.size_bytes <= c.max_loadable_bytes) return n;
  }
  return avail[avail.length - 1];  // doesn't fit anywhere → keep highest
}

// Compute whether a (model, nodes) combo fits in the cluster's RAM budget.
// Uses /admin/default/status capacity_by_nodes (from backend, source of truth) +
// default_models.size_bytes. Returns {fits, reason?, modelGB, ramGB, requiredGB}.
// `fits === null` means we don't have enough info to decide (size unknown
// for instance) — in that case the UI doesn't block but warns.
function computeFitCheck(cluster, selectedModel, nodes) {
  const modelList = state.cluster_models?.[cluster] || state.default_models || [];
  const m = (modelList || []).find(x => x.id === selectedModel);
  if (!m || !m.size_bytes) {
    return { fits: null, reason: "size unknown (du didn't return)" };
  }
  // capacity_by_nodes lives on /admin/clusters/{id} (cached in
  // state.cluster_defs) — NOT on /admin/{id}/status. The status endpoint
  // skips the table when no pool is loaded; using it here was silently
  // turning off both the optimal-nodes hint and the won't-fit gate
  // whenever the cluster was idle.
  const cdef = state.cluster_defs?.[cluster];
  const status = state.default;
  const cap = (cdef?.capacity_by_nodes || status?.capacity_by_nodes || {})[String(nodes)];
  if (!cap || !cap.max_loadable_bytes) {
    return { fits: null, reason: "cluster ram unknown" };
  }
  const modelGB = m.size_bytes / (1024**3);
  const ramGB = cap.total_ram_gb;
  // Pipeline mode splits capacity-aware on heterogeneous clusters — the
  // backend exposes its (higher) ceiling separately. Tensor stays on the
  // even-split bound.
  const mode = state.pending_form?.default_mode || "pipeline";
  const loadableBytes = (mode === "pipeline" && cap.max_loadable_pipeline_bytes)
    ? cap.max_loadable_pipeline_bytes
    : cap.max_loadable_bytes;
  const maxLoadGB = loadableBytes / (1024**3);
  const overheadFactor = cdef?.model_overhead_factor || status?.model_overhead_factor || 1.15;
  const requiredGB = modelGB * overheadFactor;
  if (m.size_bytes > loadableBytes) {
    return {
      fits: false,
      reason: `${modelGB.toFixed(1)} GB × ${overheadFactor} = ${requiredGB.toFixed(1)} GB required, only ${maxLoadGB.toFixed(1)} GB loadable on ${nodes} node${nodes>1?"s":""} (${ramGB.toFixed(0)} GB total, ${mode} split)`,
      modelGB, ramGB, requiredGB,
    };
  }
  return { fits: true, modelGB, ramGB, requiredGB };
}

function renderLoadConfig(a) {
  const f = state.pending_form;
  const busy = state.busy_default_load || !!a?.loading;
  const dir = state.default_models_dir;
  const models = state.default_models;
  const selectedModel = f.default_model || (models[0] && models[0].id) || "";
  // Kick off the authoritative load-options fetch (real arch + tensor
  // capability). Fire-and-forget: cached after first call, re-renders on
  // arrival so the pills upgrade from heuristic to truth.
  fetchLoadOptions(state.selected_cluster, selectedModel);
  // Resolve the node count to display. When the user hasn't explicitly
  // picked one, default to the smallest topology that fits the selected
  // model. Falls back to 3 only if we don't yet have capacity data — then
  // the polling will bring it shortly and the render will refine.
  const optNodes = optimalNodesForModel(state.selected_cluster, selectedModel);
  let selectedNodes = f.default_nodes;
  if (!f.default_nodes_user_picked && optNodes != null) {
    selectedNodes = optNodes;
    // Persist so the rest of the render (form-default-nodes pills, plan,
    // load action) all see the same value without recomputing.
    f.default_nodes = optNodes;
  } else if (!selectedNodes) {
    selectedNodes = optNodes ?? 3;
    f.default_nodes = selectedNodes;
  }
  const presence = computeArgoPresence(selectedModel);
  const hadesLoaded = false;
  const showLock = (selectedNodes === 4 && hadesLoaded);
  const configChanged = isLoadConfigChanged(a, f);
  const fitCheck = computeFitCheck(state.selected_cluster, selectedModel, selectedNodes);
  return `
    <div class="section tint">
      <div class="section-head">
        <div class="section-stack">
          <div class="section-title">Load configuration</div>
          <div class="section-sub">Swap to a different model or change parallelism</div>
        </div>
        <div class="section-actions">
          <button class="btn btn-sm" data-act="manage-models">${Icon.grid}<span>Manage models</span>${Icon.arrowRight}</button>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:14px;margin-top:18px">
        ${renderFormRow1(dir, models, selectedModel, busy)}
        ${renderFormRow2(f, busy, presence, fitCheck)}
        ${showLock ? renderLockBanner() : ""}
        ${configChanged ? renderPlanMini(a, selectedNodes, selectedModel) : ""}
      </div>
    </div>
  `;
}

// Compact single-line plan (replaces the big dry-run panel).
// Shown ONLY when the form differs from the currently loaded config.
function renderPlanMini(a, nodes, selectedModel) {
  const cluster = state.selected_cluster || "default";
  const modelName = selectedModel ? selectedModel.split("/").pop() : null;
  const matrixEntry = modelName ? (state.matrix?.models || []).find(m => m.name === modelName) : null;
  // First-best: sync-matrix total (covers cross-cluster availability).
  // Fallback: default_models.size_bytes (from /admin/default/models, which now
  // includes batched du sizes). Without the fallback the row would show
  // "(size unknown)" even though the picker right above has the GB
  // figure — confusing for the user.
  let totalGb = matrixEntry ? matrixEntry.total_bytes / (1024**3) : null;
  if (totalGb === null) {
    const list = state.default_models;
    const m = (list || []).find(x => x.id === selectedModel);
    if (m && m.size_bytes) totalGb = m.size_bytes / (1024**3);
  }
  const perNode = totalGb ? Math.ceil(totalGb / Math.max(nodes, 1)) : null;

  // Per-rank availability
  const argoHosts = clusterHostIds(cluster).slice(0, nodes);
  let minAvail = null;
  let anyOom = false, anyTight = false;
  for (const hostId of argoHosts) {
    const h = (state.telemetry?.hosts || []).find(x => x.id === hostId);
    if (!h?.reachable || !perNode) continue;
    const ramGb = h.ram_total_bytes / (1024**3);
    const usedGb = h.ram_used_bytes / (1024**3);
    const avail = Math.round(ramGb - usedGb);
    minAvail = minAvail === null ? avail : Math.min(minAvail, avail);
    if (avail < perNode) anyOom = true;
    else if (avail < perNode * 1.2) anyTight = true;
  }

  const verdicts = modeVerdicts(modelName, nodes);
  const totalSize = totalGb ? totalGb.toFixed(0) + " GB" : "size unknown";
  const memVerdict = perNode === null ? null : anyOom ? "oom" : anyTight ? "tight" : "fits";
  const inflightCount = (state.runs || []).filter(r => r.cluster === state.selected_cluster).length;

  const pipelineColor = verdicts.pipeline.ok ? "var(--green-deep)" : "var(--rust-deep)";
  const tensorColor = verdicts.tensor.ok ? "var(--green-deep)" : "var(--rust-deep)";
  const memColor = !memVerdict ? "var(--ink-2)" : memVerdict === "oom" ? "var(--rust-deep)" : memVerdict === "tight" ? "var(--amber-deep)" : "var(--green-deep)";
  const memLabel = !memVerdict ? "—" : memVerdict === "oom" ? "OOM risk" : memVerdict === "tight" ? "tight" : "fits";

  return `
    <div style="display:flex;flex-direction:row;align-items:center;flex-wrap:wrap;gap:14px;padding:8px 14px;background:transparent;border-top:1px dashed var(--line);font-size:11px;color:var(--ink-2);font-family:var(--font-mono)">
      <span style="font-family:var(--font-text);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-3)">plan</span>
      <span>model <span style="color:var(--ink)">${escapeHtml(modelName || "—")}</span> (${totalSize})</span>
      <span style="color:var(--ink-4)">·</span>
      <span><span style="color:${pipelineColor};font-weight:600">pipeline ${verdicts.pipeline.ok ? "✓" : "✗"}</span>${verdicts.pipeline.reason ? ` (${verdicts.pipeline.reason})` : ""}</span>
      <span style="color:var(--ink-4)">·</span>
      <span><span style="color:${tensorColor};font-weight:600">tensor ${verdicts.tensor.ok ? "✓" : "✗"}</span>${verdicts.tensor.reason ? ` (${verdicts.tensor.reason})` : ""}</span>
      <span style="color:var(--ink-4)">·</span>
      <span>${perNode || "—"} GB/rank · min avail ${minAvail !== null ? minAvail+" GB" : "—"} <span style="color:${memColor};font-weight:600">${memLabel}</span></span>
      ${inflightCount > 0 ? `<span style="color:var(--rust-deep)">· ${inflightCount} run${inflightCount>1?"s":""} will abort</span>` : ""}
    </div>
  `;
}

function renderFormRow2(f, busy, presence, fitCheck) {
  const sel = f.default_nodes || 3;

  const noFit = fitCheck && fitCheck.fits === false;

  const fitWarning = fitCheck && fitCheck.fits === false ? fitCheck.reason : "";
  // Per-N fit check so we can mark pills that won't hold the selected
  // model. Same source-of-truth (capacity_by_nodes) used by the main
  // fitCheck — no risk of disagreement between the pills and the Load
  // button about which N is loadable.
  const selectedModel = f.default_model;
  const optN = selectedModel ? optimalNodesForModel(state.selected_cluster, selectedModel) : null;
  const fitByN = {};

    fitByN[n] = selectedModel ? computeFitCheck(state.selected_cluster, selectedModel, n) : { fits: null };
  }
  const pillFor = (n) => {

    if (n === sel) cls = "selected";
    else if (presence[n] === "ok") cls = "available";
    else if (presence[n] === "missing") cls = "missing";
    else if (presence[n] === "locked") cls = "locked";
    const fits = fitByN[n];
    // Combine: a pill that doesn't fit the model goes red; the optimal
    // (smallest fitting) gets a green dot. Both are non-blocking — the
    // user can still click to inspect what the plan would say.
    const tooSmall = fits && fits.fits === false;
    if (tooSmall) cls += " too-small";
    const star = (optN === n && fits && fits.fits === true) ? '<div class="opt-mark" title="Optimal — smallest topology that fits"></div>' : '';
    const title = tooSmall ? `Won't fit: ${fits.reason || ""}` : (optN === n ? "Optimal — smallest topology that fits" : "");
    return `<button class="pill ${cls.trim()}" data-act="form-default-nodes" data-v="${n}"${title ? ` title="${escapeHtml(title)}"` : ""}>${n}${star}<div class="under"></div></button>`;
  };
  return `

            <span class="check-text">KV cache Q8</span>
            <span class="check-hint">long contexts</span>
          </label>
        </div>
      </div>
      <div style="flex:1"></div>
      ${fitWarning ? `
        <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--rust-soft);border:1px solid var(--rust);border-radius:6px;font-size:12px;color:var(--rust-deep);max-width:560px">
          <span style="font-weight:600">Won't fit:</span>

        </div>
      ` : ""}

        ${noFit ? `title="${escapeHtml(fitWarning)}" style="opacity:0.5;cursor:not-allowed"` : ""}>${Icon.check}<span>${busy?"Loading…":noFit?"Won't fit":"Apply & reload"}</span></button>

function renderLockBanner() { return ''; }

// Returns true when the pending form values differ from what's currently loaded.
function isLoadConfigChanged(a, f) {
  if (!a?.loaded) return true; // nothing loaded yet → plan always relevant
  const selectedModel = f.default_model || (state.default_models[0] && state.default_models[0].id);
  return (
    selectedModel !== a.model ||
    (f.default_nodes || 1) !== (a.nodes || 1) ||
    (f.default_mode || "pipeline") !== a.mode ||
    Boolean(f.default_use_ap) !== Boolean(a.use_ap) ||
    Boolean(f.default_kv_q8) !== Boolean(a.kv_q8) ||
    (f.default_draft || "") !== (a.draft_model || "")
  );
}

// Compute per-mode verdict from model name + node count.
// Heuristics: hy_v3 → tensor unsupported. Qwen3/GLM4-MoE family → KV heads typically 8.
// Fetch the authoritative load-options (real config.json arch + tensor
// capability) for a (cluster, model) and cache it. Re-renders on arrival so the
// node/mode pills upgrade from heuristic to truth. Best-effort: a failure just
// leaves modeVerdicts on its name-based fallback.
async function fetchLoadOptions(cluster, model) {
  if (!cluster || !model) return;
  const key = `${cluster}::${model}`;
  if (state.load_options[key]) return;  // cached
  state.load_options[key] = { _loading: true };
  try {
    const resp = await getJson(
      `/admin/clusters/${encodeURIComponent(cluster)}/load-options?model=${encodeURIComponent(model)}`
    );
    state.load_options[key] = resp || {};
  } catch {
    state.load_options[key] = {};  // give up; fallback heuristic stays
  }
  render();
}

function modeVerdicts(modelName, nodes) {
  // Authoritative path: when /load-options has been fetched for the current
  // selection, derive mode validity from the model's REAL config.json arch
  // (num_key_value_heads, num_hidden_layers) + the backend's tensor-capability
  // — never name regex. The fallback below only runs while that's in flight.
  const cluster = state.selected_cluster;
  const sel = state.pending_form?.default_model;
  const mm = sel ? state.load_options?.[`${cluster}::${sel}`]?.model_meta : null;
  if (mm && mm.model_type) {
    const kv = mm.num_key_value_heads;
    const layers = mm.num_hidden_layers;
    const tensorOk = !!mm.tensor_capable && (!kv || kv % nodes === 0);
    const tensorReason = !mm.tensor_capable
      ? `${mm.model_type} not in auto_parallel`
      : (kv && kv % nodes !== 0 ? `KV heads ${kv} ÷ ${nodes} ≠ int` : "");
    const pipeOk = !layers || layers >= nodes;
    return {
      pipeline: { ok: pipeOk, reason: pipeOk ? "" : `${layers} layers < ${nodes} nodes` },
      tensor:   { ok: tensorOk, reason: tensorReason },
    };
  }
  // Fallback heuristic (name-based) — used only until /load-options lands.
  const name = (modelName || "").toLowerCase();
  const isHy3 = /hy[_-]?v?3|hy3-preview/i.test(name);
  const isQwen3 = /qwen3/i.test(name);
  const isGlm = /glm-?[45]/i.test(name);
  // Sensible KV head defaults per family (model config.json would give the truth).
  const kvHeads = isQwen3 ? 8 : isGlm ? 4 : 8;
  const tensorOk = !isHy3 && (kvHeads % nodes === 0);
  const tensorReason = isHy3
    ? "hy_v3 not in auto_parallel"
    : (kvHeads % nodes !== 0 ? `KV heads ${kvHeads} ÷ ${nodes} ≠ int` : "");
  return {
    pipeline: { ok: true, reason: "" },
    tensor:   { ok: tensorOk, reason: tensorReason },
  };
}

function renderMemoryPlan(a, nodes, selectedModel) {
  // Real model size from matrix (preferred), fallback to default_models listing.
  // The matrix is auto-fetched on dashboard boot so total_bytes is available
  // even on the main page (cached server-side for 60 s).
  const modelName = selectedModel ? selectedModel.split("/").pop() : null;
  const matrixEntry = modelName ? (state.matrix?.models || []).find(m => m.name === modelName) : null;
  const modelEntry = (state.default_models || []).find(m => m.id === selectedModel);
  const totalGb = matrixEntry ? matrixEntry.total_bytes / (1024**3) : (modelEntry?.size_gb || 100);
  const perNode = Math.ceil(totalGb / Math.max(nodes, 1));
  // Real telemetry per node — slice to the first N
  const argoHosts = clusterHostIds(state.selected_cluster).slice(0, nodes);
  const rows = argoHosts.map((hostId, i) => {
    const h = hostTelemetry(hostId);
    const ramGb = h?.ram_total_bytes ? h.ram_total_bytes / (1024**3) : 0;
    const usedGb = h?.ram_used_bytes ? h.ram_used_bytes / (1024**3) : 0;
    const avail = Math.max(0, Math.round(ramGb - usedGb));
    const fits = avail >= perNode;
    const tight = !fits && avail >= perNode * 0.8;
    return { rank: i, host: hostId, ip: h?.label || `?`, ram: ramGb, avail, perNode, fits, tight, reachable: !!h?.reachable };
  });
  const expectedLoad = a?.load_s ? a.load_s.toFixed(0) : "~42";
  const expectedTps = a?.recent_avg_tps ? a.recent_avg_tps.toFixed(0) : "~45";
  const anyTight = rows.some(r => r.tight);
  const anyOom = rows.some(r => !r.fits && !r.tight);
  const verdicts = modeVerdicts(modelName, nodes);
  // === DISCRETE one-line plan ===
  // (kept as part of the function so callers using renderMemoryPlan still work,
  // but the actual UI we use is renderPlanMini below.)
  return `
    <div class="plan">
      <div class="plan-head">
        <div>
          <div class="title-row">
            ${Icon.doc}
            <div class="title">Plan preview</div>
            <div class="badge">dry-run</div>
          </div>
          <div class="sub">Estimated impact if you apply the current configuration · no commit yet</div>
        </div>
        <div class="stats">
          <div class="stat"><div class="cap">Warm load</div><div class="val">~${expectedLoad} s</div></div>
          <div class="stat"><div class="cap">Throughput</div><div class="val">~${expectedTps} tok/s</div></div>
        </div>
      </div>
      <div class="plan-rows">
        ${rows.map(r => `
          <div class="row">
            <div class="id">
              <div class="rank-pill ${r.rank===0?"master":""}"><div class="num" style="${r.rank===0?"color:var(--blue-deep)":""}">${r.rank}</div></div>
              <div class="host">${r.host}</div>
              <div class="ip">${r.ip}</div>
            </div>
            <div class="nums">
              <span class="needed">${r.perNode} GB needed</span>
              <span class="avail${(!r.fits||r.tight)?" warn":""}">${r.avail} GB avail</span>
              ${r.fits && !r.tight
                ? `<div class="badge-fit">${Icon.check}<span>Fits</span></div>`
                : `<div class="badge-tight">${Icon.warn}<span>${r.fits?"Tight · swap risk":"OOM risk"}</span></div>`}
            </div>
          </div>
        `).join("")}
      </div>
      <div class="plan-foot">
        <span class="hint">${anyOom ? "❌ OOM risk on at least one rank — add a node or pick a smaller model"
                              : anyTight ? "⚠ tight on at least one rank — consider <span class=\"mono\">KV cache Q8</span> or add a node"
                              : "All ranks fit · safe to apply"}</span>
        <span class="hint">${(state.runs||[]).length === 0 ? "No active runs · no eviction needed" : `${state.runs.length} active runs will be aborted`}</span>
      </div>
    </div>
  `;
}

// Compute presence: ok/missing/locked per node count, using real /admin/sync/matrix.
function computeArgoPresence(modelId) {
  const argoHosts = clusterHostIds(state.selected_cluster);
  const maxNodes = Math.max(argoHosts.length, 1);
  const presence = {};
  // Look up presence in matrix data if available
  const modelName = modelId ? modelId.split("/").pop() : null;
  const matrixPresence = modelName ? modelPresenceById(modelName) : {};
  // For each N, check if the first N Default hosts have the model
  for (let n = 1; n <= maxNodes; n++) {
    const requiredHosts = argoHosts.slice(0, n);
    const allPresent = requiredHosts.every(h => matrixPresence[h]);
    presence[n] = allPresent ? "ok" : (Object.keys(matrixPresence).length === 0 ? "ok" : "missing");
  }

  return presence;
}

function clusterTargetNodes(cluster) {
  // The HF download endpoint validates `targets[]` against HOSTS_REGISTRY,
  // which is built from `topology.yaml` host ids. cluster-config.json (the
  // UI-added clusters) may use different node host ids — e.g. Telemak's
  // legacy topology entry `telemak-max64` has host id `telemak`, while
  // the UI-added cluster `telemak-64` has node host id `telemak-64`. Both
  // point at the same machine via the same SSH target.
  //
  // Resolve the cdef node to its matrix-side host id by SSH match (or by
  // id when it already lines up) so the download POST carries the id the
  // backend recognises. Without this, every download for a UI-added
  // cluster errors with `unknown target <cluster-id>`.
  const matrixHosts = state.matrix?.hosts || [];
  return clusterDefNodes(cluster).map((n, idx) => {
    const nodeSsh = (n.ssh || "").trim();
    const resolved = matrixHosts.find(h => h.id === n.host)
                  || matrixHosts.find(h => (h.ssh || "").trim() === nodeSsh && nodeSsh);
    const hostId = resolved?.id || n.host;
    const h = hostTelemetry(hostId) || (resolved ? { label: resolved.ssh, free_bytes: resolved.free_bytes } : null);
    const free = h?.free_bytes ? `${(h.free_bytes / 1024**4).toFixed(1)} TB free` : "free space unknown";
    return { rank: idx, host: hostId, ip: h?.label || n.host, free };
  });
}

function renderDownloadRow(d) {
  const running = d.status === "running";
  const resumable = (d.status === "cancelled" || d.status === "error" || d.status === "partial");
  const per = d.per_target || [];
  // Live aggregate across targets — per-target bytes update live; d.bytes only
  // finalises at the end. total_bytes = repo_size × N targets (HF API, #14).
  const liveBytes = per.reduce((s, p) => s + (p.bytes || 0), 0) || d.bytes || 0;
  const hasTotal = d.total_bytes > 0;
  const pct = hasTotal ? Math.min(100, Math.round((liveBytes / d.total_bytes) * 100)) : (d.status === "done" ? 100 : 0);
  // Real % when the repo size is known; otherwise a moving indeterminate bar.
  const indeterminate = running && !hasTotal;
  const elapsed = ((d.finished_at || Date.now()/1000) - d.started_at).toFixed(0);
  const targetsSummary = per.length
    ? per.map(p => {
        const dot = p.status === "done" ? "🟢"
                  : p.status === "running" ? "🔵"
                  : p.status === "cancelled" ? "⚪"

        return `<span title="${escapeHtml(p.error || p.status || "")}" style="font-family:var(--font-mono);font-size:11px;margin-right:8px">${dot} ${escapeHtml(p.host)}${sz}</span>`;

  const statusBadge = d.status === "done" ? '<span style="color:var(--green-deep);font-weight:600">done</span>'
                    : d.status === "cancelled" ? '<span style="color:var(--ink-3);font-weight:600">cancelled</span>'
                    : d.status === "error" ? '<span style="color:var(--rust-deep);font-weight:600">error</span>'
                    : d.status === "partial" ? '<span style="color:var(--amber-deep);font-weight:600">partial</span>'
                    : '';
  const errLine = d.error
    ? `<div style="font-family:var(--font-mono);font-size:11px;color:var(--rust-deep);margin-top:4px;word-break:break-all">${escapeHtml(d.error.slice(0, 200))}</div>`
    : "";
  return `
    <div class="hf-active">
      <div class="head">
        <div class="left">
          <div class="pip-pulse"><div class="ring"></div><div class="core"></div></div>
          <div class="repo">${escapeHtml(d.repo || "")}</div>
          <div class="hint">${targetsSummary} ${statusBadge}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="stats">${escapeHtml(d.size||"0B")} · ${elapsed}s</div>
          ${running ? `<button class="btn btn-xs btn-destructive" data-act="dl-cancel" data-id="${d.id}">${Icon.x}<span>Cancel</span></button>` : ""}
          ${resumable ? `<button class="btn btn-xs" data-act="dl-resume" data-id="${d.id}" title="Re-run; HF CLI resumes partial files">${Icon.refresh}<span>Resume</span></button>` : ""}
        </div>

        <div class="bar">${indeterminate
          ? `<div class="fill" style="width:30%;animation:syncIndeterminate 1.6s linear infinite"></div>`
          : `<div class="fill" style="width:${pct}%"></div>`}</div>
        <div class="pct">${indeterminate ? escapeHtml(d.size || "…") : pct + "%"}</div>

}

function renderRunRow(m) {
  // Live elapsed from started_at — covers the long prefill phase before any
  // tokens are emitted (TTFT can be 1-2 min on Qwen3.5-397B).
  const nowMs = Date.now();
  const startedMs = (m.started_at || 0) * 1000;
  const liveElapsed = startedMs > 0 ? Math.max(0, (nowMs - startedMs) / 1000) : 0;
  const tokens = m.output_tokens || 0;
  // tok_per_s preferred from server (computed on tick) else live
  const liveTps = tokens > 0 && liveElapsed > 0 ? tokens / liveElapsed : (m.tok_per_s || 0);

  let status = m.status || "streaming";
  // During the prefill phase the runner emits 0 tokens for a long time; surface that.
  const isPrefilling = (status === "streaming" && tokens === 0 && liveElapsed > 0.5);
  const displayStatus = isPrefilling ? "prefill" : status;

  const cluster = m.cluster || "default";
  // Multi-pool Default: pool_alias = which named pool served this run.
  // Default pool == cluster name → don't display redundantly. Custom
  // alias → small chip after the cluster name.
  const poolAlias = m.pool_alias && m.pool_alias !== cluster ? m.pool_alias : null;
  const max = m.max_tokens || 2048;
  const pct = Math.min(100, Math.round((tokens/max)*100));
  const cancellable = status === "streaming";
  const shortId = (m.id || "").replace(/^chatcmpl-/, "").slice(0, 8);

  return `
    <div class="run-row">
      <div class="status-cell ${displayStatus === "prefill" || displayStatus === "cancelling" ? "waiting" : displayStatus}">
        <div class="pip-wrap"><div class="ring"></div><div class="core"></div></div>
        <div class="label">${displayStatus}</div>
      </div>
      <div class="cluster-cell ${cluster}">
        <div class="pip"></div>
        <span class="name">${cluster.charAt(0).toUpperCase()+cluster.slice(1)}</span>
        ${poolAlias ? `<span class="mono" style="font-size:10px;color:var(--ink-3);margin-left:4px">· ${escapeHtml(poolAlias)}</span>` : ""}
      </div>
      <div class="info-cell">
        <div class="model">${escapeHtml(truncatePath(m.model || "—", 60))}</div>
        <div class="sub">${escapeHtml(m.client||"—")} · <span class="mono">${escapeHtml(shortId)}</span> · max_tokens=${max}</div>
      </div>
      <div class="progress-cell">
        <div class="bar"><div class="fill" style="width:${pct}%"></div></div>
        <div class="nums">
          <div class="toks">${tokens} / ${max}</div>
          <div class="rate">${liveTps > 0 ? liveTps.toFixed(1)+" tok/s" : (isPrefilling ? "prefill…" : "—")} · ${liveElapsed.toFixed(1)} s</div>
        </div>
      </div>
      <button class="btn btn-xs btn-destructive" data-act="run-cancel" data-id="${escapeHtml(m.id||"")}" ${cancellable?"":"disabled"}>${Icon.x}<span>${cancellable?"Cancel":"…"}</span></button>
    </div>
  `;
}
