// ── Cluster draft state helpers ─────────────────────────────────────────
function clusterDef(id) {
  // Server-truth def (from GET /admin/clusters/{id})
  return state.cluster_defs?.[id] || null;
}
function clusterDraftOrDef(id) {
  // Returns the editable working copy. If no draft exists yet, returns the
  // server def (mutations should go through ensureDraft).
  return state.cluster_draft?.[id] || clusterDef(id);
}
function ensureDraft(id) {
  if (!state.cluster_draft) state.cluster_draft = {};
  if (!state.cluster_draft[id]) {
    const def = clusterDef(id);
    if (!def) return null;
    state.cluster_draft[id] = JSON.parse(JSON.stringify(def));
  }
  return state.cluster_draft[id];
}
function discardDraft(id) { if (state.cluster_draft) state.cluster_draft[id] = null; }
function hasDraftChanges(id) {
  const draft = state.cluster_draft?.[id];
  if (!draft) return false;
  const def = clusterDef(id);
  if (!def) return false;
  return JSON.stringify({ name: draft.name, kind: draft.kind, backend: draft.backend, nodes: draft.nodes, upstream: draft.upstream, models_dir: draft.models_dir })
       !== JSON.stringify({ name: def.name, kind: def.kind, backend: def.backend, nodes: def.nodes, upstream: def.upstream, models_dir: def.models_dir });
}

function rdmaLabelForHost(hostId, peerIds) {
  const peers = peerIds.filter(p => p && p !== hostId);
  return peers.length ? `${peers.length} peer${peers.length > 1 ? "s" : ""}` : "n/a";
}

function renderClusterEditor(id) {
  const cfg = CLUSTERS.find(c => c.id === id);
  if (!cfg) return `<div class="cluster-editor"><div class="empty-state">No cluster selected.</div></div>`;
  const def = clusterDef(id);
  if (!def) return `<div class="cluster-editor"><div class="empty-state">Loading cluster definition…</div></div>`;
  const draft = clusterDraftOrDef(id);
  const p = clusterState(id);
  const poolLoaded = !!p?.loaded;
  const dirty = hasDraftChanges(id);
  const saving = !!state.cluster_save_busy?.[id];
  const err = state.cluster_save_err?.[id];

  const kindOpts = ["mlx-distributed"];
  // value sent to the server | label shown in the dropdown.
  const backendOpts = [
    { v: "jaccl", label: "jaccl (RDMA over TB5)" },
    { v: "ring",  label: "ring (TCP/IP)" },
  ];
  const dotColor = id==='default'?'var(--blue)':'var(--slate-blue)';

  return `
    <div class="cluster-editor">
      <div class="editor-head">
        <div>
          <div class="title-row">
            <div class="dot" style="width:10px;height:10px;border-radius:5px;background:${dotColor}"></div>
            <h2>${escapeHtml(draft.name || cfg.name)}</h2>
            <div class="editing-pill">${dirty ? "Unsaved changes" : "Editable"}</div>
          </div>
          <div class="sub">Edit name, kind, backend and member nodes. Exactly 1 master. RDMA wiring is enforced by physical TB5 cabling. Topology changes require the pool to be unloaded.</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <button class="btn btn-sm" data-act="cluster-toggle-enabled" data-cluster="${id}" title="${cfg.enabled === false ? 'Re-enable cluster' : 'Disable cluster (keeps config, refuses load, hidden from ribbon)'}" ${poolLoaded ? 'disabled style="opacity:0.5;cursor:not-allowed" title="Unload first"' : ''}>${cfg.enabled === false ? 'Enable' : 'Disable'}</button>
          <button class="btn btn-sm" data-act="cluster-remove" data-cluster="${id}" style="color:var(--rust)" title="Remove this cluster">Remove</button>
          ${dirty ? `<button class="btn btn-sm" data-act="cluster-discard" data-cluster="${id}">Discard</button>` : ""}
          ${dirty ? `<button class="btn btn-sm" style="background:var(--blue);color:white;border-color:var(--blue)" ${saving?"disabled":""} data-act="cluster-save" data-cluster="${id}">${saving?"Saving…":"Save changes"}</button>` : ""}
        </div>
      </div>
      ${cfg.enabled === false ? `<div style="margin:0 16px 12px;padding:8px 12px;background:var(--ink-soft, #f5f5f5);border-radius:6px;font-size:12px;color:var(--ink-2)">Cluster is <b>disabled</b> — it won't appear in the ribbon and load endpoints refuse. Click <b>Enable</b> to bring it back.</div>` : ""}
      ${err ? `<div class="editor-error" style="margin:0 16px 12px;padding:10px 12px;background:#fff5f5;border:1px solid var(--rust);border-radius:6px;color:var(--rust);font-size:13px">${escapeHtml(err)}</div>` : ""}
      ${poolLoaded ? `<div style="margin:0 16px 12px;padding:8px 12px;background:var(--blue-soft);border-radius:6px;font-size:12px;color:var(--ink-2)">Pool is loaded — topology fields are locked. Unload first to edit nodes/kind/backend.</div>` : ""}
      <div class="editor-body" data-scroll-key="cluster-editor-${id}">
        ${draft.kind === "telemak" ? renderTelemakEditorBody(id, draft, cfg, poolLoaded) : renderMlxClusterEditorBody(id, draft, cfg, poolLoaded, kindOpts, backendOpts)}
      </div>
    </div>
  `;
}

function renderAddNodeControl(id, draft, poolLoaded) {
  const used = new Set((draft.nodes || []).map(n => n.host));
  const all = state.inventory?.hosts || [];
  const free = all.filter(h => !used.has(h.id));
  if (free.length === 0 || poolLoaded) {
    const reason = poolLoaded ? "Unload first" : "No hosts left";
    return `<button class="btn btn-xs" disabled style="opacity:0.4;cursor:not-allowed" title="${reason}">${Icon.plus}<span>Add node</span></button>`;
  }
  return `
    <div style="display:flex;align-items:center;gap:6px">
      <select class="ce-input" style="width:auto;min-width:160px;padding:6px 8px;font-size:12px" data-act="cluster-add-node" data-cluster="${id}">

      </select>
    </div>
  `;
}

function renderNodeManagement(clusterId) {
  // Drive directly from the working (draft or saved) cluster def — when the
  // user removes a node above, it disappears here too.
  const draft = clusterDraftOrDef(clusterId);
  const allHosts = state.inventory?.hosts || [];
  const nodes = (draft?.nodes || []).map(n => {
    const inv = allHosts.find(h => h.id === n.host);
    return { id: n.host, host: n.host, ip: inv?.label || "" };
  });
  if (nodes.length === 0) {
    return `<div style="padding:14px;background:var(--ground);border-radius:6px;font-size:12px;color:var(--ink-2)">No nodes configured.</div>`;
  }
  return `
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding-bottom:14px">

// ─── Settings: Models matrix ───────────────────────────────────────
function matrixGroups() {
  const groups = [{ id: "all", label: "All hosts" }];
  Object.entries(state.cluster_defs || {}).forEach(([id, def]) => {
    const hosts = (def?.nodes || []).map(n => n.host).filter(Boolean);
    if (hosts.length) groups.push({ id, label: (def.name || id).toUpperCase(), hosts });
  });
  return groups;
}
function matrixGroupHostIds(groupId) {
  const g = matrixGroups().find(g => g.id === groupId);
  return g?.hosts || null; // null means "all"
}

// ─── Settings: Crew ─────────────────────────────────────────────────
function fmtAgo(ts) {
  if (!ts) return "—";
  const sec = Math.max(0, Math.round(Date.now()/1000 - ts));
  if (sec < 10) return "just now";
  if (sec < 60) return sec + "s ago";
  if (sec < 3600) return Math.floor(sec/60) + "m ago";
  if (sec < 86400) return Math.floor(sec/3600) + "h ago";
  return Math.floor(sec/86400) + "d ago";
}

function renderSettingsCrew() {
  const crew = state.crew || [];
  const d = state.discovery || { active: false };
  let countdown = "";
  if (d.active && d.expires_at) {
    const remaining = Math.max(0, Math.round(d.expires_at - Date.now()/1000));
    countdown = `${Math.floor(remaining/60)}m ${remaining%60}s remaining`;
  }
  return `
    <div style="display:flex;flex-direction:column;gap:24px">

async function doHfSearch() {
  const q = (state.hf_search_q || "").trim();
  if (!q) { state.hf_search_results = null; render(); return; }
  state.hf_searching = true; render();
  try {
    const r = await getJson(`/admin/hf/search?q=${encodeURIComponent(q)}&limit=25`);
    state.hf_search_results = r.data || [];
  } catch (err) {
    toast("HF search failed: " + err.message, "err");
    state.hf_search_results = [];
  }
  state.hf_searching = false; render();
}

function renderSyncJobRow(j) {
  const running = j.status === "running";
  const partial = j.status === "partial";
  const failed = j.status === "failed";
  const pillCls = running ? "" : failed ? "error" : partial ? "warn" : "running";
  const pillBg = running ? "var(--blue-soft)" : failed ? "var(--rust-soft)" : partial ? "var(--amber-soft)" : "var(--green-soft)";
  const pillTextColor = running ? "var(--blue-deep)" : failed ? "var(--rust-deep)" : partial ? "var(--amber-deep)" : "var(--green-deep)";
  const pipColor = running ? "var(--blue)" : failed ? "var(--rust)" : partial ? "var(--amber)" : "var(--green)";
  const elapsed = ((j.finished_at || (Date.now()/1000)) - j.started_at).toFixed(0);
  const done = (j.per_target || []).filter(t => t.status === "done").length;
  const total = (j.per_target || []).length;

  // Aggregate progress across all targets — each one transfers the full model.
  const bytesTotalOne = j.bytes_total || 0;          // bytes per target
  const bytesTotalAll = bytesTotalOne * total;       // sum over targets
  const bytesDone = (j.per_target || []).reduce((s, t) => s + (t.bytes_transferred || 0), 0);
  const pct = bytesTotalAll > 0 ? Math.min(100, Math.round((bytesDone / bytesTotalAll) * 100)) : null;
  const rate = (running && elapsed > 0 && bytesDone > 0) ? (bytesDone / elapsed) : null;  // B/s
  const etaSec = (rate && bytesTotalAll > bytesDone) ? Math.round((bytesTotalAll - bytesDone) / rate) : null;

  return `
    <div style="display:flex;flex-direction:column;gap:8px;padding:14px 18px;background:var(--surface);border:1px solid var(--line);border-radius:10px">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <div style="display:flex;align-items:center;gap:6px;padding:3px 9px;background:${pillBg};border-radius:999px">
            <div style="width:5px;height:5px;border-radius:3px;background:${pipColor}"></div>
            <span style="font-size:10px;font-weight:600;color:${pillTextColor};letter-spacing:0.04em;text-transform:uppercase">${j.status}</span>
          </div>
          <span style="font-family:var(--font-mono);font-size:11px;color:var(--ink-2)">${j.id}</span>
          <span style="font-family:var(--font-mono);font-size:13px;color:var(--ink)">${escapeHtml(j.model)}</span>
          <span style="font-size:12px;color:var(--ink-2)">${j.source} → ${(j.targets||[]).join(" · ")}</span>
        </div>
        <div style="display:flex;align-items:center;gap:14px">
          <span style="font-family:var(--font-mono);font-size:11px;color:var(--ink-2)">
            ${done} / ${total}${pct != null ? ` · ${pct}%` : ""} · ${elapsed}s${etaSec != null ? ` · ETA ${fmtDur(etaSec)}` : ""}${rate != null ? ` · ${fmtBytes(rate)}/s` : ""}
          </span>
          ${running
            ? `<button class="btn btn-xs btn-destructive" data-act="sync-job-cancel" data-id="${escapeHtml(j.id)}">${Icon.x}<span>Cancel</span></button>`
            : `${(failed || partial || j.status === "cancelled" || j.status === "interrupted") ? `<button class="btn btn-xs" data-act="sync-job-retry" data-id="${escapeHtml(j.id)}" title="Re-run with the same source/targets">${Icon.refresh || ""}<span>Retry</span></button>` : ""}<button class="btn btn-xs btn-ghost" data-act="sync-job-remove" data-id="${escapeHtml(j.id)}" title="Remove from list">${Icon.x}</button>`}
        </div>
      </div>
      ${pct != null ? `
        <div style="height:4px;background:var(--ground);border-radius:2px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${pipColor};transition:width 0.4s ease"></div>
        </div>` : (running ? `<div style="height:4px;background:var(--ground);border-radius:2px;overflow:hidden"><div style="height:100%;width:30%;background:${pipColor};animation:syncIndeterminate 1.6s linear infinite"></div></div>` : "")}
      ${j.per_target && j.per_target.length ? `
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${j.per_target.map(t => {
            const c = t.status === "done" ? "var(--green-soft)" : t.status === "failed" ? "var(--rust-soft)" : t.status === "running" ? "var(--blue-soft)" : "var(--surface-2)";
            const tc = t.status === "done" ? "var(--green-deep)" : t.status === "failed" ? "var(--rust-deep)" : t.status === "running" ? "var(--blue-deep)" : "var(--ink-2)";
            const tPct = (bytesTotalOne > 0 && t.bytes_transferred != null)
              ? Math.min(100, Math.round((t.bytes_transferred / bytesTotalOne) * 100))
              : null;
            const sizeLabel = t.bytes_transferred ? ` · ${fmtBytes(t.bytes_transferred)}${bytesTotalOne ? ' / ' + fmtBytes(bytesTotalOne) : ''}` : "";
            return `<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:${c};border-radius:4px;font-size:10px;font-weight:600;color:${tc};letter-spacing:0.04em;text-transform:uppercase">${t.target} · ${t.status}${tPct!=null?` · ${tPct}%`:""}${sizeLabel}${t.error?" · ⚠":""}</span>`;
          }).join("")}
        </div>
      ` : ""}
      ${failed && j.error ? `<div style="font-family:var(--font-mono);font-size:11px;color:var(--rust-deep);background:var(--rust-soft);padding:6px 10px;border-radius:6px">${escapeHtml(j.error)}</div>` : ""}
    </div>
  `;
}

function fmtDur(sec) {
  sec = Math.max(0, Math.round(sec));
  if (sec < 60) return sec + "s";
  if (sec < 3600) return Math.floor(sec/60) + "m" + (sec%60 ? " " + (sec%60) + "s" : "");
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60);
  return h + "h" + (m ? " " + m + "m" : "");
}

            <div style="display:flex;gap:8px">
              <button class="btn btn-sm" data-act="sync-picker-close">Cancel</button>
              <button class="btn btn-primary btn-sm" data-act="sync-picker-start" ${!p.source||effectiveTargets.length===0||!p.model?"disabled":""}>${Icon.arrowRight}<span>Start sync</span></button>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderMatrixCard(m, group) {
  // kind=telemak clusters don't have SSH-accessible nodes in the rsync sense.
  // The "node" is an HTTP endpoint with its own model store. Render a
  // dedicated view that lists the models loaded on the upstream Telemak,
  // sourced from /admin/clusters/<id>/status (already fetched into
  // state.cluster_status).
  if (group && group !== "all") {
    const cdef = state.cluster_defs?.[group];
    if (cdef?.kind === "telemak") {
      return renderTelemakModelsCard(group, cdef);
    }
  }
  const allHosts = m.hosts || [];
  const groupHostIds = matrixGroupHostIds(group);
  const hosts = groupHostIds ? allHosts.filter(h => groupHostIds.includes(h.id)) : allHosts;
  // Drop rows that have no presence in the filtered host set.
  const models = (m.models || []).filter(mod => hosts.some(h => mod.presence?.[h.id]));
  if (hosts.length === 0) {
    return `<div class="empty-state">No hosts in this group.</div>`;
  }
  return `
    <div class="matrix-card">
      <div class="matrix-head">
        <div class="mc-select"></div>
        <div class="mc-model" style="padding:16px 18px 16px 0"><span class="mc-cap">Model</span></div>
        ${hosts.map(h => `
          <div class="mc-host">
            <div class="name">${h.id}</div>
            <div class="meta ${!h.reachable?"warn":""}">${h.label} · ${h.reachable ? fmtBytes(h.free_bytes || 0) + " free" : (h.error || "offline")}</div>
          </div>
        `).join("")}
        <div class="mc-action"></div>
      </div>
      ${models.length === 0 ? `<div class="empty-state">No models present on these hosts.</div>` : models.map(mod => renderMatrixRow(mod, hosts)).join("")}
    </div>
  `;
}

// Dedicated view for kind=telemak clusters in the Models matrix tab.
// Telemak runs on a single Mac with a local model store. The matrix
// inventory is the standard `/admin/sync/matrix` filtered to the
// telemak host. Per-model rows show size + loaded badge + load/unload
// (no sync/delete-from-host since there's only one host). HF download
// is enabled and lands in the host's configured `models_dir` (resolved
// from topology.yaml — the dashboard surfaces the resolved path above
// the form so the operator sees where the file is about to land).
function renderTelemakModelsCard(cid, cdef) {
  const status = state.cluster_status?.[cid];
  const modelsLoaded = Array.isArray(status?.models_loaded)
    ? status.models_loaded.filter(Boolean)
    : (status?.model ? [status.model] : []);
  const upstream = cdef?.upstream || status?.upstream || "";
  const reachable = status?.upstream_reachable !== false;
  const name = CLUSTERS.find(c => c.id === cid)?.name || cid;
  const wiredUsed = (typeof status?.wired_memory_used_gb === "number") ? status.wired_memory_used_gb : null;
  const wiredFree = (typeof status?.wired_memory_free_gb === "number") ? status.wired_memory_free_gb : null;
  const wiredTotal = (wiredUsed != null && wiredFree != null) ? (wiredUsed + wiredFree) : null;
  // Resolve the host(s) + models_dir for this telemak cluster from topology.
  // Telemak is single-host by design, but we tolerate >1 (operator-defined
  // multi-mac telemak fleet) and aggregate.
  const cdefNodes = cdef?.nodes || [];
  const hostIds = cdefNodes.map(n => n.host).filter(Boolean);
  const cdefSshs = cdefNodes.map(n => (n.ssh || "").trim()).filter(Boolean);
  // models_dir can be set at the cluster level (preferred for Telemak — single
  // editable field in Settings → Clusters → Telemak) or per-node (legacy /
  // multi-node telemak fleets). Cluster-level wins; per-node fills in only if
  // cluster-level isn't set.
  const clusterModelsDir = (cdef?.models_dir || "").trim();
  const modelsDirs = clusterModelsDir
    ? [clusterModelsDir]
    : Array.from(new Set(cdefNodes.map(n => n.models_dir).filter(Boolean)));
  const m = state.matrix;
  const allHosts = m?.hosts || [];
  // Match by host id OR by SSH target. SSH is the authoritative identifier
  // for Telemak: topology.yaml may still list the legacy cluster (e.g.
  // `telemak-max64` with host id `telemak`) while cluster-config.json has
  // a freshly UI-added entry (`telemak-64` with host id `telemak-64`).
  // Both point at the same Mac via the same admin@<ip> SSH, so SSH match
  // catches the legacy/new id drift without forcing a topology rewrite.
  const hosts = allHosts.filter(h => hostIds.includes(h.id) || cdefSshs.includes((h.ssh || "").trim()));
  // Models with presence on at least one telemak host, loaded-first then alpha.
  const inventory = (m?.models || [])
    .filter(mod => hosts.some(h => mod.presence?.[h.id]))
    .map(mod => ({
      ...mod,
      _loaded: modelsLoaded.includes(mod.name)
        || modelsLoaded.some(id => id.endsWith("/" + mod.name)),
    }))
    .sort((a, b) => {
      if (a._loaded !== b._loaded) return a._loaded ? -1 : 1;
      return a.name.localeCompare(b.name);
    });
  const rowFor = (mod) => {
    const presentSize = hosts.reduce((acc, h) => acc + (mod.presence?.[h.id] || 0), 0);
    const loaded = mod._loaded;
    const short = (mod.name.split("/").pop() || mod.name).toLowerCase();
    const alias = modelsLoaded.length <= 1 ? cid : `${cid}:${short}`;
    return `
      <div class="matrix-row" style="grid-template-columns:1fr auto auto auto;gap:14px;padding:10px 14px">
        <div class="mc-model" style="padding:0;min-width:0">
          <div class="name" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(mod.name)}</div>
          <div class="meta">${fmtBytes(presentSize)}${loaded ? ` · alias <span class="mono" style="color:var(--ink-2)">${escapeHtml(alias)}</span>` : ""}</div>
        </div>
        ${loaded
          ? `<span class="state-pill" style="padding:3px 8px;background:var(--green-soft);color:var(--green-deep);border-radius:4px;font-size:10px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;align-self:center">loaded</span>`
          : `<span style="padding:3px 8px;background:var(--ground);color:var(--ink-3);border-radius:4px;font-size:10px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;align-self:center">on disk</span>`}
        ${loaded
          ? `<button class="btn btn-xs btn-destructive" data-act="telemak-unload" data-cluster="${cid}" data-model="${escapeHtml(mod.name)}">${Icon.x}<span>Unload</span></button>`
          : `<button class="btn btn-xs" data-act="telemak-load" data-cluster="${cid}" data-model="${escapeHtml(mod.name)}">${Icon.play || ""}<span>Load</span></button>`}
        <span data-act="matrix-cell-trash" data-host="${escapeHtml(hosts[0]?.id || "")}" data-model="${escapeHtml(mod.name)}" style="cursor:pointer;color:var(--ink-2);display:inline-flex;align-items:center;padding:6px" title="Delete from disk">${Icon.trash}</span>
      </div>
    `;
  };
  return `
    <div class="matrix-card" style="padding:24px">
      <div style="display:flex;flex-direction:column;gap:14px">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <span style="font-size:18px;font-weight:600;color:var(--ink)">${escapeHtml(name)}</span>
          <span style="font-size:11px;padding:3px 8px;border-radius:4px;background:var(--amber-soft);color:var(--amber-deep);font-weight:600;letter-spacing:0.04em;text-transform:uppercase">telemak</span>
          ${reachable
            ? `<span style="font-size:11px;color:var(--green-deep);font-weight:600">● reachable</span>`
            : `<span style="font-size:11px;color:var(--rust);font-weight:600">● unreachable</span>`}
          ${(wiredUsed != null && wiredTotal != null)
            ? `<span style="font-size:11px;color:var(--ink-2);padding:2px 8px;background:var(--ground);border-radius:4px;font-weight:600">${wiredUsed.toFixed(1)} / ${wiredTotal.toFixed(1)} GB wired</span>`
            : ""}
        </div>
        <div style="display:flex;gap:14px;flex-wrap:wrap">
          <div style="flex:1;min-width:260px;padding:12px 14px;background:var(--ground);border-radius:8px;display:flex;flex-direction:column;gap:6px">
            <div style="font-size:11px;font-weight:600;color:var(--ink-2);letter-spacing:0.04em;text-transform:uppercase">Upstream</div>
            <div class="mono" style="font-size:13px;color:var(--ink);overflow-wrap:anywhere">${escapeHtml(upstream || "—")}</div>
          </div>
          <div style="flex:1;min-width:260px;padding:12px 14px;background:var(--ground);border-radius:8px;display:flex;flex-direction:column;gap:6px">
            <div style="font-size:11px;font-weight:600;color:var(--ink-2);letter-spacing:0.04em;text-transform:uppercase">Models directory</div>
            <div class="mono" style="font-size:13px;color:var(--ink);overflow-wrap:anywhere">${escapeHtml(modelsDirs.join(", ") || "— (set it in Settings → Clusters → Telemak)")}</div>
          </div>
        </div>
        <div style="padding:0;background:transparent;display:flex;flex-direction:column;gap:6px">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:0 4px">
            <div style="font-size:11px;font-weight:600;color:var(--ink-2);letter-spacing:0.04em;text-transform:uppercase">Models — ${inventory.length} on disk, ${modelsLoaded.length} loaded</div>
            ${hosts.length === 0
              ? `<span style="font-size:11px;color:var(--ink-3)">Click Refresh in the matrix tab to probe this host</span>`
              : ""}
          </div>
          ${inventory.length > 0
            ? `<div style="display:flex;flex-direction:column;gap:6px">${inventory.map(rowFor).join("")}</div>`
            : `<div class="empty-state" style="margin:0">No models found on disk for this host. Download one below.</div>`}
        </div>
      </div>
    </div>
    <div style="margin-top:24px">${renderHFDownload(cid)}</div>
  `;
}

function renderMatrixRow(mod, hosts) {
  const total = fmtBytes(mod.total_bytes);
  const presentCount = (mod.present_on||[]).length;
  return `
    <div class="matrix-row">
      <div class="mc-select">
        <div class="box ${state.sync_picker?.open && state.sync_picker.model===mod.name ? "on" : ""}" data-act="matrix-sync" data-v="${escapeHtml(mod.name)}" title="Select to sync ${escapeHtml(mod.name)}">
          ${state.sync_picker?.open && state.sync_picker.model===mod.name ? '<svg width="9" height="9" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>' : ""}
        </div>
      </div>
      <div class="mc-model">
        <div class="name">${escapeHtml(mod.name)}</div>
        <div class="meta">${total} · present on ${presentCount} host${presentCount!==1?"s":""}</div>
      </div>
      ${hosts.map(h => {
        const sz = mod.presence?.[h.id];
        if (sz) {
          const key = `${h.id}::${mod.name}`;
          const checked = state.delete_selected.has(key);
          const checkStyle = checked
            ? "background:var(--rust);border-color:var(--rust)"
            : "";
          return `
            <div class="mc-cell present">
              <div class="size">${fmtBytes(sz)}</div>
              <div class="row-icons">
                <div class="tinybox" style="${checkStyle};cursor:pointer" data-act="matrix-cell-toggle" data-v="${escapeHtml(key)}">${checked ? '<svg width="9" height="9" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>' : ""}</div>
                <span data-act="matrix-cell-trash" data-host="${escapeHtml(h.id)}" data-model="${escapeHtml(mod.name)}" style="cursor:pointer;color:var(--ink-2);display:inline-flex;align-items:center">${Icon.trash}</span>
              </div>
            </div>`;
        }
        return `<div class="mc-cell"><div class="dash">—</div></div>`;
      }).join("")}
      <div class="mc-action">
        <button class="btn btn-xs" data-act="matrix-sync" data-v="${escapeHtml(mod.name)}">${Icon.arrowRight}<span>Sync</span></button>
      </div>
    </div>
  `;
}

async function fetchMatrix(fresh) {
  state.matrix_loading = true;
  render();
  try {
    const url = fresh ? "/admin/sync/matrix?fresh=1" : "/admin/sync/matrix";
    state.matrix = await getJson(url);
  } catch (e) {
    toast("matrix failed: " + e.message, "err");
  } finally {
    state.matrix_loading = false;
    render();
  }
}

    <div class="pill-health ${cls}">
      <div class="pip-wrap"><div class="ring"></div><div class="core"></div></div>
      <div class="stack">

function renderRibbon() {
  const sel = state.selected_cluster;
  // Hide disabled clusters from the ribbon entirely. They're still reachable
  // via /admin/clusters/{id} for re-enabling but don't clutter the UI.
  const visibleClusters = CLUSTERS.filter(c => clusterDef(c.id)?.enabled !== false);
  const tabs = visibleClusters.map(c => {
    const p = clusterState(c.id);
    let badge = "Idle", model = "—";
    if (p?.loaded) {
      badge = `${p.nodes||1} NODE${p.nodes>1?"S":""} · Loaded`;
      model = p.model ? p.model.split('/').pop() : "—";
    } else {
      badge = "Idle";
    }
    const active = sel === c.id ? "active" : "";
    return `
      <button class="tab ${active}" data-cluster="${c.id}" data-act="pick-cluster">
        <div class="row1">
          <div class="pip"></div>
          <span class="name">${escapeHtml(c.name)}</span>
          <span class="meta">${escapeHtml(badge.toUpperCase())}</span>
        </div>
        <div class="sub">${escapeHtml(truncatePath(model, 60))}</div>
      </button>
    `;
  }).join("");
  // If user's selected cluster got disabled (e.g. via settings), bounce to
  // the first visible one so they don't see a blank pane.
  if (visibleClusters.length && !visibleClusters.find(c => c.id === sel)) {
    state.selected_cluster = visibleClusters[0].id;
  }
  return `
    <div class="ribbon">
      ${tabs}
      <button class="tab add" data-act="add-cluster">
        ${Icon.plus}
        <span class="name">Add cluster</span>
      </button>
    </div>
  `;
}

function renderClusterCard() {
  // Same card layout for every cluster — the rendering reads state.default
  // which is updated each refresh to point at the selected cluster's status.
  // Operator-defined cluster ids are just labels; the card needs no per-id
  // branching.
  if (!state.selected_cluster) {
    return `<section class="cluster-card"><div class="section"><div class="section-stack"><h1 style="font-family:var(--font-display);font-size:32px;font-weight:700;color:var(--ink);letter-spacing:-0.025em">No cluster configured</h1><div class="section-sub">Declare one in <span class="mono">~/.odysseus/topology.yaml</span> and restart the container.</div></div></div></section>`;
  }

}

// ─── Telemak Home card — single-node, multi-model (V1.x). Renders an
// N-row "Loaded models" list with per-row Unload + "+ Load another
// model" inline form. Empty state collapses to the same simple Load
// form as before so single-model users see no extra chrome.
function renderTelemakHomeCard(a, cid, label) {
  const upstream = a.upstream || "";
  const reachable = a.upstream_reachable !== false;
  const modelsLoaded = Array.isArray(a.models_loaded) ? a.models_loaded.filter(Boolean) : (a.model ? [a.model] : []);
  const loaded = modelsLoaded.length > 0;
  const wiredUsed = (typeof a.wired_memory_used_gb === "number") ? a.wired_memory_used_gb : null;
  const wiredFree = (typeof a.wired_memory_free_gb === "number") ? a.wired_memory_free_gb : null;
  const wiredTotal = (wiredUsed != null && wiredFree != null) ? (wiredUsed + wiredFree) : null;
  const memWarn = (wiredFree != null && wiredFree < 5);
  const statusPill = !reachable
    ? `<div class="pill-status" style="background:#fff5f5;border-color:var(--rust);color:var(--rust);font-weight:600;padding:3px 10px;border-radius:6px;font-size:11px;letter-spacing:0.04em;text-transform:uppercase">Upstream unreachable</div>`
    : loaded
      ? `<div class="pill-status"><div class="pip"></div><div class="label">${modelsLoaded.length} loaded</div></div>`
      : `<div class="pill-status idle"><div class="pip"></div><div class="label">Idle</div></div>`;
  const memPill = (wiredUsed != null && wiredTotal != null)
    ? `<div class="pill-status" style="background:${memWarn?'#fff5f5':'var(--ground)'};border-color:${memWarn?'var(--rust)':'var(--line)'};color:${memWarn?'var(--rust)':'var(--ink-2)'};font-weight:600;padding:3px 10px;border-radius:6px;font-size:11px;letter-spacing:0.04em;text-transform:uppercase">${wiredUsed.toFixed(1)} / ${wiredTotal.toFixed(1)} GB wired</div>`
    : "";
  const tpsPill = (typeof a.avg_tok_s_recent === "number" && a.avg_tok_s_recent > 0)
    ? `<div class="pill-status" style="background:var(--ground);border-color:var(--line);color:var(--ink-2);font-weight:600;padding:3px 10px;border-radius:6px;font-size:11px;letter-spacing:0.04em;text-transform:uppercase">${a.avg_tok_s_recent.toFixed(1)} tok/s</div>`
    : "";
  // Live-activity readout — see api.py:_telemak_status. The richer
  // fields (current_phase / current_tok_s / current_generated_tokens /
  // active_requests / last_error) come from Telemak's /admin/activity
  // (0.6.15+) when available; busy + sessions are the fallback when
  // the upstream is older.
  const phase = a.current_phase;
  const liveTps = (typeof a.current_tok_s === "number" && a.current_tok_s > 0)
    ? `${a.current_tok_s.toFixed(1)} tok/s` : "";
  const liveTokens = (typeof a.current_generated_tokens === "number" && a.current_generated_tokens > 0)
    ? `${a.current_generated_tokens} tok` : "";
  // current_request_started_at — Telemak ships an ISO-8601 string
  // ("2026-05-28T15:35:38.797Z"), older builds may have sent a float
  // (Unix seconds). Handle both.
  let elapsedS = null;
  if (typeof a.current_request_started_at === "string" && a.current_request_started_at) {
    const t = Date.parse(a.current_request_started_at);
    if (!Number.isNaN(t)) elapsedS = Math.max(0, Math.floor((Date.now() - t) / 1000));
  } else if (typeof a.current_request_started_at === "number" && a.current_request_started_at > 0) {
    elapsedS = Math.max(0, Math.floor(Date.now()/1000 - a.current_request_started_at));
  }
  // Phase pill — colored by what Telemak is doing right now.
  // idle      → no pill (idle is silence; the model-loaded pill carries the day)
  // prefill   → blue, pulsing dot (compute-heavy, no tokens yet)
  // decode / streaming → amber, pulsing dot + live tok/s + token count
  const phaseColors = {
    prefill:   { bg: "#e8f0fa", border: "var(--blue)",  ink: "var(--blue-deep)",  dot: "var(--blue)"  },
    decode:    { bg: "#fff8e6", border: "var(--amber)", ink: "var(--amber-deep)", dot: "var(--amber)" },
    streaming: { bg: "#fff8e6", border: "var(--amber)", ink: "var(--amber-deep)", dot: "var(--amber)" },
  };
  const phasePill = (phase && phase !== "idle" && phaseColors[phase])
    ? (() => {
        const c = phaseColors[phase];
        const detail = [liveTps, liveTokens, elapsedS !== null ? `${elapsedS}s` : ""]
          .filter(Boolean).join(" · ");
        return `<div class="pill-status" style="background:${c.bg};border-color:${c.border};color:${c.ink};font-weight:600;padding:3px 10px;border-radius:6px;font-size:11px;letter-spacing:0.04em;text-transform:uppercase" title="${escapeHtml(a.current_model || "")}"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${c.dot};margin-right:5px;animation:pulse 1s infinite;vertical-align:middle"></span>${phase}${detail ? " · " + detail : ""}</div>`;
      })()
    : "";
  // Legacy "generating" pill, only when /admin/activity isn't available
  // (Telemak < 0.6.15) but busy heuristic kicked in via /admin/sessions.
  const busyPill = (!phasePill && a.busy)
    ? `<div class="pill-status" style="background:#fff8e6;border-color:var(--amber);color:var(--amber-deep);font-weight:600;padding:3px 10px;border-radius:6px;font-size:11px;letter-spacing:0.04em;text-transform:uppercase"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--amber);margin-right:5px;animation:pulse 1s infinite;vertical-align:middle"></span>generating</div>`
    : "";
  // Active concurrent requests (only meaningful when > 1 — Telemak runs
  // one turn at a time per model, but queues can stack).
  const reqsPill = (typeof a.active_requests === "number" && a.active_requests > 1)
    ? `<div class="pill-status" style="background:var(--ground);border-color:var(--line);color:var(--ink-2);font-weight:600;padding:3px 10px;border-radius:6px;font-size:11px;letter-spacing:0.04em;text-transform:uppercase">${a.active_requests} req</div>`
    : "";
  const sessionsPill = (typeof a.active_sessions_count === "number" && a.active_sessions_count > 0)

    : "";
  // last_error from /admin/activity — surface as a red pill so the
  // operator notices without having to dig into logs. Cleared when

  const rows = modelsLoaded.map((id) => {

    const d = details[id] || {};

        <button class="btn btn-xs btn-destructive" data-act="telemak-unload" data-cluster="${cid}" data-model="${escapeHtml(id)}" title="Unload ${escapeHtml(id)}">${Icon.x}<span>Unload</span></button>
      </div>

  // Free-text fallback (used by the "Or type an arbitrary model id" section).
  const loadFormBody = `
    <div class="field">
      <input class="ce-input mono" data-act="telemak-load-edit-model" data-cluster="${cid}" value="${escapeHtml(f.model || "")}" placeholder="inferencerlabs/Qwen3.6-35B-A3B-MLX-9bit" style="width:100%"/>
      <div style="font-size:11px;color:var(--ink-2);margin-top:4px">Hugging Face repo id or path the Telemak binary can resolve via its model loader.</div>

      ${loaded ? `<button class="btn btn-sm" data-act="telemak-load-cancel" data-cluster="${cid}">Cancel</button>` : ""}
      ${f.error ? `<div style="color:var(--rust);font-size:12px;align-self:center">${escapeHtml(f.error)}</div>` : ""}

  // Picker form used by "Add another model" — a dropdown sourced from the

    // Lazy-fetch so the dropdown has data when the form opens. Safe: the
    // fetch helper re-renders on resolve.

  const _loadedSetAdd = new Set(modelsLoaded);
  const _addCandidates = (_availAdd || []).filter(m => !_loadedSetAdd.has(m.id));
  const loadFormPicker = `
    <div class="field">
      <select class="ce-input mono" data-act="telemak-load-edit-model" data-cluster="${cid}" style="width:100%">
        <option value="">${_availAdd == null ? "Discovering models…" : (_addCandidates.length ? "— pick a model —" : "no other models on disk")}</option>
        ${_addCandidates.map(m => {
          const short = (m.id.split("/").pop() || m.id);
          const sizeGB = m.size_bytes ? ` — ${(m.size_bytes/1024/1024/1024).toFixed(1)} GB` : "";
          const sel = m.id === f.model ? "selected" : "";
          return `<option value="${escapeHtml(m.id)}" ${sel}>${escapeHtml(short)}${sizeGB}</option>`;
        }).join("")}
      </select>
      <div style="font-size:11px;color:var(--ink-2);margin-top:4px">Pick a model discovered on the Telemak node. Need an id that isn't on disk? Type it below.</div>
    </div>
    <div class="field">
      <input class="ce-input mono" data-act="telemak-load-edit-model" data-cluster="${cid}" value="${escapeHtml(f.model || "")}" placeholder="…or an arbitrary repo id / path" style="width:100%;font-size:11px"/>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-sm" style="background:var(--blue);color:white;border-color:var(--blue)" ${busy || !f.model ? "disabled":""} data-act="telemak-load-submit" data-cluster="${cid}">${busy?"Loading…":"Load"}</button>
      ${loaded ? `<button class="btn btn-sm" data-act="telemak-load-cancel" data-cluster="${cid}">Cancel</button>` : ""}
      ${f.error ? `<div style="color:var(--rust);font-size:12px;align-self:center">${escapeHtml(f.error)}</div>` : ""}
    </div>
  `;

  return `
    <section class="cluster-card">
      <div class="section" style="border-bottom: 1px solid var(--line)">
        <div class="section-head">
          <div class="h1-cluster">
            <div class="row">
              <h1>${escapeHtml(label)}</h1>
              ${statusPill}
              ${phasePill}
              ${busyPill}
              ${reqsPill}
              ${sessionsPill}
              ${errPill}
              ${memPill}
              ${tpsPill}
            </div>
            <div class="topo">
              <span class="text">telemak · native swift · single-node</span>
              <span class="dot">·</span>
              <span class="mono">${escapeHtml(upstream || "—")}</span>
            </div>
          </div>
          <div class="quick-actions">
            <button class="btn btn-sm" data-act="refresh">${Icon.refresh}<span>Refresh</span></button>
            <button class="btn btn-sm" data-act="cluster-settings" data-cluster="${cid}">${Icon.settings}<span>Cluster settings</span></button>
            <span style="width:1px;align-self:stretch;background:var(--line);margin:2px 4px"></span>
            <span style="align-self:center;font-size:11px;color:var(--ink-3);margin-right:2px">Service</span>
            <button class="btn btn-sm" data-act="telemak-lifecycle" data-cluster="${cid}" data-life="start" title="Bootstrap the Telemak launchd service on its Mac (use after Quit)">${Icon.play || ""}<span>Start</span></button>
            <button class="btn btn-sm" data-act="telemak-lifecycle" data-cluster="${cid}" data-life="stop" title="SIGTERM the process — KeepAlive relaunches it (soft bounce)"><span>Stop</span></button>

            <button class="btn btn-sm btn-destructive" data-act="telemak-lifecycle" data-cluster="${cid}" data-life="quit" title="Boot the service out — stays DOWN until you press Start">${Icon.x || ""}<span>Quit</span></button>
          </div>
        </div>
      </div>

      ${!reachable ? `<div style="margin:16px;padding:12px 14px;background:#fff5f5;border:1px solid var(--rust);border-radius:6px;color:var(--rust);font-size:13px">
        <b>Upstream unreachable.</b> Cannot reach <span class="mono">${escapeHtml(upstream)}</span>. Check that Telemak is running on that Mac : <span class="mono">ssh ${escapeHtml((a.topologies?.["1"]?.[0]?.ssh) || "")} 'curl -s http://localhost:8003/health'</span>
      </div>` : ""}

      ${loaded ? `
        <div class="section">
          <div class="section-head" style="margin-bottom:10px">
            <div class="section-stack">
              <div class="section-title">Loaded models (${modelsLoaded.length})</div>
              <div class="section-sub">${modelsLoaded.length === 1
                ? `Companion routes via <span class="mono">model: "${escapeHtml(cid)}"</span>`
                : `Companion routes via <span class="mono">model: "${escapeHtml(cid)}:&lt;short&gt;"</span>`}</div>
            </div>
            ${reachable ? `<button class="btn btn-sm" data-act="telemak-load-toggle" data-cluster="${cid}">${Icon.plus}<span>${formOpen ? "Cancel" : "Load another model"}</span></button>` : ""}
          </div>
          <div style="display:flex;flex-direction:column;gap:6px">
            ${rows}
          </div>
          ${formOpen ? `
            <div style="display:grid;gap:10px;max-width:680px;margin-top:14px;padding:14px;background:var(--surface);border:1px dashed var(--line);border-radius:8px">
              <div style="font-family:var(--font-display);font-weight:600;font-size:13px">Add another model</div>

      ${reachable ? renderTelemakLoadConfig(cid, modelsLoaded) : ""}

      ${!loaded && reachable ? `
        <div class="section">

          <div style="display:grid;gap:10px;max-width:680px">

  `;
}

// ─── Telemak Load configuration ─ Argo-style rich swap form ───────────
// Sits below the "Loaded models" list. Lets Sophie pick a target model
// (and optionally an MTP draft) from the available-on-disk dropdown,
// toggle KV cache Q8, and SWAP — i.e. unload current + load new in
// one click. The existing "+ Load another model" button next to the
// list keeps the STACK semantic (add in addition).
//
// Data source : `GET /admin/clusters/<cid>/models` (already exposed by
// Odysseus, walks the upstream's models_dir via SSH). Cached in
// state.telemak_available_models[cid] ; refreshed on the refresh
// button click (telemak-config-refresh).
// Fire-and-forget fetch helper for the Telemak Load configuration
// dropdown. Cached in state.telemak_available_models[cid] ; called
// lazily on first render of the rich form and on refresh button click.
// Module-scope so both render() and handleAct() can reach it.
async function fetchTelemakAvailable(cid) {
  if (!state.telemak_available_models) state.telemak_available_models = {};
  if (!state.fetching_telemak_models) state.fetching_telemak_models = {};
  state.fetching_telemak_models[cid] = true;
  try {
    const r = await fetch(`/admin/clusters/${encodeURIComponent(cid)}/models`);
    if (!r.ok) {
      state.telemak_available_models[cid] = [];
    } else {
      const data = await r.json();
      state.telemak_available_models[cid] = data.data || [];
      if (data.models_dir) {
        if (!state.cluster_models_dir) state.cluster_models_dir = {};
        state.cluster_models_dir[cid] = data.models_dir;
      }
    }
  } catch (err) {
    state.telemak_available_models[cid] = [];
  } finally {
    state.fetching_telemak_models[cid] = false;
    render();
  }
}

function renderTelemakLoadConfig(cid, modelsLoaded) {
  const cfg = state.telemak_load_config?.[cid] || {};
  const available = state.telemak_available_models?.[cid];
  const busy = !!state.busy_telemak_apply?.[cid];
  const modelsDir = state.cluster_models_dir?.[cid] || "(default)";

  if (available == null) {
    // Lazy fetch on first render. Triggers a single network call ; the
    // next render after fetchTelemakAvailable resolves will populate
    // the dropdowns.
    if (!state.fetching_telemak_models?.[cid]) {
      state.fetching_telemak_models = state.fetching_telemak_models || {};
      state.fetching_telemak_models[cid] = true;
      fetchTelemakAvailable(cid);
    }
  }

  const list = available || [];
  // Heuristic split : MTP-suffixed model ids go in the MTP dropdown,
  // the rest are chat-model candidates. Filter out anything already
  // loaded (the swap dropdown picks something NEW).
  const isMTP = (id) => /-MTP-MLX/i.test(id) || /mtp/i.test(id);
  const loadedSet = new Set(modelsLoaded.map(m => m));
  const chatCandidates = list.filter(m => !isMTP(m.id) && !loadedSet.has(m.id));
  const mtpCandidates = list.filter(m => isMTP(m.id));

  // Build the dropdown options. Show short name + size, value is the
  // full path (which Telemak's loader accepts directly).
  const buildOpts = (items, includeNone = false) => {
    const opts = includeNone ? `<option value="">— none —</option>` : "";
    return opts + items.map(m => {
      const short = (m.id.split("/").pop() || m.id);
      const sizeGB = m.size_bytes ? (m.size_bytes / 1024 / 1024 / 1024).toFixed(1) + " GB" : "";
      const sel = (m.id === cfg.model || m.id === cfg.mtp) ? "selected" : "";
      return `<option value="${escapeHtml(m.id)}" ${sel}>${escapeHtml(short)}${sizeGB ? ` — ${sizeGB}` : ""}</option>`;
    }).join("");
  };

  const canApply = !busy && cfg.model && !loadedSet.has(cfg.model);
  const helpText = available == null
    ? `Discovering models on ${escapeHtml(modelsDir)}…`
    : (chatCandidates.length === 0
      ? `No swappable models found on ${escapeHtml(modelsDir)}.`
      : (cfg.model ? `Will unload current + load <span class="mono">${escapeHtml((cfg.model.split("/").pop() || cfg.model))}</span>.` : `Pick a model from the dropdown to swap.`));

  return `
    <div class="section" style="border-top:1px solid var(--line)">
      <div class="section-head" style="margin-bottom:10px">
        <div class="section-stack">
          <div class="section-title">Load configuration</div>
          <div class="section-sub">Swap to a different model</div>
        </div>
        <!-- "Manage models →" intentionally absent on Telemak screens.
             The Models tab targets OdyssAI-X-managed pools (load/unload
             planning, capacity-aware multi-pool routing) — none of that
             applies here. Telemak owns its model lifecycle itself; the
             "Load configuration" block above is the operator surface
             for it. Removed 2026-05-29 after Sophie called out the
             button as broken on Telemak screens. -->
      </div>
      <div style="display:grid;grid-template-columns:1fr 2fr;gap:14px;max-width:920px">
        <div>
          <div class="field-label" style="margin-bottom:4px">Models directory</div>
          <div style="display:flex;gap:6px;align-items:center">
            <input class="ce-input mono" value="${escapeHtml(modelsDir)}" readonly style="flex:1;background:var(--ground);color:var(--ink-2)"/>
            <button class="btn btn-xs" data-act="telemak-config-refresh" data-cluster="${cid}" title="Re-scan models directory">${Icon.refresh}</button>
          </div>
        </div>
        <div>
          <div class="field-label" style="margin-bottom:4px">Model</div>
          <select class="ce-input mono" data-act="telemak-config-select-model" data-cluster="${cid}" style="width:100%">
            <option value="">— pick a model —</option>
            ${buildOpts(chatCandidates)}
          </select>
        </div>

        <div style="display:flex;flex-direction:column;justify-content:space-between">
          <div style="font-size:12px;color:var(--ink-2)">${helpText}</div>
          <div style="display:flex;align-items:center;justify-content:flex-end;gap:14px">
            <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-2);cursor:pointer">
              <input type="checkbox" data-act="telemak-config-toggle-kv-q8" data-cluster="${cid}" ${cfg.kv_q8 ? "checked" : ""}/>
              KV cache Q8
              <span style="color:var(--ink-3);font-size:11px">long contexts</span>
            </label>
            <button class="btn btn-sm" style="background:${canApply ? "var(--blue)" : "var(--ink-3)"};color:white;border-color:${canApply ? "var(--blue)" : "var(--ink-3)"}" ${canApply ? "" : "disabled"} data-act="telemak-config-apply" data-cluster="${cid}">${busy ? "Applying…" : "✓ Apply & reload"}</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

// Multi-pool readout for Default (2026-05-19). Always renders when there's
// at least one pool, with a "+ Add pool" button for spawning extras on
// disjoint node subsets. The inline form (renderArgoAddPoolForm) toggles
// below this when the user clicks Add.
function renderArgoPoolsList(a) {
  const pools = a?.pools || [];
  if (pools.length === 0) return "";  // load form covers the empty state
  const argoMax = a?.max_nodes || 4;
  const rows = pools.map((p) => {
    const hostNames = (p.topology || []).map(t => t.host || "?").join(" + ");
    const conc = (p.model || "").split("/").pop();
    const tps = p.recent_avg_tps != null ? `${p.recent_avg_tps} tok/s` : "—";
    const aliasIsDefault = p.alias === "default";
    return `
      <div style="display:flex;align-items:center;gap:12px;padding:8px 12px;background:var(--surface);border:1px solid var(--line);border-radius:6px;font-family:var(--font-mono);font-size:12px">
        <span style="font-weight:600;color:var(--ink);min-width:80px">${escapeHtml(p.alias)}</span>
        <span style="color:var(--ink-2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(conc)}</span>
        <span style="color:var(--ink-3);font-size:11px">${p.nodes_count || p.nodes || 0} node · ${escapeHtml(hostNames)}</span>
        <span style="color:var(--ink-3);font-size:11px">${tps}</span>
        <button class="btn btn-xs btn-destructive" data-act="default-unload-alias" data-alias="${escapeHtml(p.alias)}" ${aliasIsDefault ? 'title="Default alias — also stoppable via the main Stop button"' : ''}>${Icon.x}<span>Stop</span></button>
      </div>
    `;
  }).join("");
  const usedIdx = new Set(a?.nodes_in_use || []);
  const free = [];
  for (let i = 0; i < argoMax; i++) if (!usedIdx.has(i)) free.push(i);
  const f = state.pending_form;
  const canAdd = free.length > 0;
  return `
    <div class="section" style="padding-top:0">
      <div class="section-head">
        <div class="section-stack">
          <div class="section-title">Pools (${pools.length})</div>
          <div class="section-sub">${
            free.length === 0
              ? "all nodes occupied — no room for another pool"
              : `free nodes: ${free.map(i => "#" + i).join(", ")}`
          }</div>
        </div>
        <button class="btn btn-sm ${canAdd?'':'btn-disabled'}" data-act="default-add-toggle" ${canAdd?'':'disabled'}>${Icon.plus}<span>${f.default_add_open ? 'Cancel add' : 'Add pool'}</span></button>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;margin-top:12px">
        ${rows}
      </div>
      ${f.default_add_open && canAdd ? renderArgoAddPoolForm(a, free) : ''}
    </div>
  `;
}

// Inline "+ Add pool" form. Lives under the Pools list when toggled.
// Disjoint node subset chips show which indices are free (clickable)
// vs occupied (disabled). On submit, POST /admin/default/load with the
// alias + node_indices we built.
function renderArgoAddPoolForm(a, freeIndices) {
  const f = state.pending_form;
  const models = state.default_models || [];
  const selectedModel = f.default_add_model || (models[0] && models[0].id) || "";
  const argoMax = a?.max_nodes || 4;
  const usedIdx = new Set(a?.nodes_in_use || []);
  const hostsByIdx = ((state.cluster_defs?.default?.nodes) || []).map(n => n.host);
  const aliasOk = /^[a-z0-9][a-z0-9_-]{0,30}$/.test(f.default_add_alias)
                  && f.default_add_alias !== "default";
  const chosenIndices = Object.keys(f.default_add_indices || {})
    .filter(k => f.default_add_indices[k])
    .map(k => parseInt(k, 10))
    .filter(i => freeIndices.includes(i));
  const canSubmit = aliasOk && selectedModel && chosenIndices.length > 0;
  const opts = models.map(m => {
    const sel = m.id === selectedModel ? 'selected' : '';
    const sz = m.size_bytes ? ` — ${(m.size_bytes/1024**3).toFixed(1)} GB` : '';
    return `<option value="${escapeHtml(m.id)}" ${sel}>${escapeHtml(truncatePath(m.id, 80))}${sz}</option>`;
  }).join("");
  const chips = [];
  for (let i = 0; i < argoMax; i++) {
    const occupied = usedIdx.has(i);
    const picked = !!f.default_add_indices[i];
    const host = hostsByIdx[i] || `#${i}`;
    const cls = occupied ? "pill missing" : picked ? "pill selected" : "pill available";
    chips.push(`<button class="${cls}" data-act="default-add-idx" data-v="${i}" ${occupied ? 'disabled title="Occupied by another pool"' : ''}>${i}<div class="under"></div><div style="font-size:9px;line-height:10px;margin-top:1px;opacity:0.7">${escapeHtml(host)}</div></button>`);
  }
  return `
    <div style="display:flex;flex-direction:column;gap:12px;margin-top:14px;padding:14px;background:var(--surface);border:1px dashed var(--line);border-radius:8px">
      <div style="font-family:var(--font-display);font-weight:600;font-size:13px">New concurrent pool</div>
      <div class="form-row" style="align-items:flex-end;gap:12px">
        <div class="field" style="flex:0 0 200px">
          <div class="field-label">Alias</div>
          <div class="field-shell">
            <input data-act="form-default-add-alias" value="${escapeHtml(f.default_add_alias||"")}" placeholder="default-big" style="font-family:var(--font-mono);font-size:12px">
          </div>
          <div style="font-size:10px;color:${aliasOk?'var(--green-deep)':'var(--rust-deep)'};margin-top:3px">
            ${aliasOk ? '✓ valid' : 'lowercase, alphanumeric + _ -, not "default"'}
          </div>
        </div>
        <div class="field" style="flex:1">
          <div class="field-label">Model</div>
          <div class="field-shell">

// Big loading banner shown while a pool is actively loading a model.
// Pulls progress from /admin/<cluster>/status .loading field and infers the
// current pipeline stage from the latest runner log lines (which we already
// stream over SSE).
// Banner shown when the cluster is degraded (JACCL crash, wired memory
// leak after sweep, etc.). Renders BEFORE the loading banner so it's
// the first thing the operator sees, and offers the Reset button that
// runs the full recovery ladder (cancel → stop → sweep → clear sessions
// → verify). Disappears as soon as a clean reset / sweep completes.
function renderDegradedBanner(p, clusterId) {
  const deg = p?.degraded;
  if (!deg) return "";
  const since = deg.at ? new Date(deg.at * 1000).toLocaleTimeString() : "—";
  const detail = deg.details
    ? `<details style="margin-top:6px"><summary style="cursor:pointer;font-size:11px;color:var(--ink-3)">details</summary><pre style="font-family:var(--font-mono);font-size:10px;color:var(--ink-2);white-space:pre-wrap;margin:6px 0;padding:6px;background:var(--surface-2);border-radius:4px;max-height:200px;overflow:auto">${escapeHtml(JSON.stringify(deg.details, null, 2))}</pre></details>`
    : "";
  return `
    <div class="lock-banner" style="background:rgba(180,70,50,0.08);border-color:rgba(180,70,50,0.5)">
      <div class="icon-wrap" style="color:var(--rust-deep)">${Icon.lock}</div>
      <div class="body">
        <div class="title-line">
          <div class="title" style="color:var(--rust-deep)">${escapeHtml(clusterId)} degraded — reload refused until reset</div>
          <div class="tag" style="background:var(--rust-soft);color:var(--rust-deep)">since ${since}</div>
        </div>
        <div class="detail" style="color:var(--ink-2)">${escapeHtml(deg.reason || "")}</div>
        ${detail}
      </div>
      <div class="actions">
        <button class="btn btn-warn btn-sm" data-act="cluster-reset" data-cluster="${escapeHtml(clusterId)}"><span>Run recovery ladder</span></button>
      </div>
    </div>
  `;
}

function renderLoadingBanner(p, clusterId) {
  const loading = p?.loading;
  if (!loading) return "";
  const pct = Math.max(2, Math.min(100, loading.progress_pct || 0));
  const elapsed = loading.elapsed_s || 0;
  const eta = Math.max(0, (loading.estimated_s || 0) - elapsed);
  const sizeGb = loading.size_bytes ? (loading.size_bytes / (1024**3)).toFixed(1) : null;
  const model = (loading.model || "—").split("/").pop();
  // Try to surface the latest meaningful loading log line as the "stage"
  const stages = (state.logs || []).filter(l => {
    const t = (l.text || "").toLowerCase();
    return /loading|shard|barrier|ready|init|jaccl|tokenizer/.test(t);
  }).slice(-3);
  return `
    <div class="load-banner">
      <div class="lb-head">
        <div class="lb-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M21 12a9 9 0 1 1-9-9" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
            <path d="M21 4v5h-5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="lb-body">
          <div class="lb-title">
            <div class="lb-label">Loading model</div>
            <div class="lb-tag">${(loading.nodes || 1)} node${(loading.nodes||1)>1?"s":""}</div>
            ${sizeGb ? `<div class="lb-tag" style="background:var(--blue-deep)">${sizeGb} GB</div>` : ""}
          </div>
          <div class="lb-model">${escapeHtml(model)}</div>
        </div>
        <div class="lb-stats">
          <div class="lb-stat"><div class="cap">Elapsed</div><div class="val">${elapsed.toFixed(0)} s</div></div>
          <div class="lb-stat"><div class="cap">ETA</div><div class="val">${eta.toFixed(0)} s</div></div>
        </div>
      </div>
      <div class="lb-bar">
        <div class="lb-track"><div class="lb-fill" style="width:${pct}%"></div></div>
        <div class="lb-pct">${pct.toFixed(0)}%</div>
      </div>
      ${Array.isArray(loading.ranks) && loading.ranks.length > 0 ? `
        <div style="display:flex;flex-direction:row;gap:8px;margin-top:8px;flex-wrap:wrap">
          ${loading.ranks.map(r => {
            const phaseColors = {
              "spawning":"var(--ink-3)", "init":"var(--ink-3)",
              "group_ready":"var(--blue-deep)", "loading_weights":"var(--blue-deep)",
              "sharding":"var(--amber-deep)", "sharded":"var(--amber-deep)",
              "loading_tokenizer":"var(--blue-deep)", "barrier":"var(--green-deep)",
              "loaded":"var(--green-deep)",
              "dead":"var(--rust-deep)", "error":"var(--rust-deep)",
              "oom":"var(--rust-deep)", "jaccl_error":"var(--rust-deep)",
            };
            const c = phaseColors[r.phase] || "var(--ink-2)";
            const age = r.phase_age_s != null ? ` ${r.phase_age_s.toFixed(0)}s` : "";
            return `
              <div style="display:flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(255,255,255,0.15);border-radius:6px;font-size:11px;font-family:var(--font-mono)">
                <div style="width:6px;height:6px;border-radius:3px;background:${c}"></div>
                <span style="color:rgba(255,255,255,0.95);font-weight:600">rank ${r.rank}</span>
                <span style="color:rgba(255,255,255,0.75)">${escapeHtml(r.phase)}${age}</span>
                ${r.exit_code != null ? `<span style="color:var(--rust-soft);font-weight:600">exit=${r.exit_code}</span>` : ""}
              </div>
            `;
          }).join("")}
        </div>
      ` : ""}
      ${stages.length ? `
        <div class="lb-stage">
          <div class="dot"></div>
          <span>${escapeHtml((stages[stages.length-1].text || "").slice(0, 140))}</span>
        </div>

// HAL 9000 activity orb — SVG with breathing glow + random sparks.
// `state` is one of: idle | loading | running.
// `size` is the svg pixel size (default 40).
function renderHalOrb(stateClass, size = 40) {
  const sz = size;
  const isIdle = stateClass === "idle";
  const isLoading = stateClass === "loading";
  // Color palette per state
  const coreColor = isIdle ? "#9AA4B0" : "#3D7BD9";
  const haloFar  = isIdle ? "#5C6B7F" : "#0050B7";
  const ringColor = isIdle ? "#C9D0D7" : "#0050B7";
  // Pulse speed: faster while loading, medium while running, slow while idle
  const pulseDur = isIdle ? "3.6s" : isLoading ? "0.9s" : "1.7s";
  const innerR1 = isIdle ? "11" : "12";
  const innerR2 = isIdle ? "14" : "16";
  // Sparks: only show when running
  const showSparks = stateClass === "running";
  // Pre-positioned "neuron" sparks at semi-random points inside the lens
  const sparks = !showSparks ? "" : [
    {x: 18, y: 22, r: 0.9, dur: "0.7s", begin: "0s"},
    {x: 42, y: 24, r: 0.8, dur: "0.9s", begin: "0.18s"},
    {x: 22, y: 42, r: 1.0, dur: "0.65s", begin: "0.4s"},
    {x: 40, y: 40, r: 0.9, dur: "0.85s", begin: "0.62s"},
    {x: 30, y: 16, r: 0.7, dur: "0.55s", begin: "1.0s"},
    {x: 14, y: 32, r: 0.8, dur: "0.95s", begin: "1.3s"},
    {x: 46, y: 32, r: 0.7, dur: "0.6s", begin: "1.55s"},
    {x: 30, y: 46, r: 0.9, dur: "0.75s", begin: "1.8s"},
  ].map((s, i) => `
    <circle cx="${s.x}" cy="${s.y}" r="${s.r}" fill="#A5C7F5">
      <animate attributeName="opacity" values="0;0.95;0" dur="${s.dur}" begin="${s.begin}" repeatCount="indefinite"/>
    </circle>
  `).join("");
  const gradId = `hal-glow-${stateClass}`;
  return `
    <div class="hal-orb ${stateClass}">
      <svg width="${sz}" height="${sz}" viewBox="0 0 60 60">
        <defs>
          <radialGradient id="${gradId}">
            <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
            <stop offset="22%" stop-color="${coreColor}" stop-opacity="0.92"/>
            <stop offset="55%" stop-color="${haloFar}" stop-opacity="0.55"/>
            <stop offset="100%" stop-color="${haloFar}" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <!-- lens housing -->
        <circle cx="30" cy="30" r="28" fill="#0E1B2A"/>
        <circle cx="30" cy="30" r="27.2" fill="none" stroke="${ringColor}" stroke-width="0.5" opacity="0.4"/>
        <!-- pulsing glow halo -->
        <circle cx="30" cy="30" r="22" fill="url(#${gradId})">
          <animate attributeName="r" values="${innerR1};${innerR2};${innerR1}" dur="${pulseDur}" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.75;1;0.75" dur="${pulseDur}" repeatCount="indefinite"/>
        </circle>
        <!-- iris core -->
        <circle cx="30" cy="30" r="3.6" fill="${coreColor}" opacity="0.6"/>
        <circle cx="30" cy="30" r="2" fill="#FFFFFF" opacity="${isIdle ? 0.5 : 0.95}"/>
        ${sparks}
      </svg>
    </div>
  `;
}

function renderStateTimeline(a) {
  const loading = !!a?.loading;
  const loaded = !!a?.loaded;
  const inflight = (state.runs || []).filter(r => r.cluster === state.selected_cluster).length;
  let active = "idle";
  if (loading) active = "loading";
  else if (loaded && inflight > 0) active = "running";
  else if (loaded) active = "waiting";
  const phases = ["idle", "loading", "waiting", "running"];
  return `
    <div class="state-timeline">
      ${phases.map((p, i) => {
        const isActive = p === active;
        const isPast = phases.indexOf(active) > i;
        const pillCls = isActive ? ("active " + (active === "loading" ? "loading" : "")) : "";
        const lineCls = isPast ? ("active " + (active === "loading" ? "loading" : "")) : "";
        return `
          <div class="state-pill ${pillCls}">
            <div class="pip"></div>
            <span class="label">${p.charAt(0).toUpperCase()+p.slice(1)}</span>
          </div>
          ${i < phases.length - 1 ? `<div class="state-line ${lineCls}"></div>` : ""}

}

// Global cluster-RAM bar — the model's footprint over the whole cluster's RAM.
// The per-node bars to the right each show one machine's RAM; this aggregates
// the loaded model against the summed RAM of every probed node (e.g. a 766 GB
// checkpoint on 1536 GB of cluster RAM → 50%). Numerator prefers the model's
// known size (matches the checkpoint exactly); falls back to summed runner RSS.
function renderGlobalRam(a, clusterId) {
  const tele = clusterTelemetry(clusterId);
  if (!tele.length) return "";
  const ramTotalB = tele.reduce((s, h) => s + (h.ram_total_bytes || 0), 0);
  if (!ramTotalB) return "";
  let modelB = 0;
  if (a.loaded) {
    const modelList = state.cluster_models?.[clusterId] || state.default_models || [];
    const m = (modelList || []).find(x => x.id === a.model);
    if (m && m.size_bytes) modelB = m.size_bytes;
    if (!modelB) modelB = tele.reduce((s, h) =>
      s + ((h.runner_procs && h.runner_procs[0] && h.runner_procs[0].rss_bytes) || 0), 0);
  }
  const pct = modelB ? Math.min(100, Math.round(modelB / ramTotalB * 100)) : 0;
  const totalGb = gbBytes(ramTotalB);
  const gbText = modelB
    ? `${gbBytes(modelB).toFixed(0)}GB / ${totalGb.toFixed(0)}GB`
    : `— / ${totalGb.toFixed(0)}GB`;
  return `
    <div class="global-ram">
      <div class="gr-row">
        <div class="gr-label">Global</div>
        <div class="gr-stack">
          <div class="gr-pct${modelB ? "" : " muted"}">${pct}</div>
          <div class="gr-pct-sm">%</div>
          <div class="gr-gb">${gbText}</div>
        </div>
      </div>
      <div class="led-bar global-led">${ledSegments(pct)}</div>
    </div>
  `;
}

function renderTelemetryHead() {
