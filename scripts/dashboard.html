<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>OdyssAI-X — odyssai.eu</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" type="image/png" href="/odysseus.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ─── Design tokens (maritime · blue accent) ─────────────────────── */
:root {
  --font-text:    "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
  --font-display: "Inter Tight", "Inter", sans-serif;
  --font-mono:    "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;

  --ground:       #F4F6F8;
  --surface:      #FFFFFF;
  --surface-2:    #FAFBFC;

  --ink:          #0E1B2A;
  --ink-2:        #5C6B7F;
  --ink-3:        #787878;
  --ink-4:        #C9D0D7;

  --line:         #E5E9EE;
  --line-soft:    #F0F2F5;

  --blue:         #0050B7;
  --blue-deep:    #003285;
  --blue-soft:    #E8F0FA;
  --blue-border:  #C7D6EC;

  --green:        #3E6B4F;
  --green-deep:   #2A4A38;
  --green-soft:   #EAF1EC;
  --green-border: #C5D8C9;

  --amber:        #C8932A;
  --amber-deep:   #7C5A1F;
  --amber-soft:   #FBF1E2;
  --amber-border: #E8C883;

  --rust:         #B85042;
  --rust-deep:    #8B3A2E;
  --rust-soft:    #F7E5E2;

  --violet:       #5B4180;
  --violet-soft:  #F4F0F8;

  --slate-blue:   #4A6580;
  --slate-soft:   #E8EEF4;

  --orange:       #A85F1E;
  --orange-soft:  #FAEFE5;
}

/* ─── Reset + base ────────────────────────────────────────────────── */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-text);
  background-color: var(--ground);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
button { font: inherit; cursor: pointer; }
button:disabled { cursor: not-allowed; opacity: 0.5; }
input, select { font: inherit; }
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }
h1, h2, h3 { margin: 0; }

/* ─── Layout ──────────────────────────────────────────────────────── */
.stage { display: flex; flex-direction: column; min-height: 100vh; }
.main { display: flex; flex-direction: column; gap: 28px; padding: 32px 56px 40px; }
.main > section.card { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; overflow: hidden; }

/* ─── Header ──────────────────────────────────────────────────────── */
.header {
  display: flex; flex-direction: row; align-items: center; justify-content: space-between;
  padding: 22px 56px 18px; border-bottom: 1px solid var(--line); background: var(--surface);
}
.brand { display: flex; flex-direction: row; align-items: center; gap: 16px; }
.brand-glyph {
  width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
  background-color: var(--ink); border-radius: 8px; flex-shrink: 0;
  background-image: url(/odysseus.png); background-size: 50px 50px; background-position: center;
  background-repeat: no-repeat;
}
.brand-wordmark { display: flex; flex-direction: column; gap: 2px; }
.brand-wordmark .title {
  font-family: var(--font-display); font-size: 22px; font-weight: 700;
  color: var(--ink); letter-spacing: -0.02em; line-height: 26px;
}
.brand-wordmark .sub {
  font-size: 11px; font-weight: 500; color: var(--ink-2);
  letter-spacing: 0.08em; text-transform: uppercase; line-height: 14px;
}

.header-actions { display: flex; flex-direction: row; align-items: center; gap: 10px; }

.pill-health, .pill-meta {
  display: flex; flex-direction: row; align-items: center; gap: 10px;
  padding: 7px 14px; border: 1px solid var(--line); border-radius: 999px;
  background: var(--surface); font-size: 11px; color: var(--ink-3);
}
.pill-health .pip-wrap { position: relative; width: 8px; height: 8px; display: flex; align-items: center; justify-content: center; }
.pill-health .pip-wrap .ring { width: 8px; height: 8px; border-radius: 4px; background: var(--green); opacity: 0.28; }
.pill-health .pip-wrap .core { position: absolute; width: 5px; height: 5px; border-radius: 3px; background: var(--green); }
.pill-health .stack { display: flex; flex-direction: column; gap: 1px; align-items: flex-start; }
.pill-health .stack .label { font-size: 10px; font-weight: 600; color: var(--green-deep); letter-spacing: 0.04em; text-transform: uppercase; line-height: 12px; }
.pill-health .stack .meta { font-family: var(--font-mono); font-size: 10px; color: var(--ink-2); line-height: 12px; }
.pill-health.warn .ring, .pill-health.warn .core { background: var(--amber); }
.pill-health.warn .label { color: var(--amber-deep); }
.pill-health.error .ring, .pill-health.error .core { background: var(--rust); }
.pill-health.error .label { color: var(--rust-deep); }

.pill-meta { font-family: var(--font-mono); }

.icon-btn {
  display: flex; align-items: center; justify-content: center;
  width: 38px; height: 38px; border: 1px solid var(--line); border-radius: 999px;
  background: var(--surface);
}

/* ─── Cluster ribbon ─────────────────────────────────────────────── */
.ribbon { display: flex; flex-direction: row; padding: 0 56px; background: var(--surface); border-bottom: 1px solid var(--line); }
.ribbon .tab {
  display: flex; flex-direction: column; gap: 6px; padding: 16px 24px;
  cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px;
  background: transparent; border-left: none; border-right: none; border-top: none;
  text-align: left;
}
.ribbon .tab:first-child { padding-left: 0; }
.ribbon .tab.active { border-bottom-color: var(--blue); }
.ribbon .tab .row1 { display: flex; flex-direction: row; align-items: center; gap: 10px; }
.ribbon .tab .pip { width: 8px; height: 8px; border-radius: 4px; background: var(--ink-4); }
.ribbon .tab.active .pip {
  box-shadow: 0 0 0 3px rgba(0, 80, 183, 0.18);
}
  /* keep cluster color when not active too, but no shadow */
}
.ribbon .tab .name {
  font-family: var(--font-display); font-size: 17px; font-weight: 600;
  color: var(--ink-2); letter-spacing: -0.01em; line-height: 22px;
}
.ribbon .tab.active .name { color: var(--ink); }
.ribbon .tab .meta { font-size: 11px; font-weight: 500; color: var(--ink-2); letter-spacing: 0.04em; line-height: 14px; }
.ribbon .tab .sub { font-family: var(--font-mono); font-size: 11px; color: var(--ink-2); line-height: 14px; }
.ribbon .tab.add { gap: 8px; flex-direction: row; align-items: center; padding-left: 24px; }
.ribbon .tab.add .name { font-family: var(--font-text); font-size: 13px; }

/* ─── Buttons ────────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 10px 16px;
  border: 1px solid var(--line); background: var(--surface); border-radius: 8px;
  font-size: 13px; font-weight: 500; color: var(--ink); line-height: 16px;
}
.btn-sm { padding: 7px 12px; font-size: 12px; }
.btn-xs { padding: 5px 10px; font-size: 11px; }
.btn-primary { background: var(--blue); border-color: var(--blue); color: white; font-weight: 600; }
.btn-primary:hover { background: var(--blue-deep); border-color: var(--blue-deep); }
.btn-dark { background: var(--ink); border-color: var(--ink); color: white; font-weight: 600; }
.btn-destructive { color: var(--rust); border-color: var(--line); }
.btn-warn { background: var(--amber); border-color: var(--amber); color: white; font-weight: 600; }

/* ─── Cluster card ───────────────────────────────────────────────── */
.cluster-card {
  background: var(--surface); border: 1px solid var(--line); border-radius: 14px;
  overflow: hidden;
}
.section { padding: 28px 36px; border-bottom: 1px solid var(--line); }
.section:last-child { border-bottom: none; }
.section.tint { background: var(--surface-2); }
.section-head { display: flex; flex-direction: row; align-items: center; justify-content: space-between; gap: 14px; }
.section-title { font-size: 14px; font-weight: 600; color: var(--ink); line-height: 18px; }
.section-sub { font-size: 12px; color: var(--ink-2); line-height: 16px; }
.section-stack { display: flex; flex-direction: column; gap: 2px; }

.h1-cluster { display: flex; flex-direction: column; gap: 6px; }
.h1-cluster .row { display: flex; flex-direction: row; align-items: center; gap: 14px; flex-wrap: wrap; }
.h1-cluster h1 {
  font-family: var(--font-display); font-size: 32px; font-weight: 700;
  color: var(--ink); letter-spacing: -0.025em; line-height: 36px;
}
.h1-cluster .topo { display: flex; flex-direction: row; align-items: center; gap: 10px; }
.h1-cluster .topo .text { font-size: 13px; color: var(--ink-2); line-height: 16px; }
.h1-cluster .topo .dot { color: var(--ink-4); }
.h1-cluster .topo .mono { font-family: var(--font-mono); font-size: 12px; color: var(--ink-2); line-height: 16px; }

.pill-status {
  display: inline-flex; flex-direction: row; align-items: center; gap: 8px;
  padding: 6px 12px; background: var(--blue-soft); border: 1px solid var(--blue-border);
  border-radius: 999px;
}
.pill-status .pip { width: 6px; height: 6px; border-radius: 3px; background: var(--blue); }
.pill-status .label { font-size: 11px; font-weight: 600; color: var(--blue-deep); letter-spacing: 0.04em; text-transform: uppercase; line-height: 14px; }
.pill-status.idle { background: var(--surface-2); border-color: var(--line); }
.pill-status.idle .pip { background: var(--ink-4); }
.pill-status.idle .label { color: var(--ink-2); }
.pill-status.running { background: var(--green-soft); border-color: var(--green-border); }
.pill-status.running .pip { background: var(--green); }
.pill-status.running .label { color: var(--green-deep); }

.quick-actions { display: flex; flex-direction: row; align-items: center; gap: 8px; }

/* Status & telemetry (2 col) */
.split-2 { display: flex; flex-direction: row; gap: 40px; padding: 28px 36px 32px; border-bottom: 1px solid var(--line); }
.split-2 > .col-info { display: flex; flex-direction: column; gap: 22px; flex: 1; min-width: 0; }
.split-2 > .col-telemetry { display: flex; flex-direction: column; gap: 10px; width: 520px; flex-shrink: 0; }

.activity-hero { display: flex; flex-direction: column; gap: 8px; }
.activity-hero .label-cap { font-size: 11px; font-weight: 600; color: var(--ink-2); letter-spacing: 0.08em; text-transform: uppercase; line-height: 14px; }
.activity-hero .row { display: flex; flex-direction: row; align-items: center; gap: 14px; flex-wrap: wrap; }

/* HAL 9000-style activity orb — pure SVG, anim natively in browser */
.hal-orb { display: inline-block; line-height: 0; flex-shrink: 0; }
.hal-orb svg { display: block; filter: drop-shadow(0 0 6px rgba(0, 80, 183, 0.35)); }
.hal-orb.idle svg { filter: none; opacity: 0.55; }
.hal-orb.loading svg { filter: drop-shadow(0 0 8px rgba(0, 80, 183, 0.55)); }
.hal-orb.running svg { filter: drop-shadow(0 0 10px rgba(0, 80, 183, 0.65)); }
.activity-hero .name {
  font-family: var(--font-display); font-size: 28px; font-weight: 700;
  color: var(--ink); letter-spacing: -0.02em; line-height: 32px;
}
.activity-hero .hint { font-size: 13px; color: var(--ink-2); line-height: 16px; }

.state-timeline { display: flex; flex-direction: row; align-items: center; gap: 8px; flex-wrap: wrap; }
.state-pill { display: flex; flex-direction: row; align-items: center; gap: 4px; padding: 4px 9px; background: var(--surface-2); border-radius: 999px; }
.state-pill .pip { width: 5px; height: 5px; border-radius: 3px; background: var(--ink-4); }
.state-pill .label { font-size: 11px; font-weight: 500; color: var(--ink-2); line-height: 14px; }
.state-pill.active { background: var(--green-soft); border: 1px solid var(--green-border); }
.state-pill.active .pip { background: var(--green); }
.state-pill.active .label { color: var(--green-deep); font-weight: 600; }
.state-pill.active.loading { background: var(--blue-soft); border-color: var(--blue-border); }
.state-pill.active.loading .pip { background: var(--blue); }
.state-pill.active.loading .label { color: var(--blue-deep); }
.state-line { width: 8px; height: 1px; background: var(--ink-4); }
.state-line.active { background: var(--green); }
.state-line.active.loading { background: var(--blue); }

.model-line { display: flex; flex-direction: column; gap: 6px; }
.model-line .cap { font-size: 11px; font-weight: 600; color: var(--ink-2); letter-spacing: 0.06em; text-transform: uppercase; line-height: 14px; }
.model-line .name { font-family: var(--font-mono); font-size: 14px; color: var(--ink); line-height: 18px; word-break: break-all; }

.metrics-row { display: flex; flex-direction: row; }
.metrics-row .col {
  display: flex; flex-direction: column; gap: 6px; padding: 0 28px; flex: 1;
  border-right: 1px solid var(--line);
}
.metrics-row .col:first-child { padding-left: 0; }
.metrics-row .col:last-child { padding-right: 0; border-right: none; }
.metrics-row .cap { font-size: 11px; font-weight: 600; color: var(--ink-2); letter-spacing: 0.06em; text-transform: uppercase; line-height: 14px; }
.metrics-row .val { font-family: var(--font-display); font-size: 18px; font-weight: 600; color: var(--ink); line-height: 22px; }
.metrics-row .val .delta { color: var(--green); font-weight: 500; font-size: 12px; }
.metrics-row .val .unit { color: var(--ink-2); font-weight: 400; font-size: 13px; }
.metrics-row .val.muted { color: var(--ink-2); }

.meta-row { display: flex; flex-direction: row; align-items: center; gap: 18px; flex-wrap: wrap; padding-top: 4px; }
.meta-row .item { display: flex; flex-direction: row; align-items: center; gap: 8px; }
.meta-row .cap { font-size: 11px; font-weight: 600; color: var(--ink-2); letter-spacing: 0.06em; text-transform: uppercase; }
.meta-row .val { font-family: var(--font-mono); font-size: 12px; color: var(--ink); }
.meta-row .val.muted { font-family: var(--font-text); color: var(--ink-2); font-style: italic; }
.meta-row .sep { width: 1px; height: 14px; background: var(--line); }

/* Node telemetry */
.tele-head { display: flex; flex-direction: row; align-items: center; justify-content: space-between; }
.tele-head .cap { font-size: 11px; font-weight: 600; color: var(--ink-2); letter-spacing: 0.08em; text-transform: uppercase; line-height: 14px; }
.tele-head .sub { font-size: 11px; color: var(--ink-2); }
.node-row {
  display: flex; flex-direction: column; gap: 8px; padding: 12px 16px;
  background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
}
.node-row.held { border-style: dashed; border-color: var(--ink-4); opacity: 0.78; }
.node-row .row1 { display: flex; flex-direction: row; align-items: center; justify-content: space-between; gap: 12px; }
.node-row .id-line { display: flex; flex-direction: row; align-items: center; gap: 10px; }
.rank-pill { display: flex; align-items: center; justify-content: center; width: 22px; height: 18px; border-radius: 4px; background: var(--surface-2); flex-shrink: 0; }
.rank-pill .num { font-family: var(--font-display); font-size: 11px; font-weight: 700; color: var(--ink-2); line-height: 14px; }
.rank-pill.master { background: var(--blue-soft); }
.rank-pill.master .num { color: var(--blue-deep); }
.node-row .host { font-size: 13px; font-weight: 600; color: var(--ink); line-height: 16px; }
.node-row .ip { font-family: var(--font-mono); font-size: 11px; color: var(--ink-2); line-height: 14px; }
.node-row .pct-stack { display: flex; flex-direction: row; align-items: baseline; gap: 10px; }
.node-row .pct { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--ink); letter-spacing: -0.015em; line-height: 22px; }
.node-row .pct-sm { font-size: 11px; font-weight: 600; color: var(--ink-2); line-height: 14px; }
.node-row .gb { font-family: var(--font-mono); font-size: 11px; color: var(--ink-2); line-height: 14px; }

.led-bar { display: flex; flex-direction: row; gap: 2px; height: 9px; }
.led-bar > div { flex: 1; height: 9px; border-radius: 2px; background: var(--line-soft); }
.led-bar .on-blue { background: var(--blue); }
.led-bar .on-green { background: var(--green); }
.led-bar .on-yellow { background: #D4B445; }
.led-bar .on-orange { background: #D47A2A; }
.led-bar .on-red { background: var(--rust); }

/* Global cluster-RAM bar — model footprint over total cluster RAM. Sits in
   col-info, summing what the loaded model weighs across every node. Reuses
   ledSegments() so the colour ramp matches the per-node bars exactly. */
.global-ram { display: flex; flex-direction: column; gap: 11px; padding-top: 6px; margin-top: 2px; border-top: 1px solid var(--line-soft); }
.global-ram .gr-row { display: flex; flex-direction: row; align-items: baseline; justify-content: space-between; gap: 12px; }
.global-ram .gr-label { font-family: var(--font-display); font-size: 17px; font-weight: 700; color: var(--ink); letter-spacing: -0.01em; }
.global-ram .gr-stack { display: flex; flex-direction: row; align-items: baseline; gap: 7px; }
.global-ram .gr-pct { font-family: var(--font-display); font-size: 32px; font-weight: 700; color: var(--ink); letter-spacing: -0.02em; line-height: 1; }
.global-ram .gr-pct.muted { color: var(--ink-3); }
.global-ram .gr-pct-sm { font-size: 13px; font-weight: 600; color: var(--ink-2); }
.global-ram .gr-gb { font-family: var(--font-mono); font-size: 12px; color: var(--ink-2); margin-left: 4px; }
.global-ram .global-led { height: 12px; }
.global-ram .global-led > div { height: 12px; border-radius: 3px; }

/* Per-node diagnostic line: runner.py inventory + RDMA port states.
   Sits below the LED bar inside .node-row. Pills are compact, mono-font,
   colored by health. Orphan = red (zombie runner without a loaded pool). */
.node-row .diag-line { display: flex; flex-direction: row; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
.diag-pill {
  font-family: var(--font-mono); font-size: 10px; line-height: 14px;
  padding: 2px 6px; border-radius: 4px; border: 1px solid var(--line-soft);
  color: var(--ink-2); background: var(--surface);
  white-space: nowrap;
}
.diag-pill.ok     { color: var(--green); border-color: rgba(70, 145, 90, 0.35); }
.diag-pill.dim    { color: var(--ink-4); }
.diag-pill.orphan {
  color: var(--rust); border-color: rgba(180, 70, 50, 0.6);
  background: rgba(180, 70, 50, 0.08);
}

/* Load configuration */
.section-actions { display: flex; flex-direction: row; align-items: center; gap: 8px; }
.chip-soft {
  display: flex; flex-direction: row; align-items: center; gap: 8px;
  padding: 6px 12px; background: var(--surface); border: 1px solid var(--line); border-radius: 6px;
  font-size: 11px; font-weight: 500; color: var(--green); line-height: 14px;
}
.chip-soft svg { flex-shrink: 0; }

.form-row { display: flex; flex-direction: row; gap: 20px; align-items: flex-end; }
.field { display: flex; flex-direction: column; gap: 8px; }
.field-label { font-size: 11px; font-weight: 600; color: var(--ink-2); letter-spacing: 0.06em; text-transform: uppercase; line-height: 14px; }
.field-shell {
  display: flex; flex-direction: row; align-items: center; gap: 10px;
  padding: 10px 14px; background: var(--surface); border: 1px solid var(--line); border-radius: 8px;
}
.field-shell input, .field-shell select {
  border: none; outline: none; background: transparent; flex: 1; min-width: 0;
  font-family: var(--font-mono); font-size: 12px; color: var(--ink); line-height: 16px;
}
.field-shell select.text { font-family: var(--font-text); font-size: 13px; }
.field-shell .loaded-pip {
  display: flex; flex-direction: row; align-items: center; gap: 6px; padding: 2px 8px;
  background: var(--blue-soft); border-radius: 4px; flex-shrink: 0;
}
.field-shell .loaded-pip .pip { width: 5px; height: 5px; border-radius: 3px; background: var(--blue); }
.field-shell .loaded-pip .label { font-size: 10px; font-weight: 600; color: var(--blue-deep); letter-spacing: 0.04em; text-transform: uppercase; line-height: 12px; }

.seg-nodes, .seg-mode {
  display: flex; flex-direction: row; align-items: center; gap: 4px;
  background: var(--surface); border: 1px solid var(--line); border-radius: 8px; padding: 4px;
}
.seg-nodes .pill {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 4px 10px 5px; background: transparent; border: none; border-radius: 6px;
  font-family: var(--font-display); font-size: 13px; font-weight: 600; color: var(--ink-2); line-height: 16px;
}
.seg-nodes .pill .under { width: 14px; height: 3px; border-radius: 2px; background: transparent; }
.seg-nodes .pill.available { background: var(--green-soft); color: var(--green-deep); }
.seg-nodes .pill.available .under { background: var(--green); }
.seg-nodes .pill.missing { background: var(--rust-soft); color: var(--rust-deep); cursor: not-allowed; opacity: 0.85; }
.seg-nodes .pill.missing .under { background: var(--rust); }
.seg-nodes .pill.locked { background: var(--amber-soft); color: var(--amber-deep); }
.seg-nodes .pill.locked .under { background: var(--amber); }
.seg-nodes .pill.selected { background: var(--ink); color: white; }
.seg-nodes .pill.selected .under { background: var(--blue); }
/* Too-small: this N can't hold the selected model. User can still click
   (we don't block exploration) but the Load button is disabled. */
.seg-nodes .pill.too-small {
  color: var(--rust); text-decoration: line-through; opacity: 0.6;
}
.seg-nodes .pill.too-small.selected {
  color: white; opacity: 0.8; text-decoration: line-through;
  background: var(--rust);
}
/* Optimal-fit indicator: small green dot above the pill number. Marks
   the smallest topology that fits the selected model. */
.seg-nodes .pill .opt-mark {
  position: absolute; transform: translate(14px, -16px);
  width: 6px; height: 6px; border-radius: 50%; background: var(--green);
  box-shadow: 0 0 0 1px var(--surface);
}
.seg-nodes .pill { position: relative; }

.seg-mode .pill { padding: 0 14px; height: 32px; display: flex; align-items: center; justify-content: center; background: transparent; border: none; border-radius: 6px; font-size: 12px; font-weight: 500; color: var(--ink-2); }
.seg-mode .pill.selected { background: var(--ink); color: white; font-weight: 600; }

.check-row { display: flex; flex-direction: row; align-items: center; gap: 18px; flex-wrap: wrap; }
.check-row label { display: flex; flex-direction: row; align-items: center; gap: 8px; cursor: pointer; }
.check-row .box { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--ink-4); background: var(--surface); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.check-row .box.on { background: var(--blue); border-color: var(--blue); }
.check-row .check-text { font-size: 13px; color: var(--ink); }
.check-row .check-hint { font-size: 11px; color: var(--ink-2); }

/* Lock banner */
.lock-banner {
  display: flex; flex-direction: row; align-items: center; gap: 14px;
  padding: 14px 16px; background: var(--amber-soft); border: 1px solid var(--amber-border); border-radius: 10px;
}
.lock-banner .icon-wrap { display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 8px; background: white; flex-shrink: 0; }
.lock-banner .body { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
.lock-banner .title-line { display: flex; flex-direction: row; align-items: center; gap: 8px; flex-wrap: wrap; }
.lock-banner .title { font-size: 13px; font-weight: 600; color: var(--amber-deep); line-height: 16px; }
.lock-banner .tag { font-size: 10px; font-weight: 600; color: var(--amber-deep); padding: 2px 6px; background: white; border-radius: 4px; letter-spacing: 0.04em; text-transform: uppercase; }
.lock-banner .detail { font-size: 12px; color: var(--amber-deep); line-height: 16px; opacity: 0.85; }
.lock-banner .actions { display: flex; flex-direction: row; align-items: center; gap: 8px; flex-shrink: 0; }

/* Memory plan */
.plan {
  display: flex; flex-direction: column; gap: 12px;
  padding: 16px 18px; background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
}
.plan-head { display: flex; flex-direction: row; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
.plan-head .title-row { display: flex; flex-direction: row; align-items: center; gap: 8px; }
.plan-head .title { font-size: 13px; font-weight: 600; color: var(--ink); }
.plan-head .badge { font-size: 10px; font-weight: 600; color: var(--blue); padding: 2px 6px; background: var(--blue-soft); border-radius: 4px; letter-spacing: 0.04em; text-transform: uppercase; }
.plan-head .sub { font-size: 12px; color: var(--ink-2); }
.plan-head .stats { display: flex; flex-direction: row; gap: 16px; align-items: baseline; }
.plan-head .stat { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
.plan-head .stat .cap { font-size: 10px; font-weight: 600; color: var(--ink-2); letter-spacing: 0.06em; text-transform: uppercase; }
.plan-head .stat .val { font-family: var(--font-display); font-size: 14px; font-weight: 700; color: var(--ink); line-height: 16px; }

.plan-rows { display: flex; flex-direction: column; border-top: 1px solid var(--line-soft); }
.plan-rows .row { display: flex; flex-direction: row; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--line-soft); gap: 12px; }
.plan-rows .row:last-child { border-bottom: none; }
.plan-rows .id { display: flex; flex-direction: row; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.plan-rows .id .rank-pill { width: 22px; height: 18px; }
.plan-rows .id .host { font-size: 12px; font-weight: 500; color: var(--ink); }
.plan-rows .id .ip { font-family: var(--font-mono); font-size: 11px; color: var(--ink-2); }
.plan-rows .nums { display: flex; flex-direction: row; align-items: center; gap: 16px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
.plan-rows .nums .needed { font-family: var(--font-mono); font-size: 12px; color: var(--ink); }
.plan-rows .nums .avail { font-family: var(--font-mono); font-size: 12px; color: var(--ink-2); }
.plan-rows .nums .avail.warn { color: var(--rust); }
.plan-rows .badge-fit, .plan-rows .badge-tight {
  display: flex; flex-direction: row; align-items: center; gap: 6px;
  padding: 3px 8px; border-radius: 999px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
}
.plan-rows .badge-fit { background: var(--green-soft); color: var(--green-deep); }
.plan-rows .badge-tight { background: var(--amber-soft); color: var(--amber-deep); }

.plan-foot { display: flex; flex-direction: row; align-items: center; justify-content: space-between; padding-top: 4px; gap: 16px; flex-wrap: wrap; }
.plan-foot .hint { font-size: 11px; color: var(--ink-2); }
.plan-foot .mono { font-family: var(--font-mono); }

/* Runner logs */
.logs-head .pill-live {
  display: flex; flex-direction: row; align-items: center; gap: 6px;
  padding: 3px 9px; background: var(--green-soft); border-radius: 999px;
}
.logs-head .pill-live .pip { width: 5px; height: 5px; border-radius: 3px; background: var(--green); }
.logs-head .pill-live .label { font-size: 10px; font-weight: 600; color: var(--green-deep); letter-spacing: 0.04em; text-transform: uppercase; }

.logs-pane {
  display: flex; flex-direction: column; gap: 4px;
  padding: 16px 18px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 10px;
  height: 280px; overflow-y: auto;
}
.log-line { display: flex; flex-direction: row; align-items: baseline; gap: 14px; }
.log-line .ts { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); min-width: 60px; flex-shrink: 0; line-height: 16px; }
.log-line .rank { font-family: var(--font-mono); font-size: 11px; font-weight: 600; min-width: 36px; flex-shrink: 0; line-height: 16px; }
.log-line .rank.r0 { color: var(--blue-deep); }
.log-line .rank.r1 { color: var(--green-deep); }
.log-line .rank.r2 { color: var(--amber-deep); }
.log-line .rank.r3 { color: var(--rust-deep); }
.log-line .text { font-family: var(--font-mono); font-size: 12px; color: var(--ink); line-height: 16px; word-break: break-all; }
.log-line .text.accent { color: var(--blue-deep); }

/* HF download */
.hf-form { display: flex; flex-direction: column; gap: 14px; }
.target-chips { display: flex; flex-direction: row; gap: 8px; flex-wrap: wrap; }
.target-chip {
  display: flex; flex-direction: column; gap: 4px; padding: 10px 14px;
  background: var(--surface); border: 1px solid var(--line); border-radius: 8px;
  cursor: pointer; min-width: 120px;
}
.target-chip.on { background: var(--blue-soft); border-color: var(--blue-border); }
.target-chip .top { display: flex; flex-direction: row; align-items: center; gap: 8px; }
.target-chip .box { width: 14px; height: 14px; border-radius: 3px; border: 1.5px solid var(--ink-4); background: white; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.target-chip.on .box { background: var(--blue); border-color: var(--blue); }
.target-chip .host { font-size: 12px; font-weight: 600; color: var(--ink); }
.target-chip .ip { font-family: var(--font-mono); font-size: 10px; color: var(--ink-2); }

.action-row { display: flex; flex-direction: row; align-items: center; justify-content: space-between; padding-top: 4px; gap: 16px; flex-wrap: wrap; }
.action-row .hint { font-size: 12px; color: var(--ink-2); }
.action-row .mono { font-family: var(--font-mono); color: var(--ink); }

.hf-active {
  display: flex; flex-direction: column; gap: 8px;
  padding: 14px 16px; background: var(--surface-2); border: 1px solid var(--line); border-radius: 10px;
}
.hf-active .head { display: flex; flex-direction: row; align-items: center; justify-content: space-between; gap: 12px; }
.hf-active .left { display: flex; flex-direction: row; align-items: center; gap: 10px; flex-wrap: wrap; }
.hf-active .pip-pulse { position: relative; width: 8px; height: 8px; display: flex; align-items: center; justify-content: center; }
.hf-active .pip-pulse .ring { width: 8px; height: 8px; border-radius: 4px; background: var(--blue); opacity: 0.25; }
.hf-active .pip-pulse .core { position: absolute; width: 5px; height: 5px; border-radius: 3px; background: var(--blue); }
.hf-active .repo { font-family: var(--font-mono); font-size: 12px; color: var(--ink); }
.hf-active .hint { font-size: 11px; color: var(--ink-2); }
.hf-active .stats { font-family: var(--font-mono); font-size: 11px; color: var(--ink-2); }
.hf-active .progress { display: flex; flex-direction: row; align-items: center; gap: 10px; }
.hf-active .bar { flex: 1; height: 4px; background: var(--line); border-radius: 2px; overflow: hidden; }
.hf-active .fill { height: 4px; background: var(--blue); border-radius: 2px; }
.hf-active .pct { font-family: var(--font-display); font-size: 13px; font-weight: 600; color: var(--ink); width: 38px; text-align: right; }

/* Active runs */
.runs-pill {
  display: flex; flex-direction: row; align-items: center; gap: 6px; padding: 3px 10px;
  background: var(--blue-soft); border: 1px solid var(--blue-border); border-radius: 999px;
}
.runs-pill .pip-wrap { position: relative; width: 7px; height: 7px; display: flex; align-items: center; justify-content: center; }
.runs-pill .pip-wrap .ring { width: 7px; height: 7px; border-radius: 4px; background: var(--blue); opacity: 0.25; }
.runs-pill .pip-wrap .core { position: absolute; width: 4px; height: 4px; border-radius: 2px; background: var(--blue); }
.runs-pill .label { font-size: 10px; font-weight: 600; color: var(--blue-deep); letter-spacing: 0.04em; text-transform: uppercase; }

.run-row { display: flex; flex-direction: row; align-items: center; padding: 14px 36px; border-bottom: 1px solid var(--line-soft); gap: 16px; }
.run-row:last-child { border-bottom: none; }
.run-row .status-cell { display: flex; flex-direction: row; align-items: center; gap: 10px; width: 130px; flex-shrink: 0; }
.run-row .status-cell .pip-wrap { position: relative; width: 8px; height: 8px; display: flex; align-items: center; justify-content: center; }
.run-row .status-cell .pip-wrap .ring { width: 8px; height: 8px; border-radius: 4px; opacity: 0.25; }
.run-row .status-cell .pip-wrap .core { position: absolute; width: 5px; height: 5px; border-radius: 3px; }
.run-row .status-cell .label { font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; line-height: 14px; }
.run-row .status-cell.streaming .ring,
.run-row .status-cell.streaming .core { background: var(--blue); }
.run-row .status-cell.streaming .label { color: var(--blue-deep); }
.run-row .status-cell.waiting .ring,
.run-row .status-cell.waiting .core { background: var(--amber); }
.run-row .status-cell.waiting .label { color: var(--amber-deep); }
.run-row .cluster-cell { display: flex; flex-direction: row; align-items: center; gap: 8px; width: 110px; flex-shrink: 0; }
.run-row .cluster-cell .pip { width: 6px; height: 6px; border-radius: 3px; }
.run-row .cluster-cell.default .pip { background: var(--blue); }
.run-row .cluster-cell .name { font-size: 13px; font-weight: 500; color: var(--ink); }
.run-row .info-cell { display: flex; flex-direction: column; gap: 1px; flex: 1; min-width: 0; }
.run-row .info-cell .model { font-family: var(--font-mono); font-size: 12px; color: var(--ink); line-height: 16px; }
.run-row .info-cell .sub { font-size: 11px; color: var(--ink-2); line-height: 14px; }
.run-row .info-cell .sub .mono { font-family: var(--font-mono); }
.run-row .progress-cell { display: flex; flex-direction: row; align-items: center; gap: 14px; width: 280px; flex-shrink: 0; }
.run-row .progress-cell .bar { flex: 1; height: 4px; background: var(--line); border-radius: 2px; overflow: hidden; }
.run-row .progress-cell .fill { height: 4px; background: var(--blue); border-radius: 2px; }
.run-row .progress-cell .nums { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
.run-row .progress-cell .toks { font-family: var(--font-mono); font-size: 12px; color: var(--ink); line-height: 14px; }
.run-row .progress-cell .rate { font-family: var(--font-mono); font-size: 11px; color: var(--ink-2); line-height: 14px; }

/* Recent activity */
.activity-head { display: flex; flex-direction: row; align-items: center; justify-content: space-between; padding: 22px 36px; border-bottom: 1px solid var(--line); }
.activity-head .left { display: flex; flex-direction: column; gap: 4px; }
.activity-head h2 { font-family: var(--font-display); font-size: 22px; font-weight: 600; color: var(--ink); letter-spacing: -0.015em; line-height: 26px; }
.activity-head .sub { font-size: 12px; color: var(--ink-2); }
.activity-head .filters { display: flex; flex-direction: row; align-items: center; gap: 4px; padding: 4px; background: var(--ground); border-radius: 8px; }
.activity-head .filters button { padding: 6px 12px; background: transparent; border: none; border-radius: 6px; font-size: 12px; font-weight: 500; color: var(--ink-2); }
.activity-head .filters button.active { background: var(--surface); border: 1px solid var(--line); color: var(--ink); font-weight: 600; }

.activity-cols { display: flex; flex-direction: row; padding: 12px 36px; background: var(--surface-2); border-bottom: 1px solid var(--line); }
.activity-cols span { font-size: 10px; font-weight: 600; color: var(--ink-2); letter-spacing: 0.08em; text-transform: uppercase; line-height: 14px; }
.activity-cols .c-time { width: 110px; flex-shrink: 0; }
.activity-cols .c-cluster { width: 110px; flex-shrink: 0; }
.activity-cols .c-client { width: 130px; flex-shrink: 0; }
.activity-cols .c-model { flex: 1; }
.activity-cols .c-tokens { width: 100px; flex-shrink: 0; text-align: right; }
.activity-cols .c-tps { width: 90px; flex-shrink: 0; text-align: right; }
.activity-cols .c-ttft { width: 80px; flex-shrink: 0; text-align: right; }

.activity-row { display: flex; flex-direction: row; align-items: center; padding: 14px 36px; border-bottom: 1px solid var(--line-soft); }
.activity-row:last-child { border-bottom: none; }
.activity-row .c-time { width: 110px; flex-shrink: 0; font-family: var(--font-mono); font-size: 12px; color: var(--ink-2); }
.activity-row .c-cluster { width: 110px; flex-shrink: 0; display: flex; flex-direction: row; align-items: center; gap: 8px; }
.activity-row .c-cluster .pip { width: 6px; height: 6px; border-radius: 3px; }
.activity-row .c-cluster.default .pip { background: var(--blue); }
.activity-row .c-cluster .name { font-size: 13px; font-weight: 500; color: var(--ink); }
.activity-row .c-client { width: 130px; flex-shrink: 0; font-size: 12px; color: var(--ink-2); }
.activity-row .c-model { flex: 1; font-family: var(--font-mono); font-size: 12px; color: var(--ink); }
.activity-row .c-tokens { width: 100px; flex-shrink: 0; text-align: right; font-family: var(--font-mono); font-size: 12px; color: var(--ink); }
.activity-row .c-tps { width: 90px; flex-shrink: 0; text-align: right; font-family: var(--font-display); font-size: 14px; font-weight: 600; color: var(--ink); }
.activity-row .c-ttft { width: 80px; flex-shrink: 0; text-align: right; font-family: var(--font-mono); font-size: 12px; color: var(--ink-2); }

/* Footer */
.footer { display: flex; flex-direction: row; align-items: center; justify-content: space-between; padding: 22px 56px 30px; font-family: var(--font-mono); font-size: 11px; color: var(--ink-2); }
.footer .sep { color: var(--ink-4); }
.footer .italic { font-family: var(--font-text); font-style: italic; }

/* Load progress bar (inline) */
.load-progress { padding: 14px 0 0; }
.lp-head { display: flex; flex-direction: row; justify-content: space-between; align-items: center; padding-bottom: 6px; }
.lp-head span:first-child { font-size: 12px; color: var(--ink-2); }
.lp-pct { font-family: var(--font-display); font-size: 13px; font-weight: 700; color: var(--ink); }
.lp-bar { height: 4px; background: var(--line); border-radius: 2px; overflow: hidden; }
.lp-fill { height: 4px; background: var(--blue); border-radius: 2px; }
.lp-meta { display: flex; flex-direction: row; justify-content: space-between; align-items: center; padding-top: 6px; font-size: 11px; color: var(--ink-2); }

/* Big loading banner — shows while pool is loading a model */
@keyframes load-stripe { 0% { background-position: 0 0; } 100% { background-position: 40px 0; } }
@keyframes load-pulse  { 0%,100% { opacity: 0.8; } 50% { opacity: 1; } }
@keyframes syncIndeterminate { 0% { margin-left: -30%; } 100% { margin-left: 100%; } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

/* Admin auth modal */
#auth-overlay { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; }
#auth-overlay .auth-backdrop { position: absolute; inset: 0; background: rgba(11, 14, 20, 0.65); backdrop-filter: blur(4px); }
#auth-overlay .auth-modal {
  position: relative; width: 420px; max-width: 92vw;
  background: var(--surface); border: 1px solid var(--line); border-radius: 14px;
  padding: 24px 22px; box-shadow: 0 18px 48px rgba(0,0,0,0.35);
  display: flex; flex-direction: column; gap: 12px;
}
#auth-overlay .auth-title { font-family: var(--font-display); font-size: 16px; font-weight: 600; color: var(--ink); }
#auth-overlay .auth-sub { font-size: 12px; color: var(--ink-2); line-height: 1.5; }
#auth-overlay .auth-err { padding: 8px 10px; background: var(--rust-soft); color: var(--rust-deep); border-radius: 6px; font-size: 12px; }
#auth-overlay .auth-input {
  width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: 8px;
  background: var(--ground); color: var(--ink); font-size: 13px; outline: none;
}
#auth-overlay .auth-input:focus { border-color: var(--blue); }
#auth-overlay .auth-actions { display: flex; justify-content: flex-end; }
#auth-overlay .auth-hint { font-size: 11px; color: var(--ink-3); }
#auth-overlay .mono { font-family: var(--font-mono); }
.load-banner {
  display: flex; flex-direction: column; gap: 14px;
  padding: 22px 28px;
  background: linear-gradient(135deg, var(--blue-soft) 0%, #DCE9FA 100%);
  border-bottom: 1px solid var(--blue-border);
  position: relative; overflow: hidden;
}
.load-banner::before {
  content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 3px;
  background-image: repeating-linear-gradient(45deg, var(--blue) 0 10px, var(--blue-deep) 10px 20px);
  background-size: 40px 3px;
  animation: load-stripe 1s linear infinite;
}
.load-banner .lb-head { display: flex; flex-direction: row; align-items: center; gap: 14px; }
.load-banner .lb-icon {
  display: flex; align-items: center; justify-content: center;
  width: 38px; height: 38px; border-radius: 999px; background: var(--blue);
  animation: load-pulse 1.4s ease-in-out infinite;
  flex-shrink: 0;
}
.load-banner .lb-body { flex: 1; min-width: 0; }
.load-banner .lb-title { display: flex; flex-direction: row; align-items: center; gap: 10px; }
.load-banner .lb-label { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--blue-deep); letter-spacing: -0.015em; }
.load-banner .lb-tag { font-size: 10px; font-weight: 600; padding: 3px 8px; background: var(--blue); color: white; border-radius: 4px; letter-spacing: 0.04em; text-transform: uppercase; }
.load-banner .lb-model { font-family: var(--font-mono); font-size: 13px; color: var(--blue-deep); margin-top: 4px; word-break: break-all; }
.load-banner .lb-stats { display: flex; flex-direction: row; gap: 24px; flex-shrink: 0; }
.load-banner .lb-stat { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
.load-banner .lb-stat .cap { font-size: 10px; font-weight: 600; color: var(--blue-deep); letter-spacing: 0.06em; text-transform: uppercase; opacity: 0.7; }
.load-banner .lb-stat .val { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--blue-deep); line-height: 24px; letter-spacing: -0.015em; }
.load-banner .lb-bar { display: flex; flex-direction: row; align-items: center; gap: 14px; }
.load-banner .lb-track { flex: 1; height: 8px; background: rgba(255,255,255,0.6); border-radius: 4px; overflow: hidden; box-shadow: inset 0 1px 2px rgba(0,0,0,0.04); }
.load-banner .lb-fill {
  height: 8px; border-radius: 4px;
  background: linear-gradient(90deg, var(--blue) 0%, #3D7BD9 100%);
  background-size: 30px 8px;
  background-image: repeating-linear-gradient(-45deg, var(--blue) 0 10px, #3D7BD9 10px 20px);
  animation: load-stripe 1.2s linear infinite;
  transition: width 0.5s ease-out;
}
.load-banner .lb-pct { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--blue-deep); letter-spacing: -0.02em; min-width: 60px; text-align: right; }
.load-banner .lb-stage { display: flex; flex-direction: row; align-items: center; gap: 10px; font-family: var(--font-mono); font-size: 11px; color: var(--blue-deep); opacity: 0.85; }
.load-banner .lb-stage .dot { width: 4px; height: 4px; border-radius: 2px; background: var(--blue-deep); opacity: 0.4; }

/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: white; padding: 10px 18px; border-radius: 999px;
  font-size: 13px; font-weight: 500; opacity: 0; pointer-events: none;
  transition: opacity 0.2s, transform 0.2s; z-index: 9999;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }

// ─── Auth ──────────────────────────────────────────────────────────────
// Admin token stored in localStorage; sent as Authorization: Bearer on every
// /admin/* fetch. EventSource URLs get ?token=... appended (EventSource can't
// set custom headers in browsers). If the engine has no token configured, all
// requests work without auth.
const AUTH_KEY = 'odyssai-admin-token';
function getAuthToken() { return localStorage.getItem(AUTH_KEY) || ''; }
function setAuthToken(t) { if (t) localStorage.setItem(AUTH_KEY, t); else localStorage.removeItem(AUTH_KEY); }
function authHeaders() {
  const t = getAuthToken();
  return t ? { 'authorization': 'Bearer ' + t } : {};
}
function appendTokenQuery(url) {
  const t = getAuthToken();
  if (!t) return url;
  return url + (url.includes('?') ? '&' : '?') + 'token=' + encodeURIComponent(t);
}

// ─── Fetch helpers ───────────────────────────────────────────────────
const $ = id => document.getElementById(id);

async function getJson(url) {
  const r = await fetch(url, { cache: "no-store", headers: { ...authHeaders() } });
  if (r.status === 401) { handleUnauthorized(); throw new Error("401 " + url); }
  if (!r.ok) throw new Error(r.status + " " + url);
  return r.json();
}
async function postJson(url, body) {
  const r = await fetch(url, {
    method: "POST",
    headers: { "content-type": "application/json", ...authHeaders() },
    body: body == null ? undefined : JSON.stringify(body),
  });
  if (r.status === 401) { handleUnauthorized(); throw new Error("401 " + url); }
  if (!r.ok) { const t = await r.text(); throw new Error("HTTP " + r.status + ": " + t.slice(0, 200)); }
  return r.json();
}
async function delJson(url) {
  const r = await fetch(url, { method: "DELETE", headers: { ...authHeaders() } });
  if (r.status === 401) { handleUnauthorized(); throw new Error("401 " + url); }
  if (!r.ok) throw new Error("HTTP " + r.status);
  return r.json();
}

// ─── Unauthorized handler + login overlay ─────────────────────────────
let _authPromptShown = false;
function handleUnauthorized() {
  if (_authPromptShown) return;
  _authPromptShown = true;
  setAuthToken('');
  showAuthOverlay();
}
function showAuthOverlay(msg) {
  if (document.getElementById('auth-overlay')) return;
  const div = document.createElement('div');
  div.id = 'auth-overlay';
  div.innerHTML = `
    <div class="auth-backdrop"></div>
    <div class="auth-modal">
      <div class="auth-title">Admin token required</div>
      <div class="auth-sub">OdyssAI-X admin endpoints are protected. Paste the value of <span class="mono">ODYSSEUS_ADMIN_TOKEN</span> from the container env.</div>
      ${msg ? `<div class="auth-err">${msg}</div>` : ''}
      <input id="auth-input" type="password" class="auth-input mono" placeholder="paste token…" autocomplete="off"/>
      <div class="auth-actions">
        <button class="btn btn-sm btn-primary" id="auth-submit">Unlock</button>
      </div>
      <div class="auth-hint">Stored in this browser's localStorage. Clear it from the Engine tab → Sign out.</div>
    </div>`;
  document.body.appendChild(div);
  const input = document.getElementById('auth-input');
  input.focus();
  const submit = async () => {
    const t = input.value.trim();
    if (!t) return;
    // Validate against /admin/clusters (a cheap, always-present endpoint).
    try {
      const r = await fetch('/admin/clusters', { headers: { 'authorization': 'Bearer ' + t } });
      if (r.status === 401) {
        document.querySelector('.auth-err')?.remove();
        const err = document.createElement('div');
        err.className = 'auth-err';
        err.textContent = 'Token rejected.';
        input.parentElement.insertBefore(err, input);
        input.select();
        return;
      }
      if (!r.ok) throw new Error('HTTP ' + r.status);
      setAuthToken(t);
      _authPromptShown = false;
      document.getElementById('auth-overlay')?.remove();
      refreshAll();
    } catch (e) { toast('auth check failed: ' + e.message, 'err'); }
  };
  document.getElementById('auth-submit').addEventListener('click', submit);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); });
}
function signOut() {
  setAuthToken('');
  showAuthOverlay();
}

// ─── Refresh ────────────────────────────────────────────────────────
async function refreshAll() {
  try {
    // First fetch the cluster catalog — the dashboard's tabs, status URLs
    // and per-cluster state are all derived from this. Failure means the
    // engine isn't talking; everything else below is best-effort.
    const clustersList = await getJson("/admin/clusters").catch(() => ({ data: [] }));
    const clusters = clustersList?.data || [];
    CLUSTERS = clusters.map(c => ({
      id: c.id,
      name: c.name || c.id,
      kind: c.kind || "mlx-distributed",
      color: "blue",
      enabled: c.enabled !== false,
    }));
    // If the user's selected cluster vanished from topology, snap to the
    // first enabled one (or null if none).
    const enabled = CLUSTERS.filter(c => c.enabled);
    if (state.selected_cluster && !enabled.find(c => c.id === state.selected_cluster)) {
      state.selected_cluster = enabled.length ? enabled[0].id : null;
      if (state.selected_cluster) {
        localStorage.setItem('odyssai-cluster', state.selected_cluster);
      }
    } else if (!state.selected_cluster && enabled.length) {
      state.selected_cluster = enabled[0].id;
      localStorage.setItem('odyssai-cluster', state.selected_cluster);
    }

    // Per-cluster status + def, in parallel across clusters.
    const perClusterResults = await Promise.all(
      clusters.map(c => Promise.all([
        getJson(`/admin/clusters/${encodeURIComponent(c.id)}/status`).catch(() => null),
        getJson(`/admin/clusters/${encodeURIComponent(c.id)}`).catch(() => null),
      ]))
    );
    const status = {};
    const defs = {};
    const modelsDir = {};
    for (let i = 0; i < clusters.length; i++) {
      const id = clusters[i].id;
      const [st, cd] = perClusterResults[i];
      status[id] = st;
      defs[id] = cd;
      if (st?.models_dir) modelsDir[id] = st.models_dir;
    }
    state.cluster_status = status;
    state.cluster_defs = defs;
    state.cluster_models_dir = { ...state.cluster_models_dir, ...modelsDir };

    // Convenience alias for the selected cluster — back-compat with the
    // many render sites that still read state.default / state.default_models_dir.
    const sel = state.selected_cluster;
    state.default = sel ? status[sel] : null;
    state.default_models_dir = sel ? (modelsDir[sel] || state.cluster_models_dir[sel] || "") : "";
    state.default_models = sel ? (state.cluster_models[sel] || []) : [];

    // Global (non-cluster-scoped) endpoints — fetched in parallel too.
    const [metrics, sessions, telemetry, runs, syncJobs, inventory,
           providers, crew, discoveryState, serverSettings, versionInfo, providerTemplates] = await Promise.all([
      getJson("/admin/metrics").catch(() => ({ data: [] })),
      getJson("/admin/sessions").catch(() => ({ data: [], count: 0 })),
      getJson("/admin/nodes/telemetry").catch(() => null),
      getJson("/admin/runs").catch(() => ({ data: [], count: 0 })),
      getJson("/admin/sync/jobs").catch(() => ({ data: [], count: 0 })),
      getJson("/admin/inventory").catch(() => null),
      getJson("/admin/providers").catch(() => ({ data: [] })),
      getJson("/admin/crew").catch(() => ({ data: [] })),
      fetch("/admin/discovery/state").then(r => r.json()).catch(() => ({ active: false })),
      getJson("/admin/settings").catch(() => null),
      getJson("/admin/version").catch(() => null),
      getJson("/admin/providers/templates").catch(() => ({ data: [] })),
    ]);
    if (serverSettings) state.server_settings = serverSettings;
    if (versionInfo) state.version_info = versionInfo;
    if (providerTemplates?.data) state.provider_templates = providerTemplates.data;
    state.cloud_providers = providers?.data || [];
    state.crew = crew?.data || [];
    state.discovery = discoveryState || { active: false };
    if (inventory) state.inventory = inventory;
    state.metrics = metrics?.data || [];
    state.downloads = [];
    state.sessions = sessions?.data || [];
    state.telemetry = telemetry;
    state.runs = runs?.data || [];
    state.sync_jobs = syncJobs?.data || [];
    render();
  } catch (e) { console.error("refresh:", e); }
}

// ─── Helpers tied to real telemetry/matrix ──────────────────────────
function clusterDefNodes(clusterId) {
  const nodes = state.cluster_defs?.[clusterId]?.nodes || [];
  return nodes
    .map((n, idx) => ({ ...n, rank: idx, host: n.host || n.id || "" }))
    .filter(n => n.host);
}

function clusterHostIds(clusterId) {
  return clusterDefNodes(clusterId).map(n => n.host);
}

function clusterFirstHost(clusterId) {
  return clusterHostIds(clusterId)[0] || "";
}

function hostTelemetry(hostId) {
  return (state.telemetry?.hosts || []).find(h => h.id === hostId) || null;
}

function clusterDisplaySub(clusterId, fallback) {
  const def = state.cluster_defs?.[clusterId];
  const hosts = clusterHostIds(clusterId);
  const backend = def?.backend || def?.kind || "";
  const label = hosts.length ? hosts.join(" · ") : fallback;
  return backend ? `${backend} · ${label}` : label;
}

function clusterMaxNodes(clusterId) {
  return Math.max(clusterHostIds(clusterId).length, 1);
}

function clusterOverlap(a, b) {
  const left = new Set(clusterHostIds(a));
  return clusterHostIds(b).filter(id => left.has(id));
}

function clusterTelemetry(clusterId) {
  const all = state.telemetry?.hosts || [];
  const ids = clusterHostIds(clusterId);
  return ids.map(id => all.find(h => h.id === id)).filter(Boolean);
}

function modelPresenceById(modelName) {
  if (!state.matrix) return {};
  const m = (state.matrix.models || []).find(x => x.name === modelName);
  return m ? (m.presence || {}) : {};
}

function gbBytes(b) { return b ? b / (1024**3) : 0; }

async function loadModelLists() {
  try {
    // Fan out a /models scan to every declared cluster in parallel, since
    // multiple clusters may share the same models_dir mount and the operator
    // wants the dropdowns populated for whichever tab they pick.
    const ids = CLUSTERS.map(c => c.id);
    if (ids.length === 0) return;
    const results = await Promise.all(
      ids.map(id => getJson(`/admin/clusters/${encodeURIComponent(id)}/models`)
                       .catch(() => ({ data: [] })))
    );
    for (let i = 0; i < ids.length; i++) {
      const id = ids[i];
      const r = results[i];
      state.cluster_models[id] = r?.data || [];
      if (r?.models_dir) state.cluster_models_dir[id] = r.models_dir;
    }
    // Back-compat alias for the currently-selected cluster.
    const sel = state.selected_cluster;
    if (sel) {
      state.default_models = state.cluster_models[sel] || [];
      state.default_models_dir = state.cluster_models_dir[sel] || state.default_models_dir;
    }
    render();
  } catch (e) { console.error("models:", e); }
}

// ─── Format helpers ─────────────────────────────────────────────────
function escapeHtml(s) {
  if (s == null) return "";
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

/**
 * Derive a short pool alias from a model path.
 *
 * Examples:
 *   'mlx-community/MiniMax-M2.7-8bit'                  → 'minimax'
 *   'inferencerlabs/Qwen3.5-397B-A17B-MLX-9bit'        → 'qwen3.5'
 *   'inferencerlabs/Qwen3-Coder-Next-MLX-9bit'         → 'qwen3'
 *   'GLM-5.1-8bit'                                     → 'glm'
 *   ''                                                  → ''
 *
 * Strips path prefix, then keeps leading letters + optional version
 * digits (matches the model "family" without the size/quant suffix).
 * Stops at the first dash / underscore so 'MiniMax-M2.7-8bit' becomes
 * 'minimax', not 'minimax-m2.7-8bit'. The API validator requires
 * /^[a-z0-9][a-z0-9_-]{0,30}$/ and refuses literal 'default'.
 */
function _aliasFromModel(modelPath) {
  if (!modelPath) return "";
  const base = String(modelPath).split("/").pop();
  const m = base.match(/^[A-Za-z]+[\d.]*/);
  let alias = (m ? m[0] : base).toLowerCase();
  alias = alias.replace(/\.+$/, "");           // trim trailing dot
  alias = alias.replace(/[^a-z0-9_-]/g, "");   // strip illegal chars
  if (!alias || alias === "default") alias = "pool";
  return alias.slice(0, 30);
}
function truncatePath(p, n) {
  if (!p) return "";
  if (p.length <= n) return p;
  return "…" + p.slice(p.length - n + 1);
}
function fmtSecs(s) {
  if (s == null) return "—";
  if (s < 60) return s.toFixed(0) + "s";
  if (s < 3600) return Math.floor(s/60) + "m " + Math.round(s%60) + "s";
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
  return h + "h " + (m < 10 ? "0"+m : m) + "m";
}
function fmtTime(t) {
  const d = new Date(t * 1000);
  return d.toLocaleTimeString("en-US", { hour12: false, hour: "2-digit", minute: "2-digit", second: "2-digit" });
}
function fmtBytes(b) {
  if (!b) return "—";
  if (b < 1024) return b + " B";
  if (b < 1024*1024) return (b/1024).toFixed(1) + " KB";
  if (b < 1024*1024*1024) return (b/(1024*1024)).toFixed(1) + " MB";
  return (b/(1024*1024*1024)).toFixed(1) + " GB";
}

let _toastTimer = null;
function toast(msg, kind) {
  const t = $("toast");
  if (!t) return;
  if (_toastTimer) { clearTimeout(_toastTimer); _toastTimer = null; }
  // Errors are PERSISTENT + copyable. A 2.4s auto-dismiss made load failures
  // (often multi-line tracebacks, e.g. a pool load) impossible to read or
  // copy. Build a readable card with Copy + Close; ok/info keep the pill.
  if (kind === "err") {
    t.innerHTML = "";
    const bar = document.createElement("div");
    bar.className = "toast-bar";
    const copyBtn = document.createElement("button");
    copyBtn.className = "toast-btn"; copyBtn.type = "button"; copyBtn.textContent = "Copy";
    copyBtn.onclick = () => _toastCopy(msg, copyBtn);
    const closeBtn = document.createElement("button");
    closeBtn.className = "toast-btn"; closeBtn.type = "button";
    closeBtn.setAttribute("aria-label", "Close"); closeBtn.textContent = "Close";
    closeBtn.onclick = () => { t.className = "toast"; t.innerHTML = ""; };
    bar.appendChild(copyBtn); bar.appendChild(closeBtn);
    const body = document.createElement("div");
    body.className = "toast-msg"; body.textContent = msg;
    t.appendChild(bar); t.appendChild(body);
    t.className = "toast show err persistent";
  } else {
    t.textContent = msg;
    t.className = "toast show" + (kind ? " " + kind : "");
    _toastTimer = setTimeout(() => { t.className = "toast"; }, 2400);
  }
}
// Self-contained copy for the error card — does NOT call toast() (that would
// replace the very error the user is trying to copy). Feedback goes in the
// button label. Uses the hidden-textarea path that works over plain HTTP LAN.
function _toastCopy(text, btn) {
  let ok = false;
  try {
    const ta = document.createElement("textarea");
    ta.value = text; ta.setAttribute("readonly", "");
    ta.style.position = "fixed"; ta.style.top = "-1000px"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select(); ta.setSelectionRange(0, ta.value.length);
    ok = document.execCommand("copy");
    document.body.removeChild(ta);
  } catch (e) { ok = false; }
  if (btn) { btn.textContent = ok ? "Copied" : "Copy failed"; setTimeout(() => { btn.textContent = "Copy"; }, 1300); }
}

// Clipboard with a fallback. `navigator.clipboard` only exists in a
// secure context (HTTPS or localhost). The dashboard is usually served
// over plain HTTP on a LAN IP (http://192.168.x.x:8000), where
// navigator.clipboard is undefined — so every copy button failed with
// "undefined is not an object". Fall back to a hidden-textarea +
// execCommand("copy"), which works in non-secure contexts.
function copyToClipboard(text) {
  const okToast = () => toast("copied", "ok");
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(okToast).catch(() => fallbackCopy(text));
    return;
  }
  fallbackCopy(text);
}
function fallbackCopy(text) {
  try {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.setAttribute("readonly", "");
    ta.style.position = "fixed";
    ta.style.top = "-1000px";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    ta.setSelectionRange(0, ta.value.length);
    const ok = document.execCommand("copy");
    document.body.removeChild(ta);
    toast(ok ? "copied" : "copy failed", ok ? "ok" : "err");
  } catch (e) {
    toast("copy failed: " + (e && e.message ? e.message : e), "err");
  }
}

// ─── Cluster identity helpers ───────────────────────────────────────
// Populated from GET /admin/clusters at startup. Operators declare their
// clusters in topology.yaml — the dashboard renders one tab per declared
// cluster. The `id` field is whatever the operator chose; the rest of
// the JS routes URLs and state lookups through that id.
let CLUSTERS = [];

function clusterState(id) {
  return (state.cluster_status || {})[id] || null;
}

function pickCluster(id) {
  state.selected_cluster = id;
  localStorage.setItem('odyssai-cluster', id);
  // Sync the back-compat aliases that the cluster-card renderers read from
  // (renderArgoCard reads `state.default`, etc.). Without this, the render
  // below would show the PREVIOUS cluster's status until the next 5s poll
  // tick — Sophie reported seeing the Telemak load form on the Argo tab
  // for ~5s and vice versa. The polling refresh at line ~1136 keeps the
  // same shape ; we just mirror it here for immediacy. Data is already
  // cached from the prior poll, so no network round-trip needed.
  const cached = (state.cluster_status || {})[id] || null;
  state.default = cached;
  state.default_models_dir = cached?.models_dir
    || state.cluster_models_dir?.[id]
    || "";
  state.default_models = state.cluster_models?.[id] || [];
  // If the user is following Runner logs, switch them to the new cluster too —
  // keeps the bottom panels in sync with the top picker. If logs were stopped,
  // leave them stopped (don't auto-start).
  if (_logsES) _startLogs(id);
  render();
}

// ─── Render ─────────────────────────────────────────────────────────
function render() {
  // Preserve logs-pane scroll position before the page redraws.
  // If the user was at the bottom (within 30 px), keep them at the bottom on
  // the new pane (tail-f behaviour). Otherwise, restore the exact scrollTop
  // so they can read older lines without being yanked back.
  let savedLogsScroll = null;
  const oldPane = $("logs-pane");
  if (oldPane) {
    const atBottom = (oldPane.scrollHeight - oldPane.scrollTop - oldPane.clientHeight) < 30;
    savedLogsScroll = { atBottom, scrollTop: oldPane.scrollTop };
  }

  // Preserve page-level scroll position across the innerHTML wipe. Without
  // this, every render() (template apply, alias add, polling refresh)
  // snaps the user back to the top — destroys flow in long settings panels.
  // Explicit scrollIntoView() calls fired post-render (e.g. on +Add provider)
  // override this restore because they run after the layout commits.
  const savedScrollY = window.scrollY || document.documentElement.scrollTop || 0;
  // Also preserve scroll inside the settings modal if it has its own
  // scrollable body — the modal is fixed-position so its body has
  // independent overflow.
  const settingsBody = document.querySelector('.settings-body');
  const savedSettingsScroll = settingsBody ? settingsBody.scrollTop : null;
  // Generic scroll-preservation: any element marked with data-scroll-key
  // has its scrollTop captured before render and restored after. Used for
  // nested scrollable panels (cluster editor body, models matrix card)
  // that the 5-second polling render would otherwise yank back to top.
  const savedScrollKeys = {};
  document.querySelectorAll('[data-scroll-key]').forEach(el => {
    savedScrollKeys[el.dataset.scrollKey] = el.scrollTop;
  });

  // Preserve focus + cursor across the innerHTML wipe. Without this,
  // typing in inputs whose handler calls render() (e.g. the load-form
  // alias field) destroys the <input> on every keystroke, focus is
  // lost, and the user can only type one character at a time before
  // having to click back. Match the input by (data-act, name, type)
  // tuple — id-less inputs are still uniquely identified by their
  // action label inside a section. selectionStart/End preserve the
  // cursor position so word-mid edits don't jump to the end.
  const _focusActive = document.activeElement;
  let savedFocus = null;
  if (_focusActive && (_focusActive.tagName === "INPUT" || _focusActive.tagName === "TEXTAREA")
      && _focusActive.dataset && _focusActive.dataset.act) {
    savedFocus = {
      act: _focusActive.dataset.act,
      idx: _focusActive.dataset.idx || null,
      field: _focusActive.dataset.field || null,
      selStart: _focusActive.selectionStart,
      selEnd: _focusActive.selectionEnd,
    };
  }

  $("root").innerHTML = `
    <div class="stage">
      ${renderHeader()}
      ${renderRibbon()}
      <div class="main">
        ${renderClusterCard()}
        ${renderActiveRuns()}
        ${renderRunnerLogs()}
        ${renderRecentActivity()}
        ${renderFooter()}
      </div>
      ${state.settings_open ? renderSettings() : ""}
    </div>
  `;
  attachHandlers();

  // Restore focus + cursor in inputs after the innerHTML wipe. Without
  // this, typing in any input whose change handler calls render() loses
  // focus on every keystroke (the alias field on the load form was the
  // observed case — see comment above the savedFocus capture).
  if (savedFocus) {
    let selector = `[data-act="${CSS.escape(savedFocus.act)}"]`;
    if (savedFocus.idx !== null) selector += `[data-idx="${CSS.escape(savedFocus.idx)}"]`;
    if (savedFocus.field !== null) selector += `[data-field="${CSS.escape(savedFocus.field)}"]`;
    const target = document.querySelector(selector);
    if (target && (target.tagName === "INPUT" || target.tagName === "TEXTAREA")) {
      target.focus();
      if (savedFocus.selStart !== null && savedFocus.selEnd !== null) {
        try { target.setSelectionRange(savedFocus.selStart, savedFocus.selEnd); }
        catch (e) { /* unsupported input types (number, email) silently no-op */ }
      }
    }
  }

  const newPane = $("logs-pane");
  if (newPane) {
    if (savedLogsScroll) {
      newPane.scrollTop = savedLogsScroll.atBottom ? newPane.scrollHeight : savedLogsScroll.scrollTop;
    } else {
      // First render: pin to bottom (newest)
      newPane.scrollTop = newPane.scrollHeight;
    }
  }

  // Restore the page-level + settings-modal scroll positions captured before
  // the wipe. Done synchronously so users don't see a flash at the top.
  if (savedScrollY) {
    window.scrollTo(0, savedScrollY);
  }
  // Restore in rAF so layout has computed scroll dimensions — without this,
  // setting scrollTop on a freshly-created element with overflow:auto can be
  // clamped to 0 if scrollHeight wasn't yet resolved.
  const restoreAll = () => {
    if (savedSettingsScroll !== null) {
      const sb = document.querySelector('.settings-body');
      if (sb) sb.scrollTop = savedSettingsScroll;
    }
    Object.entries(savedScrollKeys).forEach(([key, top]) => {
      const el = document.querySelector(`[data-scroll-key="${key}"]`);
      if (el) el.scrollTop = top;
    });
  };
  // Sync (immediate) + async (post-layout) — covers both fast and slow cases.
  restoreAll();
  requestAnimationFrame(restoreAll);
}

// Minimal Markdown → HTML transform. Handles : headers, paragraphs, fenced
// code blocks, inline code, bold, italics, links, bullet lists, numbered
// lists, tables, hr, blockquotes. Good enough for the user guide; not a
// full CommonMark renderer. Output is reasonably escaped against XSS for
// content origin-controlled by the operator (user-guide .md files).
function mdToHtml(md) {
  if (!md) return "";
  // Normalize line endings + strip BOM.
  let src = md.replace(/^﻿/, "").replace(/\r\n?/g, "\n");

  // Extract fenced code blocks first to protect their content.
  const fences = [];
  src = src.replace(/```([\w-]*)\n([\s\S]*?)\n```/g, (m, lang, code) => {
    fences.push({ lang, code });
    return `␀FENCE${fences.length - 1}␀`;
  });

  // Escape HTML on the rest.
  src = src.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

  // Tables (simple pipe tables).
  src = src.replace(
    /^\|(.+)\|\n\|([\s|:-]+)\|\n((?:\|.*\|\n?)+)/gm,
    (m, header, sep, rows) => {
      const hCells = header.split("|").map(c => c.trim()).filter(Boolean);
      const rowsHtml = rows
        .trim()
        .split("\n")
        .map(r => r.split("|").map(c => c.trim()).filter(Boolean))
        .map(cells => `<tr>${cells.map(c => `<td>${c}</td>`).join("")}</tr>`)
        .join("");
      return `<table><thead><tr>${hCells.map(c => `<th>${c}</th>`).join("")}</tr></thead><tbody>${rowsHtml}</tbody></table>`;
    },
  );

  // Headers.
  src = src.replace(/^###### (.+)$/gm, "<h6>$1</h6>");
  src = src.replace(/^##### (.+)$/gm, "<h5>$1</h5>");
  src = src.replace(/^#### (.+)$/gm, "<h4>$1</h4>");
  src = src.replace(/^### (.+)$/gm, "<h3>$1</h3>");
  src = src.replace(/^## (.+)$/gm, "<h2>$1</h2>");
  src = src.replace(/^# (.+)$/gm, "<h1>$1</h1>");

  // Horizontal rule.
  src = src.replace(/^---$/gm, "<hr>");

  // Blockquotes.
  src = src.replace(/^&gt; (.+)$/gm, "<blockquote>$1</blockquote>");

  // Lists. Bulleted first (- or *).
  src = src.replace(/(^- .+(?:\n- .+)*)/gm, m => {
    const items = m.split(/\n/).map(l => `<li>${l.replace(/^- /, "")}</li>`).join("");
    return `<ul>${items}</ul>`;
  });
  // Numbered.
  src = src.replace(/(^\d+\. .+(?:\n\d+\. .+)*)/gm, m => {
    const items = m.split(/\n/).map(l => `<li>${l.replace(/^\d+\. /, "")}</li>`).join("");
    return `<ol>${items}</ol>`;
  });

  // Inline code.
  src = src.replace(/`([^`\n]+)`/g, "<code>$1</code>");

  // Bold + italic.
  src = src.replace(/\*\*([^*\n]+)\*\*/g, "<strong>$1</strong>");
  src = src.replace(/(?:^|[^*])\*([^*\n]+)\*/g, (m, c) => m.replace(`*${c}*`, `<em>${c}</em>`));

  // Wiki-style links [[path]] → italicised (no real target in this UI).
  src = src.replace(/\[\[([^\]|]+)\|?([^\]]*)\]\]/g, (m, target, label) => `<em>${label || target}</em>`);

  // Standard links.
  src = src.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // Paragraphs : wrap line-blocks separated by blank lines.
  src = src
    .split(/\n{2,}/)
    .map(block => {
      const trimmed = block.trim();
      if (!trimmed) return "";
      if (/^<(h\d|ul|ol|blockquote|table|pre|hr|␀FENCE)/i.test(trimmed)) {
        return trimmed;
      }
      return `<p>${trimmed.replace(/\n/g, "<br>")}</p>`;
    })
    .join("\n");

  // Restore fenced code.
  src = src.replace(/␀FENCE(\d+)␀/g, (m, idx) => {
    const { lang, code } = fences[Number(idx)];
    const escaped = code.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    return `<pre><code class="lang-${lang}">${escaped}</code></pre>`;
  });

  return src;
}

// ─── Settings: Endpoints ──────────────────────────────────────────
// Generates copy-paste client configs from the live /v1/models list,
// so the model ids + cluster labels are real (no placeholders to guess).
async function loadEndpointModels() {
  if (state.endpoint_models_loaded) return;
  try {
    const j = await getJson("/v1/models");
    state.endpoint_models = (j && j.data) ? j.data : [];
    state.endpoint_models_loaded = true;
    // Default the snippet model to the first servable entry.
    if (!state.endpoint_model && state.endpoint_models.length > 0) {
      state.endpoint_model = state.endpoint_models[0].id;
    }
    render();
  } catch (e) {
    state.endpoint_error = String(e && e.message ? e.message : e);
    state.endpoint_models_loaded = true;
    render();
  }
}

// Default base URL = however the operator reached this dashboard, + /v1.
// Editable so they can publish a different public-facing URL in the snippet.
function endpointBaseUrl() {
  if (state.endpoint_base_url != null) return state.endpoint_base_url;
  let origin = "http://localhost:8000";
  try { if (window.location && window.location.origin) origin = window.location.origin; } catch (e) {}
  return origin.replace(/\/+$/, "") + "/v1";
}

// Friendly label for a model entry (cluster_label when present).
function endpointModelLabel(m) {
  const cap = (m && m.x_odyssai) || {};
  if (cap.cluster_label && cap.family) return cap.cluster_label + " — " + cap.family;
  if (cap.cluster_label) return cap.cluster_label;
  return m.id;
}

// Config file path shown above the snippet (null for env-var-only clients).
function endpointConfigPath(clientId) {
  if (clientId === "opencode")  return "~/.config/opencode/opencode.json";
  if (clientId === "continue")  return "~/.continue/config.yaml";
  if (clientId === "hermes")    return "~/.hermes/config.yaml";
  return null; // curl + anthropic are env-var based, no file
}

// Build the recipe body for the selected client. Formats verified against
// each client's official docs (2026-05). The model id + base URL are
// interpolated from the live config.
function endpointRecipe(clientId, ctx) {
  const { baseUrl, baseUrlNoV1, model, label } = ctx;

  if (clientId === "curl") {
    return {
      body:
`# OpenAI-compatible — works with any OpenAI SDK or tool.
# No key needed on a LAN install; pass any non-empty value.
export OPENAI_BASE_URL="${baseUrl}"
export OPENAI_API_KEY="dummy"

curl "${baseUrl}/chat/completions" \\
  -H "Content-Type: application/json" \\
  -d '{
    "model": "${model}",
    "messages": [{"role": "user", "content": "Hello from OdyssAI-X"}]
  }'`,
    };
  }

  if (clientId === "opencode") {
    return {
      body:
`{
  "$schema": "https://opencode.ai/config.json",
  "provider": {
    "odyssai-x": {
      "npm": "@ai-sdk/openai-compatible",
      "name": "OdyssAI-X",
      "options": {
        "baseURL": "${baseUrl}",
        "apiKey": "dummy"
      },
      "models": {
        "${model}": { "name": "${label}" }
      }
    }
  }
}`,
    };
  }

  if (clientId === "continue") {
    return {
      body:
`name: OdyssAI-X
version: 1.0.0
schema: v1
models:
  - name: ${label}
    provider: openai
    model: ${model}
    apiBase: ${baseUrl}
    apiKey: dummy
    roles:
      - chat
      - edit
      - apply`,
    };
  }

  if (clientId === "anthropic") {
    return {
      body:
`# OdyssAI-X speaks the Anthropic Messages API (/v1/messages +
# /v1/messages/count_tokens), so Claude Code and the Anthropic SDK
# both work. Point them at the base WITHOUT the /v1 suffix:
export ANTHROPIC_BASE_URL="${baseUrlNoV1}"
export ANTHROPIC_AUTH_TOKEN="dummy"   # sent as Authorization: Bearer
export ANTHROPIC_MODEL="${model}"

# Then just run \`claude\`, or hit it directly:
curl "${baseUrlNoV1}/v1/messages" \\
  -H "content-type: application/json" \\
  -H "anthropic-version: 2023-06-01" \\
  -d '{
    "model": "${model}",
    "max_tokens": 256,
    "messages": [{"role": "user", "content": "Hello from OdyssAI-X"}]
  }'`,
    };
  }

  if (clientId === "hermes") {
    return {
      body:
`model:
  provider: odyssai
  base_url: ${baseUrl}
  default: ${model}`,
    };
  }

  return { body: "Unknown client." };
}

function renderSettingsEndpoints() {
  if (!state.endpoint_models_loaded) {
    return `<div class="empty-state">Loading servable models…</div>`;
  }
  const models = state.endpoint_models || [];
  const baseUrl = endpointBaseUrl();
  const baseUrlNoV1 = baseUrl.replace(/\/v1\/?$/, "");

  if (models.length === 0) {
    return `
      <div style="display:flex;flex-direction:column;gap:16px">
        <div class="empty-state">
          No servable models yet. Load a model on a cluster (Settings → Models)
          or check that a Telemak / cloud upstream is reachable, then reopen this tab.
        </div>
        ${state.endpoint_error ? `<div style="color:var(--red);font-size:12px;font-family:var(--font-mono)">${escapeHtml(state.endpoint_error)}</div>` : ""}
      </div>`;
  }

  // Pick model: keep selection valid against the live list.
  let model = state.endpoint_model;
  if (!model || !models.some(m => m.id === model)) model = models[0].id;
  const picked = models.find(m => m.id === model) || models[0];
  const label = endpointModelLabel(picked);

  const ctx = { baseUrl, baseUrlNoV1, model, label };
  const client = state.endpoint_client || "opencode";
  const recipe = endpointRecipe(client, ctx);

  const pathLine = endpointConfigPath(client);

  return `
    <div style="display:flex;flex-direction:column;gap:18px">

      <div style="font-size:13px;color:var(--ink-2);line-height:1.6;max-width:640px">
        Connect any OpenAI- or Anthropic-compatible client. Pick a model and a
        client below — the snippet is generated from your live config (real
        model id, real base URL) and ready to paste.
      </div>

      <!-- Base URL + model picker, side by side -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div style="display:flex;flex-direction:column;gap:6px">
          <div class="field-label">Base URL</div>
          <input class="ce-input mono" value="${escapeHtml(baseUrl)}"
                 data-act="endpoint-base-url" style="width:100%" />
        </div>
        <div style="display:flex;flex-direction:column;gap:6px">
          <div class="field-label">Model</div>
          <select class="ce-input mono" data-act="endpoint-pick-model" style="width:100%">
            ${models.map(m => `<option value="${escapeHtml(m.id)}" ${m.id === model ? "selected" : ""}>${escapeHtml(endpointModelLabel(m))}</option>`).join("")}
          </select>
        </div>
      </div>

      <!-- Client tabs -->
      <div class="settings-tabs" style="padding:0;border-bottom:1px solid var(--line)">
        ${ENDPOINT_CLIENTS.map(c => `<button class="${c.id === client ? "active" : ""}" data-act="endpoint-pick-client" data-v="${c.id}">${c.label}</button>`).join("")}
      </div>

      <!-- Config file path + snippet -->
      <div style="display:flex;flex-direction:column;gap:8px">
        ${pathLine ? `
          <div style="display:flex;align-items:center;gap:8px;font-size:12px">
            <span style="color:var(--ink-3)">Config file:</span>
            <code style="color:var(--ink)">${escapeHtml(pathLine)}</code>
            <button class="btn btn-xs" data-act="endpoint-copy" data-v="${escapeHtml(pathLine)}">Copy path</button>
          </div>` : ""}

        <div style="position:relative">
