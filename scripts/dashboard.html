// ─── SSE log stream ─────────────────────────────────────────────────
let _logsES = null;
function _stopLogs() { if (_logsES) { try { _logsES.close(); } catch(e){} _logsES = null; } }
function _startLogs(cluster) {
  _stopLogs();
  state.logs = [];
  state.logs_cluster = cluster;
  _logsES = new EventSource(appendTokenQuery(`/admin/logs?cluster=${cluster}&follow=true&tail=100`));
  _logsES.onmessage = (ev) => {
    try {
      const line = JSON.parse(ev.data);
      state.logs.push(line);
      if (state.logs.length > 300) state.logs.splice(0, state.logs.length - 300);
      const pane = $("logs-pane");
      if (pane) {
        // Tail-f only when user is already at the bottom; otherwise leave
        // their scroll position alone so they can read backlog.
        const atBottom = (pane.scrollHeight - pane.scrollTop - pane.clientHeight) < 30;
        pane.innerHTML = state.logs.map(l => `
          <div class="log-line">
            <div class="ts">${fmtTime(l.ts)}</div>
            <div class="rank r${l.rank}">r${l.rank}</div>
            <div class="text">${escapeHtml(l.text)}</div>
          </div>
        `).join("");
        if (atBottom) pane.scrollTop = pane.scrollHeight;
      }
    } catch (e) { console.warn("bad log line", e); }
  };
  _logsES.onerror = (e) => { console.warn("logs error", e); };
}

// ─── Handlers ───────────────────────────────────────────────────────
function attachHandlers() {
  document.querySelectorAll("[data-act]").forEach(el => {
    el.removeEventListener("click", handleAct);
    el.addEventListener("click", handleAct);
    if (el.tagName === "INPUT" || el.tagName === "SELECT") {
      el.removeEventListener("change", handleAct);
      el.removeEventListener("input", handleAct);
      el.addEventListener("change", handleAct);
      el.addEventListener("input", handleAct);
    }
  });
}

async function handleAct(e) {
  const el = e.currentTarget;
  const act = el.dataset.act;
  const v = el.dataset.v;
  const f = state.pending_form;

  // Any interaction with a form control (dropdown / text input / checkbox)
  // marks recent activity so the 5 s background poll defers its full-DOM
  // re-render. Without this, a poll landing mid-selection wipes the
  // picker via innerHTML and the choice silently reverts — the user had
  // to retry 2-3× (reported 2026-05-30, on every picker incl. Telemak).
  // We mark it HERE, before any early-returning handler, so it covers
  // selects/inputs uniformly. (The button-based form controls — mode /
  // node pills / KV toggle — keep their own marker further down.)
  if (el.tagName === "INPUT" || el.tagName === "SELECT") {
    state.form_interaction_at = Date.now();
  }

  // Pick cluster
  if (act === "pick-cluster") { pickCluster(el.dataset.cluster); return; }
  if (act === "add-cluster")  { state.settings_open = true; state.settings_tab = "clusters"; render(); return; }
  if (act === "settings")     { state.settings_open = true; render(); return; }
  if (act === "cluster-settings") {
    state.settings_open = true;
    state.settings_tab = "clusters";
    state.settings_selected_cluster = el.dataset.cluster;
    render(); return;
  }
  if (act === "default-max-nodes") {
    const newMax = parseInt(v);
    if (!Number.isFinite(newMax) || newMax < 1 || newMax > 4) return;
    try {
      const r = await fetch(`/admin/clusters/${encodeURIComponent(state.selected_cluster)}`, {
        method: "PUT", headers: { "content-type": "application/json" },
        body: JSON.stringify({ max_nodes: newMax }),
      });
      if (!r.ok) { const t = await r.text(); throw new Error(t.slice(0, 200)); }
      toast(`${state.selected_cluster} pool now ${newMax} node${newMax>1?"s":""}`, "ok");
      refreshAll();
    } catch (err) { toast("update failed: " + err.message, "err"); }
    return;
  }

  // ── Cluster editor (draft-based) ──────────────────────────────────────
  if (act === "cluster-edit-name") {
    const cid = el.dataset.cluster;
    const d = ensureDraft(cid); if (!d) return;
    d.name = el.value;
    // Update state on every `input` (keystroke) but only re-render on
    // `change` (blur) — re-rendering on every keystroke would kill the
    // cursor since the <input> gets recreated. The blur-time render
    // flips the dirty state so the Save button appears.
    if (e.type === "change") render();
    return;
  }
  if (act === "cluster-edit-kind") {
    const cid = el.dataset.cluster;
    const d = ensureDraft(cid); if (!d) return;
    d.kind = el.value;
    // Coerce backend to a valid option for this kind
    const validBackends = ["jaccl", "ring"];
    if (!validBackends.includes(d.backend)) d.backend = validBackends[0];
    render(); return;
  }
  if (act === "cluster-edit-backend") {
    const cid = el.dataset.cluster;
    const d = ensureDraft(cid); if (!d) return;
    d.backend = el.value;
    render(); return;
  }
  if (act === "cluster-edit-upstream") {
    const cid = el.dataset.cluster;
    const d = ensureDraft(cid); if (!d) return;
    d.upstream = (el.value || "").trim();
    if (e.type === "change") render();
    return;
  }
  if (act === "cluster-edit-telemak-ssh") {
    const cid = el.dataset.cluster;
    const d = ensureDraft(cid); if (!d) return;
    // Telemak: single node, hand-edited ssh on the master entry.
    if (!Array.isArray(d.nodes) || d.nodes.length === 0) {
      d.nodes = [{host: cid, ssh: "", master: true}];
    }
    d.nodes[0].ssh = (el.value || "").trim();
    if (e.type === "change") render();
    return;
  }
  if (act === "cluster-edit-models-dir") {
    const cid = el.dataset.cluster;
    const d = ensureDraft(cid); if (!d) return;
    // Cluster-level models_dir — a SINGLE shared path for every node in the
    // cluster (all Argo ranks read from the same path). Used by HF download
    // destination, the Models matrix inventory lookup, and Telemak's card.
    // Persisted via PUT /admin/clusters/{id} (body.models_dir, same backend
    // handler as POST /admin/clusters/{id}/models-dir).
    d.models_dir = (el.value || "").trim();
    if (e.type === "change") render();
    return;
  }
  if (act === "cluster-set-master") {
    const cid = el.dataset.cluster;
    const idx = parseInt(el.dataset.idx);
    const d = ensureDraft(cid); if (!d) return;
    (d.nodes || []).forEach((n, i) => { n.master = (i === idx); });
    render(); return;
  }
  if (act === "cluster-edit-ssh") {
    const cid = el.dataset.cluster;
    const idx = parseInt(el.dataset.idx);
    const d = ensureDraft(cid); if (!d) return;
    if (d.nodes && d.nodes[idx]) d.nodes[idx].ssh = el.value;
    // No re-render on `input` (keystroke) — recreating the <input>
    // would kill the cursor. Re-render on `change` (blur) so the
    // Save button appears.
    if (e.type === "change") render();
    return;
  }
  if (act === "cluster-edit-port") {
    const cid = el.dataset.cluster;
    const idx = parseInt(el.dataset.idx);
    const d = ensureDraft(cid); if (!d) return;
    const p = parseInt(el.value);
    if (Number.isFinite(p) && d.nodes && d.nodes[idx]) d.nodes[idx].port = p;
    return;
  }
  if (act === "cluster-remove-node") {
    const cid = el.dataset.cluster;
    const idx = parseInt(el.dataset.idx);
    const d = ensureDraft(cid); if (!d) return;
    if (!d.nodes || d.nodes.length <= 1) return;
    const removed = d.nodes.splice(idx, 1)[0];
    // If we removed the master, promote the new first node
    if (removed?.master && d.nodes.length) {
      d.nodes.forEach((n, i) => { n.master = (i === 0); });
    }
    render(); return;
  }
  if (act === "cluster-add-node") {
    const cid = el.dataset.cluster;
    const hostId = el.value;
    if (!hostId) return;
    const d = ensureDraft(cid); if (!d) return;
    const inv = (state.inventory?.hosts || []).find(h => h.id === hostId);
    if (!inv) return;
    if ((d.nodes || []).some(n => n.host === hostId)) return;
    if (!d.nodes) d.nodes = [];
    const newNode = { host: hostId, ssh: inv.ssh, master: d.nodes.length === 0 };
    d.nodes.push(newNode);
    render(); return;
  }
  if (act === "cluster-discard") {
    const cid = el.dataset.cluster;
    discardDraft(cid);
    if (state.cluster_save_err) state.cluster_save_err[cid] = null;
    render(); return;
  }
  if (act === "cluster-toggle-enabled") {
    const cid = el.dataset.cluster;
    const cfg = state.cluster_defs?.[cid];
    if (!cfg) return;
    const next = !(cfg.enabled !== false);
    try {
      const r = await fetch(`/admin/clusters/${encodeURIComponent(cid)}`, {
        method: "PUT",
        headers: { "content-type": "application/json", ...authHeaders() },
        body: JSON.stringify({ enabled: next }),
      });
      if (!r.ok) { const t = await r.text(); throw new Error(t.slice(0, 300)); }
      const saved = await r.json();
      state.cluster_defs[cid] = saved;
      toast(`${cid} ${next ? 'enabled' : 'disabled'}`, "ok");
      render();
    } catch (err) {
      toast(`Toggle failed: ${err.message || err}`, "err");
    }
    return;
  }
  if (act === "cluster-save") {
    const cid = el.dataset.cluster;
    const d = state.cluster_draft?.[cid];
    if (!d) return;
    state.cluster_save_busy[cid] = true;
    state.cluster_save_err[cid] = null;
    render();
    try {
      const body = {
        name: d.name, kind: d.kind, backend: d.backend,
        nodes: (d.nodes || []).map(n => {
          const out = { host: n.host, ssh: n.ssh, master: !!n.master };
          if (n.port != null) out.port = n.port;
          return out;
        }),
        // `enabled` is intentionally omitted — Optional[bool]=None means the
        // backend doesn't touch the persisted value. The dedicated
        // Enable/Disable button is the only path to flip it.
      };
      // kind=telemak: include the http-proxy upstream URL.
      if (d.kind === "telemak" && d.upstream !== undefined) {
        body.upstream = d.upstream;
      }
      // models_dir is editable for all cluster kinds; backend persists via
      // POST /admin/clusters/{id}/models-dir under the hood (same handler).
      if (d.models_dir !== undefined) {
        body.models_dir = d.models_dir;
      }
      const r = await fetch(`/admin/clusters/${encodeURIComponent(cid)}`, {
        method: "PUT", headers: { "content-type": "application/json" },
        body: JSON.stringify(body),
      });
      if (!r.ok) { const t = await r.text(); throw new Error(t.slice(0, 300)); }
      const saved = await r.json();
      state.cluster_defs[cid] = saved;
      discardDraft(cid);
      toast(`${cid} saved`, "ok");
      refreshAll();
    } catch (err) {
      state.cluster_save_err[cid] = err.message || String(err);
      toast(`Save failed: ${err.message}`, "err");
    } finally {
      state.cluster_save_busy[cid] = false;
      render();
    }
    return;
  }

  // ── Cloud providers handlers ──────────────────────────────────────────
  if (act === "provider-new") {
    // Generic blank draft. User picks the id + api_base (OpenRouter, OpenAI,
    // local LAN service, anything OpenAI-compatible). No more pre-filled
    // OpenRouter — that's just one option among many. Templates panel in
    // the form gives one-click presets without locking the user in.
    state.providers_draft = {
      id: "", api_base: "",
      published: [], _pending_key: "", api_key_set: false,
      enabled: true, protocol: "openai",
    };
    state.providers_test_result = null;
    state.providers_upstream = [];
    render();
    // After render, scroll the new draft box into view. requestAnimationFrame
    // guarantees the DOM is committed; `block: 'center'` keeps the form
    // visible without slamming the user at the bottom of the page.
    requestAnimationFrame(() => {
      const el = document.getElementById('provider-draft-anchor');
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
    return;
  }
  if (act === "provider-apply-template") {
    const tid = el.dataset.id;
    const t = (state.provider_templates || []).find(x => x.id === tid);
    const d = state.providers_draft;
    if (!t || !d) return;
    // Only overwrite fields that the template actually defines. Preserve
    // user edits to id (if they already typed one), and never wipe a key.
    if (t.api_base) d.api_base = t.api_base;
    if (t.protocol) d.protocol = t.protocol;
    if (t.api_key_env) d.api_key_env = t.api_key_env;
    if (!d.id) d.id = t.id;
    if (t.api_key_env) d._show_advanced = true;
    // Pre-fill published aliases from the template, but never wipe aliases
    // the user already added. Deep-clone so the user can edit without
    // mutating the cached template list.
    if (Array.isArray(t.default_aliases) && t.default_aliases.length > 0
        && (!d.published || d.published.length === 0)) {
      d.published = JSON.parse(JSON.stringify(t.default_aliases));
    }
    render(); return;
  }
  if (act === "provider-toggle-enabled") {
    const id = el.dataset.id;
    const p = state.cloud_providers.find(x => x.id === id);
    if (!p) return;
    const next = !(p.enabled !== false);
    try {
      const r = await fetch(`/admin/providers/${encodeURIComponent(id)}`, {
        method: "PUT",
        headers: { "content-type": "application/json", ...authHeaders() },
        body: JSON.stringify({ enabled: next }),
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      p.enabled = next;
      render();
    } catch (e) {
      alert(`Failed to toggle: ${e.message || e}`);
    }
    return;
  }
  if (act === "provider-edit") {
    const id = el.dataset.id;
    const p = state.cloud_providers.find(x => x.id === id);
    if (!p) return;
    state.providers_draft = JSON.parse(JSON.stringify(p));
    state.providers_draft._pending_key = "";  // user must re-type to change
    state.providers_test_result = null;
    state.providers_upstream = [];
    render(); return;
  }
  if (act === "provider-toggle-advanced") {
    const d = state.providers_draft; if (!d) return;
    d._show_advanced = !d._show_advanced;
    render(); return;
  }
  if (act === "provider-clear-key") {
    const d = state.providers_draft; if (!d) return;
    if (!confirm("Remove the stored API key for this provider? Inference via this provider will stop working until you set a new one.")) return;
    d._clear_key = true;
    d._pending_key = "";
    d.api_key_set = false;
    render(); return;
  }
  if (act === "provider-discard") {
    state.providers_draft = null;
    state.providers_test_result = null;
    state.providers_upstream = [];
    render(); return;
  }
  if (act === "provider-edit-field") {
    const d = state.providers_draft; if (!d) return;
    const f = el.dataset.field;
    if (f === "api_key") {
      d._pending_key = el.value;
      return;
    }
    d[f] = el.value;
    return;  // no re-render on every keystroke
  }
  if (act === "provider-alias-add") {
    const d = state.providers_draft; if (!d) return;
    d.published = d.published || [];
    d.published.push({ alias: "", upstream: "",
                       caps: { context_length: null, supports_tools: false, supports_vision: false } });
    render(); return;
  }
  if (act === "provider-alias-remove") {
    const d = state.providers_draft; if (!d) return;
    const idx = parseInt(el.dataset.idx);
    if (d.published && d.published[idx]) d.published.splice(idx, 1);
    render(); return;
  }
  if (act === "provider-alias-field") {
    const d = state.providers_draft; if (!d) return;
    const idx = parseInt(el.dataset.idx);
    const f = el.dataset.field;
    if (d.published && d.published[idx]) d.published[idx][f] = el.value;
    return;
  }
  if (act === "provider-alias-caps") {
    const d = state.providers_draft; if (!d) return;
    const idx = parseInt(el.dataset.idx);
    const f = el.dataset.field;
    const entry = d.published?.[idx]; if (!entry) return;
    entry.caps = entry.caps || {};
    if (f === "context_length") {
      const v = parseInt(el.value);
      entry.caps.context_length = Number.isFinite(v) ? v : null;
    } else {
      entry.caps[f] = el.checked;
    }
    return;
  }
  if (act === "provider-add-upstream") {
    const d = state.providers_draft; if (!d) return;
    const up = el.dataset.upstream;
    if (!up) return;
    const provPrefix = d.id ? d.id.split("_")[0].slice(0, 4) : "p";
    const shortName = up.split("/").pop().slice(0, 32);
    d.published = d.published || [];
    d.published.push({
      alias: `${provPrefix}:${shortName}`,
      upstream: up,
      caps: { context_length: null, supports_tools: true, supports_vision: false }
    });
    render(); return;
  }
  if (act === "provider-save") {
    const d = state.providers_draft; if (!d) return;
    if (!d.id || !d.api_base) {
      toast("Provider id and API base URL are required", "err"); return;
    }
    const body = {
      api_base: d.api_base,
      published: d.published || [],
    };
    if (d.api_key_env !== undefined) body.api_key_env = d.api_key_env || "";
    // Only send api_key if the user actually typed something new
    if (d._pending_key && d._pending_key.trim()) body.api_key = d._pending_key.trim();
    if (d._clear_key) body.clear_api_key = true;
    if (d.protocol) body.protocol = d.protocol;
    try {
      const r = await fetch(`/admin/providers/${encodeURIComponent(d.id)}`, {
        method: "PUT",
        headers: { "content-type": "application/json", ...authHeaders() },
        body: JSON.stringify(body),
      });
      if (r.status === 401) { handleUnauthorized(); return; }
      if (!r.ok) { const t = await r.text(); throw new Error(t.slice(0, 200)); }
      toast(`Provider ${d.id} saved`, "ok");
      state.providers_draft = null;
      state.providers_test_result = null;
      refreshAll();
    } catch (err) { toast("save failed: " + err.message, "err"); }
    return;
  }
  if (act === "provider-delete") {
    const id = el.dataset.id;
    if (!confirm(`Remove cloud provider "${id}"? Aliases will stop resolving but the API key env stays.`)) return;
    try {
      await delJson(`/admin/providers/${encodeURIComponent(id)}`);
      toast(`Provider ${id} removed`, "ok");
      refreshAll();
    } catch (err) { toast("delete failed: " + err.message, "err"); }
    return;
  }
  // ── Crew handlers ─────────────────────────────────────────────────────
  if (act === "crew-enable-discovery") {
    try {
      await postJson("/admin/discovery/enable", {});
      toast("Discovery gate opened — Companion can now pair", "ok");
      setTimeout(refreshAll, 300);
    } catch (err) { toast("enable failed: " + err.message, "err"); }
    return;
  }
  if (act === "crew-disable-discovery") {
    try {
      await postJson("/admin/discovery/disable");
      toast("Discovery gate closed", "ok");
      setTimeout(refreshAll, 300);
    } catch (err) { toast("disable failed: " + err.message, "err"); }
    return;
  }
  if (act === "crew-revoke") {
    const id = el.dataset.id;
    if (!confirm(`Revoke this companion? Its crew token will stop working immediately and it will need to re-pair.`)) return;
    try {
      await delJson(`/admin/crew/${encodeURIComponent(id)}`);
      toast("Revoked", "ok");
      refreshAll();
    } catch (err) { toast("revoke failed: " + err.message, "err"); }
    return;
  }

  if (act === "provider-test") {
    const id = el.dataset.id;
    try {
      const r = await postJson(`/admin/providers/${encodeURIComponent(id)}/test`);
      // Open in edit mode so the result is visible alongside aliases
      const p = state.cloud_providers.find(x => x.id === id);
      if (p) {
        state.providers_draft = JSON.parse(JSON.stringify(p));
        state.providers_test_result = r;
        // Also fetch upstream models for the picker
        try {
          const u = await getJson(`/admin/providers/${encodeURIComponent(id)}/upstream-models`);
          state.providers_upstream = u.data || [];
        } catch (e) { state.providers_upstream = []; }
        render();
      } else {
        toast(r.ok ? `${id} reachable (${r.models_count} models)` : `${id} test failed: ${r.error || 'unknown'}`,
              r.ok ? "ok" : "err");
      }
    } catch (err) { toast("test failed: " + err.message, "err"); }
    return;
  }

  if (act === "node-reboot") {
    const hostId = el.dataset.host;
    if (!hostId) return;
    if (!confirm(`Reboot ${hostId}? In-flight inferences on this host will fail. The host will be unreachable for ~90 s.`)) return;
    try {
      const r = await postJson(`/admin/nodes/${encodeURIComponent(hostId)}/reboot`);
      if (r.method === "failed") {
        toast(`reboot failed: ${r.error || "no method worked"}`, "err");
      } else {
        toast(`${hostId} rebooting via ${r.method}…`, "ok");
      }
    } catch (err) { toast("reboot failed: " + err.message, "err"); }
    return;
  }
  if (act === "cluster-reboot-all") {
    const cid = el.dataset.cluster;
    if (!cid) return;
    if (!confirm(`Reboot ALL nodes of cluster ${cid}? Active sessions on these hosts will fail. Cluster will be unreachable for ~90 s.`)) return;
    try {
      const r = await postJson(`/admin/clusters/${encodeURIComponent(cid)}/reboot-all`);
      const ok = (r.results || []).filter(x => x.method !== "failed").length;
      const ko = (r.results || []).filter(x => x.method === "failed").length;
      toast(`${ok} reboots issued${ko?", "+ko+" failed":""}`, ko ? "err" : "ok");
    } catch (err) { toast("reboot-all failed: " + err.message, "err"); }
    return;
  }
  if (act === "cluster-reset") {
    const cid = el.dataset.cluster;
    if (!cid) return;
    if (!confirm(`Run the recovery ladder for ${cid}?\n\nThis will: cancel runs → stop pool → sweep orphan runners → verify wired memory → clear degraded flag.\n\nNo reboot needed — Macs stay up.`)) return;
    try {
      const r = await postJson(`/admin/clusters/${encodeURIComponent(cid)}/reset`, {});
      const ok = r.cleared === true;
      const ladder = (r.steps || []).map(s => `${s.ok ? "✓" : "✗"} ${s.name}`).join(" · ");
      if (ok) {
        toast(`${cid} reset clean — ${ladder}`, "ok");
      } else {
        toast(`${cid} still degraded — ${ladder}. Reboot may be needed.`, "err");
      }
      await refreshAll();
    } catch (err) { toast(`${cid} reset failed: ${err.message}`, "err"); }
    return;
  }
  if (act === "manage-models"){ state.settings_open = true; state.settings_tab = "models"; fetchMatrix(false); render(); return; }
  if (act === "refresh")      { await refreshAll(); await loadModelLists(); toast("refreshed", "ok"); return; }

  // Settings modal
  if (act === "settings-close" || act === "settings-backdrop") { state.settings_open = false; render(); return; }
  if (act === "settings-tab") {
    state.settings_tab = v;
    if (v === "models" && !state.matrix && !state.matrix_loading) fetchMatrix(false);
    if (v === "userguide" && !state.userguide_topics_loaded) loadUserGuideTopics();
    if (v === "endpoints" && !state.endpoint_models_loaded) loadEndpointModels();
    render(); return;
  }
  if (act === "userguide-pick") {
    loadUserGuideBody(el.dataset.slug);
    return;
  }
  if (act === "general-toggle-thinking") {
    const next = !!el.checked;
    try {
      const r = await fetch("/admin/settings", {
        method: "PUT",
        headers: { "content-type": "application/json", ...authHeaders() },
        body: JSON.stringify({ enable_thinking_default: next }),
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      state.server_settings = await r.json();
      toast(`enable_thinking default → ${next ? 'ON' : 'OFF'}`, "ok");
      render();
    } catch (e) {
      toast(`Save failed: ${e.message}`, "err");
    }
    return;
  }
  if (act === "general-set-ttl") {
    const ttl = Math.max(0, parseInt(el.value, 10) || 0);
    try {
      const r = await fetch("/admin/settings", {
        method: "PUT",
        headers: { "content-type": "application/json", ...authHeaders() },
        body: JSON.stringify({ pool_ttl_seconds_default: ttl }),
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      state.server_settings = await r.json();
      toast(`Pool TTL → ${ttl}s ${ttl === 0 ? '(disabled)' : ''}`, "ok");
    } catch (e) {
      toast(`Save failed: ${e.message}`, "err");
    }
    return;
  }
  if (act === "general-toggle-kv-q8") {
    const next = !!el.checked;
    try {
      const r = await fetch("/admin/settings", {
        method: "PUT",
        headers: { "content-type": "application/json", ...authHeaders() },
        body: JSON.stringify({ kv_q8_default: next }),
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      state.server_settings = await r.json();
      toast(`Default Q8 KV cache → ${next ? 'ON' : 'OFF'}`, "ok");
      render();
    } catch (e) {
      toast(`Save failed: ${e.message}`, "err");
    }
    return;
  }
  if (act === "general-set-prefix") {
    // Debounced save on blur — typing in a textarea shouldn't fire a server
    // call per keystroke. The browser fires `change` on blur which is what
    // delegated handlers will see for non-button inputs.
    const text = el.value || "";
    try {
      const r = await fetch("/admin/settings", {
        method: "PUT",
        headers: { "content-type": "application/json", ...authHeaders() },
        body: JSON.stringify({ system_prefix_text: text }),
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      state.server_settings = await r.json();
      const tokensApprox = Math.ceil(text.length / 4);
      toast(text.trim()
        ? `Prefix saved (~${tokensApprox} tok). Auto-prewarming on loaded pools…`
        : `Prefix cleared — prewarm disabled`, "ok");
    } catch (e) {
      toast(`Save failed: ${e.message}`, "err");
    }
    return;
  }
  if (act === "general-prewarm-now") {
    // Re-prewarm whichever clusters are currently loaded. The server already
    // has the saved prefix text; we just trigger the prewarm command.
    const pools = ["default", "nautilus"];
    const loaded = pools.filter(c => state[c]?.loaded);
    if (loaded.length === 0) {
      toast("No pool is loaded — load a model first", "err");
      return;
    }
    try {
      for (const c of loaded) {
        const r = await fetch(`/admin/${c}/prewarm`, {
          method: "POST",
          headers: { "content-type": "application/json", ...authHeaders() },
          body: JSON.stringify({}),
        });
        const j = await r.json().catch(() => ({}));
        if (j.ok) {
          const res = j.result || {};
          const tok = res.tokens || 0;
          const sec = res.elapsed_s != null ? res.elapsed_s.toFixed(1) : "?";
          toast(`${c}: prewarmed ${tok} tok in ${sec}s`, "ok");
        } else {
          toast(`${c}: prewarm failed — ${j.error || "unknown"}`, "err");
        }
      }
    } catch (e) {
      toast(`Prewarm failed: ${e.message}`, "err");
    }
    return;
  }
  if (act === "server-restart") {
    if (!confirm("Restart OdyssAI-X server? Active streams will drop. Container restart policy brings it back in ~5s.")) return;
    try {
      const r = await fetch("/admin/restart", {
        method: "POST",
        headers: { "content-type": "application/json", ...authHeaders() },
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      toast("Restart scheduled — back in ~5s", "ok");
      // Reload after a short delay to pick up the fresh server.
      setTimeout(() => location.reload(), 5000);
    } catch (e) {
      toast(`Restart failed: ${e.message}`, "err");
    }
    return;
  }
  if (act === "settings-pick-cluster") { state.settings_selected_cluster = v; if (state.pending_form) state.pending_form.default_targets = {}; render(); return; }
  if (act === "settings-add-cluster") { toast("Add cluster — editor wiring next iteration", "err"); return; }

  // ── Add Telemak — register an http-proxy cluster from the dashboard ──
  if (act === "settings-add-telemak") {
    state.telemak_form = { open: true, id: "", label: "", upstream: "", ssh: "", error: null, busy: false };
    render(); return;
  }
  if (act === "telemak-cancel") {
    state.telemak_form = null;
    render(); return;
  }
  if (act === "telemak-edit-id") {
    if (!state.telemak_form) return;
    state.telemak_form.id = (el.value || "").toLowerCase().replace(/[^a-z0-9-]/g, "");
    state.telemak_form.error = null;
    if (e.type === "change") render();
    return;
  }
  if (act === "telemak-edit-label") {
    if (!state.telemak_form) return;
    state.telemak_form.label = el.value || "";
    if (e.type === "change") render();
    return;
  }
  if (act === "telemak-edit-upstream") {
    if (!state.telemak_form) return;
    state.telemak_form.upstream = (el.value || "").trim();
    state.telemak_form.error = null;
    if (e.type === "change") render();
    return;
  }
  if (act === "telemak-edit-ssh") {
    if (!state.telemak_form) return;
    state.telemak_form.ssh = (el.value || "").trim();
    if (e.type === "change") render();
    return;
  }
  if (act === "telemak-create") {
    const f = state.telemak_form;
    if (!f) return;
    f.busy = true; f.error = null;
    render();
    try {
      const body = {
        name: f.label.trim(),
        kind: "telemak",
        backend: "http-proxy",
        upstream: f.upstream,
        nodes: [{ host: f.id, ssh: f.ssh, master: true }],
      };
      const r = await fetch(`/admin/clusters/${encodeURIComponent(f.id)}`, {
        method: "PUT", headers: { "content-type": "application/json" },
        body: JSON.stringify(body),
      });
      if (!r.ok) {
        const t = await r.text();
        throw new Error(t.slice(0, 300));
      }
      const newId = f.id;
      state.telemak_form = null;
      state.settings_selected_cluster = newId;
      toast(`Telemak '${newId}' added`, "ok");
      await refreshAll();
    } catch (err) {
      state.telemak_form.busy = false;
      state.telemak_form.error = err.message || String(err);
      toast(`Add failed: ${err.message}`, "err");
      render();
    }
    return;
  }

  // ── Telemak Home : Load / Unload model ──────────────────────────────────
  if (act === "telemak-load-edit-model") {
    const cid = el.dataset.cluster;
    if (!cid) return;
    if (!state.telemak_load_form) state.telemak_load_form = {};
    if (!state.telemak_load_form[cid]) state.telemak_load_form[cid] = {};
    state.telemak_load_form[cid].model = el.value || "";
    state.telemak_load_form[cid].error = null;
    if (e.type === "change") render();
    return;
  }
  if (act === "telemak-load-toggle") {
    // Toggle the "+ Load another model" inline form on the Home card
    // when one or more models are already loaded.
    const cid = el.dataset.cluster;
    if (!cid) return;
    if (!state.telemak_load_form) state.telemak_load_form = {};
    if (!state.telemak_load_form[cid]) state.telemak_load_form[cid] = {};
    state.telemak_load_form[cid].open = !state.telemak_load_form[cid].open;
    state.telemak_load_form[cid].error = null;
    render();
    return;
  }
  if (act === "telemak-load-cancel") {
    const cid = el.dataset.cluster;
    if (!cid) return;
    if (state.telemak_load_form?.[cid]) {
      state.telemak_load_form[cid].open = false;
      state.telemak_load_form[cid].error = null;
      render();
    }
    return;
  }
  if (act === "telemak-load-submit") {
    const cid = el.dataset.cluster;
    if (!cid) return;
    const f = state.telemak_load_form?.[cid] || {};
    const model = (f.model || "").trim();
    if (!model) { toast("Enter a model id first", "err"); return; }
    if (!state.busy_telemak_load) state.busy_telemak_load = {};
    state.busy_telemak_load[cid] = true;
    if (state.telemak_load_form) state.telemak_load_form[cid].error = null;
    render();
    try {
      const r = await fetch(`/admin/clusters/${encodeURIComponent(cid)}/load`, {
        method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ model }),
      });
      if (!r.ok) { const t = await r.text(); throw new Error(t.slice(0, 300)); }
      toast(`Loading ${model} on ${cid}…`, "ok");
      // Close the inline form on success so subsequent loads stay tidy.
      if (state.telemak_load_form?.[cid]) {
        state.telemak_load_form[cid].open = false;
        state.telemak_load_form[cid].model = "";
      }
      await refreshAll();
    } catch (err) {
      if (state.telemak_load_form) state.telemak_load_form[cid].error = err.message;
      toast(`Load failed: ${err.message}`, "err");
    } finally {
      state.busy_telemak_load[cid] = false;
      render();
    }
    return;
  }
  if (act === "telemak-load") {
    // One-click Load from the Models matrix row (Settings → Models).
    // Same upstream POST as telemak-load-submit, but the model id is
    // already known (it's the row the operator clicked on) — no form.
    const cid = el.dataset.cluster;
    const model = el.dataset.model;
    if (!cid || !model) return;
    try {
      const r = await fetch(`/admin/clusters/${encodeURIComponent(cid)}/load`, {
        method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ model }),
      });
      if (!r.ok) { const t = await r.text(); throw new Error(t.slice(0, 300)); }
      toast(`Loading ${model} on ${cid}…`, "ok");
      await refreshAll();
    } catch (err) {
      toast(`Load failed: ${err.message}`, "err");
    }
    return;
  }
  if (act === "telemak-unload") {
    const cid = el.dataset.cluster;
    if (!cid) return;
    // Per-row Unload sends data-model="<full-hf-id>"; legacy header
    // Unload (no row context) sends nothing and the server unloads all.
    const model = el.dataset.model || null;
    const what = model ? `model '${model}' on ${cid}` : `all models on ${cid}`;
    if (!confirm(`Unload ${what} ?`)) return;
    try {
      const r = await fetch(`/admin/clusters/${encodeURIComponent(cid)}/unload`, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify(model ? { model } : {}),
      });
      if (!r.ok) { const t = await r.text(); throw new Error(t.slice(0, 300)); }
      toast(model ? `Unloaded ${model} on ${cid}` : `Unloaded all on ${cid}`, "ok");
      await refreshAll();
    } catch (err) {
      toast(`Unload failed: ${err.message}`, "err");
    }
    return;
  }

  // ── Telemak service lifecycle (launchd over SSH) ────────────────────
  // Start / Stop / Restart / Quit the `eu.odyssai.telemak` launchd agent
  // on the node. Restart is the wedged-slot fix; Quit boots it out (stays
  // down). Both interrupt in-flight generation → confirm first.
  if (act === "telemak-lifecycle") {
    const cid = el.dataset.cluster;
    const action = el.dataset.life;
    if (!cid || !action) return;
    const blurb = {
      start: "Start the Telemak service",
      stop: "Stop Telemak (KeepAlive relaunches it shortly)",
      restart: "Restart Telemak — any generation in flight on this node is killed",
      quit: "Quit Telemak — it stays DOWN until you press Start",
    }[action] || action;
    if ((action === "restart" || action === "quit") &&
        !confirm(`${blurb}.\n\nProceed on ${cid} ?`)) return;
    try {
      const r = await fetch(`/admin/clusters/${encodeURIComponent(cid)}/telemak/lifecycle`, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ action }),
      });
      const j = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error((j && (j.detail || j.message)) || `HTTP ${r.status}`);
      if (j.ok) toast(`Telemak ${action} on ${cid} ✓`, "ok");
      else toast(`Telemak ${action}: rc=${j.rc} ${(j.stderr || "").slice(0, 140)}`, "err");
      // Give launchd a beat to settle, then re-poll status/health.
      setTimeout(() => { refreshAll(); }, 1500);
    } catch (err) {
      toast(`Telemak ${action} failed: ${err.message}`, "err");
    }
    return;
  }

  // ── Telemak Load configuration (rich swap form) ─────────────────────
  // Five tiny actions feed the swap dropdown on the Home card. The
  // dropdown options come from the cached state.telemak_available_models
  // which fetchTelemakAvailable populates on first render / on refresh.
  if (act === "telemak-config-select-model") {
    const cid = el.dataset.cluster;
    if (!cid) return;
    if (!state.telemak_load_config) state.telemak_load_config = {};
    if (!state.telemak_load_config[cid]) state.telemak_load_config[cid] = {};
    state.telemak_load_config[cid].model = el.value || "";
    render();
    return;
  }
  if (act === "telemak-config-select-mtp") {
    const cid = el.dataset.cluster;
    if (!cid) return;
    if (!state.telemak_load_config) state.telemak_load_config = {};
    if (!state.telemak_load_config[cid]) state.telemak_load_config[cid] = {};
    state.telemak_load_config[cid].mtp = el.value || "";
    render();
    return;
  }
  if (act === "telemak-config-toggle-kv-q8") {
    const cid = el.dataset.cluster;
    if (!cid) return;
    if (!state.telemak_load_config) state.telemak_load_config = {};
    if (!state.telemak_load_config[cid]) state.telemak_load_config[cid] = {};
    state.telemak_load_config[cid].kv_q8 = !!el.checked;
    // Don't re-render here — the checkbox is uncontrolled visually.
    return;
  }
  if (act === "telemak-config-refresh") {
    const cid = el.dataset.cluster;
    if (!cid) return;
    if (state.telemak_available_models) state.telemak_available_models[cid] = null;
    if (state.fetching_telemak_models) state.fetching_telemak_models[cid] = false;
    await fetchTelemakAvailable(cid);
    return;
  }
  if (act === "telemak-config-apply") {
    const cid = el.dataset.cluster;
    if (!cid) return;
    const cfg = state.telemak_load_config?.[cid];
    if (!cfg || !cfg.model) { toast("Pick a model first", "err"); return; }
    if (!state.busy_telemak_apply) state.busy_telemak_apply = {};
    state.busy_telemak_apply[cid] = true;
    render();
    try {
      // Get the currently-loaded list to know what to unload first.
      // We're doing a SWAP : unload everything currently loaded, then
      // load the chosen target (+ optional MTP draft).
      const status = state.cluster_status?.[cid];
      const currentlyLoaded = Array.isArray(status?.models_loaded) ? status.models_loaded : (status?.model ? [status.model] : []);
      for (const m of currentlyLoaded) {
        const u = await fetch(`/admin/clusters/${encodeURIComponent(cid)}/unload`, {
          method: "POST", headers: { "content-type": "application/json" },
          body: JSON.stringify({ model: m }),
        });
        if (!u.ok) {
          const t = await u.text();
          throw new Error(`unload ${m} failed: ${t.slice(0, 200)}`);
        }
      }
      // Then load the new target with optional draft. Telemak's
      // /admin/load accepts `draft_model` (paired MTP) per V2 Unit 3.
      const body = { model: cfg.model };
      if (cfg.mtp) body.draft_model = cfg.mtp;
      // KV cache Q8 toggle is captured in state but not yet wired to
      // a Telemak per-load knob — leaving it as a visual affordance
      // for V1.x parity with Argo. When Telemak exposes the setting
      // in /admin/load, add `cache_quantization: 8` here.
      const r = await fetch(`/admin/clusters/${encodeURIComponent(cid)}/load`, {
        method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify(body),
      });
      if (!r.ok) { const t = await r.text(); throw new Error(t.slice(0, 300)); }
      const short = (cfg.model.split("/").pop() || cfg.model);
      toast(`Swapped to ${short}${cfg.mtp ? " + MTP draft" : ""}…`, "ok");
      await refreshAll();
    } catch (err) {
      toast(`Apply failed: ${err.message}`, "err");
    } finally {
      state.busy_telemak_apply[cid] = false;
      render();
    }
    return;
  }
  if (act === "cluster-models-tab") {
    // Jump to the Models tab — same affordance as Argo's
    // "Manage models →" button at the top-right of its Load config.
    state.view = "models";
    render();
    return;
  }

  // ── Remove a cluster — works for any kind (DELETE /admin/clusters/{id}) ──
  if (act === "cluster-remove") {
    const cid = el.dataset.cluster;
    if (!cid) return;
    const def = clusterDef(cid);
    const niceName = def?.name || cid;
    if (!confirm(`Remove cluster '${niceName}'?\n\nThis unloads any running model and hides the cluster from the dashboard. Topology.yaml-declared clusters become tombstoned (re-add via UI to restore).`)) return;
    try {
      const r = await fetch(`/admin/clusters/${encodeURIComponent(cid)}`, { method: "DELETE" });
      if (!r.ok) {
        const t = await r.text();
        throw new Error(t.slice(0, 300));
      }
      discardDraft(cid);
      if (state.selected_cluster === cid) state.selected_cluster = null;
      if (state.settings_selected_cluster === cid) state.settings_selected_cluster = null;
      toast(`'${niceName}' removed`, "ok");
      await refreshAll();
    } catch (err) {
      toast(`Remove failed: ${err.message}`, "err");
    }
    return;
  }

  if (act === "matrix-refresh") { fetchMatrix(true); return; }
  if (act === "matrix-download-hf") { toast("HF download from settings — use Default card HF section for now", "err"); return; }
  if (act === "copy-curl") {
    copyToClipboard(v);
    return;
  }

  // ─── Endpoints tab ───────────────────────────────────────────────
  if (act === "endpoint-copy") {
    copyToClipboard(v);
    return;
  }
  if (act === "endpoint-base-url") {
    state.endpoint_base_url = el.value;
    // Only re-render on commit (blur/change), not on every keystroke,
    // so the input cursor doesn't jump while typing.
    if (e.type === "change") render();
    return;
  }
  if (act === "endpoint-pick-model") {
    state.endpoint_model = el.value;
    render();
    return;
  }
  if (act === "endpoint-pick-client") {
    state.endpoint_client = v;
    render();
    return;
  }

  // Form bindings
  // Mark form interaction so the periodic poll defers re-rendering for a
  // few seconds. The 5s poll wipes the DOM via `$("root").innerHTML = ...`
  // — if it lands mid-dropdown-open, the user's selection gets dropped and
  // the model picker visually reverts to the previous value.
  state.form_interaction_at = Date.now();
  if (act === "form-default-dir")  { state.default_models_dir = el.value; return; }
  if (act === "form-default-model"){
    // Both `change` and `input` fire on <select>; either gives us el.value.
    f.default_model = el.value;
    // Pull the authoritative load-options for the newly-picked model.
    fetchLoadOptions(state.selected_cluster, f.default_model);
    // Snap nodes to the smallest topology that fits the new model, but
    // only when the user hadn't manually overridden it (or when their
    // override won't fit anymore). Saves them from picking nodes=3 for
    // a 60 GB model on the 512 GB master where 1 node is plenty.
    const opt = optimalNodesForModel(state.selected_cluster, f.default_model);
    if (opt != null) {
      const cur = f.default_nodes;
      // Always re-snap when the user has the default 3 (never explicitly
      // chosen) OR when their current pick truly doesn't fit. We don't
      // override a perfectly-fitting manual pick.
      const curFits = computeFitCheck(state.selected_cluster, f.default_model, cur);
      if (!f.default_nodes_user_picked || curFits.fits === false) {
        f.default_nodes = opt;
      }
    }
    render();
    return;
  }
  if (act === "form-default-mode") { if (e.type==="click") { f.default_mode = v; render(); } return; }
  if (act === "form-default-ap")   { if (e.type==="click") { f.default_use_ap = !f.default_use_ap; render(); } return; }
  if (act === "form-default-kv-q8"){ if (e.type==="click") { f.default_kv_q8 = !f.default_kv_q8; render(); } return; }
  if (act === "form-default-nodes"){ if (e.type==="click") {
    f.default_nodes = parseInt(v);
    f.default_nodes_user_picked = true;  // respect this choice on next model change
    render();
  } return; }
  if (act === "form-hf-repo")   { f.hf_repo = el.value; return; }
  if (act === "hf-search-input") { state.hf_search_q = el.value; return; }
  if (act === "hf-search-go")   { await doHfSearch(); return; }
  if (act === "hf-search-pick") {
    if (!state.pending_form) state.pending_form = {};
    state.pending_form.hf_repo = el.dataset.v;
    toast("Repo set: " + el.dataset.v + " — pick a cluster + Download below", "ok");
    render(); return;
  }
  if (act === "form-hf-token")  {
    // Persist locally in localStorage so the operator doesn't have to
    // paste their HF token on every download. Token is never persisted
    // server-side; it's pulled out at submit time and sent fresh in the
    // /admin/downloads body. Saving on `change` (blur) — not `input` —
    // avoids re-renders that wipe the input cursor on every keystroke.
    if (e.type === "change") {
      const v = (el.value || "");
      // The placeholder "••••••••••saved" is what we render when a token
      // already exists. If the user blurs without typing a new value,
      // don't overwrite the stored token with bullets.
      if (v && !v.startsWith("•")) {
        try { localStorage.setItem("odyssai.hf_token", v); } catch {}
        f.hf_token_saved = true;
        render();
      } else if (!v) {
        // Empty input on blur clears the stored token (explicit reset).
        try { localStorage.removeItem("odyssai.hf_token"); } catch {}
        f.hf_token_saved = false;
        render();
      }
    }
    return;
  }
  if (act === "form-hf-target") {
    if (e.type === "click") {
      f.default_targets = f.default_targets || {};
      f.default_targets[v] = !f.default_targets[v];
      render();
    }
    return;
  }
  if (act === "hf-select-all") {
    const nodes = clusterTargetNodes(state.selected_cluster);
    f.default_targets = f.default_targets || {};
    const allOn = nodes.every(n => f.default_targets[n.host]);
    nodes.forEach(n => f.default_targets[n.host] = !allOn);
    render(); return;
  }

  // Default actions
  if (act === "default-load" || act === "default-evict-and-load") {
    const model = f.default_model || (state.default_models[0] && state.default_models[0].id);
    if (!model) { toast("no Default model available", "err"); return; }
    if (act === "default-evict-and-load") {
    }
    state.busy_default_load = true; render();
    try {
      const body = { model, mode: f.default_mode, use_ap: f.default_use_ap, nodes: f.default_nodes, kv_q8: f.default_kv_q8 };
      if (f.default_draft && f.default_draft.trim()) {
        body.draft_model = f.default_draft.trim();
        body.num_draft_tokens = f.default_num_draft || 4;
      }
      const r = await postJson(`/admin/clusters/${state.selected_cluster}/load`, body);
      toast(`Default ${r.nodes}-node loaded in ${r.load_s.toFixed(1)}s`, "ok");
    } catch(err) { toast("default load failed: " + err.message, "err"); }
    state.busy_default_load = false; refreshAll(); return;
  }
  if (act === "default-unload") {
    if (!confirm("Unload the Default model?")) return;
    try { await postJson(`/admin/clusters/${state.selected_cluster}/unload`); toast("Default unloaded", "ok"); }
    catch(err){ toast("unload failed: " + err.message, "err"); }
    refreshAll(); return;
  }
  if (act === "default-unload-alias") {
    const alias = el.dataset.alias;
    if (!alias) return;
    if (!confirm(`Unload Default pool '${alias}'?`)) return;
    try {
      await postJson(`/admin/clusters/${state.selected_cluster}/unload?alias=${encodeURIComponent(alias)}`);
      toast(`Default pool '${alias}' unloaded`, "ok");
    } catch(err) { toast(`unload ${alias} failed: ${err.message}`, "err"); }
    refreshAll(); return;
  }
  // ── Add-pool inline form ───────────────────────────────────────────
  if (act === "default-add-toggle") {
    f.default_add_open = !f.default_add_open;
    if (f.default_add_open) {
      // Suggest an alias derived from the selected model (e.g.
      // 'mlx-community/MiniMax-M2.7-8bit' → 'minimax'). Falls back
      // to 'pool-N' only when no model is picked yet.
      if (!f.default_add_alias) {
        const suggested = _aliasFromModel(f.default_add_model);
        if (suggested) {
          f.default_add_alias = suggested;
        } else {
          const pools = state.default?.pools || [];
          f.default_add_alias = `pool-${pools.length + 1}`;
        }
      }
    }
    state.form_interaction_at = Date.now();
    render(); return;
  }
  if (act === "form-default-add-alias") {
    f.default_add_alias = (el.value || "").trim().toLowerCase();
    // Mark as user-edited so picking a different model after this
    // won't clobber what the user typed.
    f.default_add_alias_edited = true;
    state.form_interaction_at = Date.now();
    render(); return;
  }
  if (act === "form-default-add-model") {
    f.default_add_model = el.value;
    // Auto-refresh the alias suggestion from the new model, unless the
    // user has already manually edited the alias field. Without this
    // the dashboard kept proposing the alphabetic 'pool-N' even after
    // the user picked a concrete model.
    if (!f.default_add_alias_edited) {
      const suggested = _aliasFromModel(f.default_add_model);
      if (suggested) f.default_add_alias = suggested;
    }
    state.form_interaction_at = Date.now();
    render(); return;
  }
  if (act === "default-add-idx") {
    const i = parseInt(el.dataset.v, 10);
    if (Number.isNaN(i)) return;
    f.default_add_indices = { ...f.default_add_indices, [i]: !f.default_add_indices[i] };
    state.form_interaction_at = Date.now();
    render(); return;
  }
  if (act === "default-add-submit") {
    const indices = Object.keys(f.default_add_indices || {})
      .filter(k => f.default_add_indices[k])
      .map(k => parseInt(k, 10));
    if (!f.default_add_alias || indices.length === 0 || !f.default_add_model) {
      toast("Pick an alias, model, and at least one node", "err");
      return;
    }
    // Immediate visual feedback — the load can take 30-60s and the
    // existing cluster-level "loading" banner only kicks in after the
    // first /admin/default/status poll (up to 5s). Setting the form's own
    // flag re-renders the button to "Loading…" + disabled right away.
    f.default_add_loading = true;
    render();
    try {
      const r = await postJson(`/admin/clusters/${state.selected_cluster}/load`, {
        alias: f.default_add_alias,
        model: f.default_add_model,
        node_indices: indices,
        mode: f.default_add_mode || "pipeline",
        use_ap: f.default_add_use_ap !== false,
        kv_q8: f.default_add_kv_q8,  // null → server default
        force: true,
      });
      toast(`Pool '${r.alias}' loaded on nodes ${r.node_indices.join(",")} (${r.load_s?.toFixed?.(1)}s)`, "ok");
      // Reset the form and hide
      f.default_add_open = false;
      f.default_add_alias = "";
      f.default_add_alias_edited = false;
      f.default_add_model = null;
      f.default_add_indices = {};
    } catch (err) {
      toast(`Load pool failed: ${err.message}`, "err");
    } finally {
      f.default_add_loading = false;
    }
    refreshAll();
    return;
  }
  if (act === "default-cancel") {
    try {
      const r = await postJson(`/admin/runs/cancel-all?cluster=${encodeURIComponent(state.selected_cluster)}`);
      toast(`Cancelled ${r.cancelled} ${state.selected_cluster} run${r.cancelled !== 1 ? "s" : ""}`,
            r.cancelled ? "ok" : "err");
    } catch (err) { toast("cancel failed: " + err.message, "err"); }
    return;
  }
  if (act === "default-hardreset") {
    if (!confirm("Hard reset Default (kill all runners + wipe state)?")) return;
    try { await postJson(`/admin/clusters/${state.selected_cluster}/unload`); toast("Default hard reset", "ok"); }
    catch(err){ toast("reset failed: " + err.message, "err"); }
    refreshAll(); return;
  }
  if (act === "rescan-default") {
    try {
      const r = await getJson(`/admin/clusters/${state.selected_cluster}/models` + (state.default_models_dir?`?dir=${encodeURIComponent(state.default_models_dir)}`:""));
      state.default_models = r?.data || [];
      if (r?.models_dir) state.default_models_dir = r.models_dir;
      render();
      toast(`Default: ${state.default_models.length} models at ${state.default_models_dir}`, "ok");
    } catch(err){ toast("rescan failed: " + err.message, "err"); }
    return;
  }



  // Logs
  if (act === "logs-follow") { _startLogs(v); render(); return; }
  if (act === "logs-stop")   { _stopLogs(); state.logs_cluster = null; render(); return; }

  // Activity filter
  if (act === "metrics-filter") { state.metrics_filter = v; render(); return; }

  // Active runs
  if (act === "cancel-all-runs") {
    if (!confirm("Cancel all active runs? Streaming clients will stop receiving tokens.")) return;
    try { const r = await postJson("/admin/runs/cancel-all"); toast(`Cancelled ${r.cancelled} run(s)`, "ok"); }
    catch (err) { toast("cancel-all failed: " + err.message, "err"); }
    refreshAll(); return;
  }
  if (act === "run-cancel") {
    const id = el.dataset.id;
    if (!id) return;
    try { await postJson(`/admin/runs/${encodeURIComponent(id)}/cancel`); toast("Cancel sent", "ok"); }
    catch (err) { toast("cancel failed: " + err.message, "err"); }
    refreshAll(); return;
  }

  // ─── Matrix tab ────────────────────────────────────────────────
  if (act === "matrix-group") {
    state.matrix_group = v;
    localStorage.setItem('odyssai-matrix-group', v);
    render(); return;
  }
  if (act === "matrix-cell-toggle") {
    if (state.delete_selected.has(v)) state.delete_selected.delete(v);
    else state.delete_selected.add(v);
    render(); return;
  }
  if (act === "matrix-cell-trash") {
    const host = el.dataset.host, model = el.dataset.model;
    if (!confirm(`Delete ${model} on ${host}? rm -rf on remote model_path.`)) return;
    try {
      await delJson(`/admin/sync/host/${encodeURIComponent(host)}/model/${encodeURIComponent(model)}`);
      toast(`${model} deleted on ${host}`, "ok");
      fetchMatrix(true);
    } catch (err) { toast("delete failed: " + err.message, "err"); }
    return;
  }
  if (act === "matrix-bulk-delete") {
    const items = [...state.delete_selected].map(s => { const [host, model] = s.split("::"); return { host, model }; });
    if (items.length === 0) return;
    if (!confirm(`Delete ${items.length} model cop${items.length>1?"ies":"y"}? This runs rm -rf on each host.`)) return;
    try {
      const r = await postJson("/admin/sync/bulk-delete", { items });
      toast(`Deleted ${r.deleted}/${r.results.length} copies`, r.deleted === r.results.length ? "ok" : "err");
      state.delete_selected.clear();
      fetchMatrix(true);
    } catch (err) { toast("bulk delete failed: " + err.message, "err"); }
    return;
  }
  if (act === "matrix-sync") {
    // v is the model name; open the picker pre-filled
    const modelName = v;
    const matrix = state.matrix;
    if (!matrix) { toast("matrix not loaded yet", "err"); return; }
    const mod = (matrix.models || []).find(m => m.name === modelName);
    const presentOn = mod?.present_on || [];
    const defaultSource = presentOn[0] || null;
    const targets = {};
    (matrix.hosts || []).forEach(h => {
      if (h.reachable && h.id !== defaultSource && !presentOn.includes(h.id)) targets[h.id] = true;
    });
    state.sync_picker = {
      open: true, model: modelName, presentOn,
      source: defaultSource, target_mode: "group",
      group: state.matrix_group !== "all" ? state.matrix_group : "default",
      targets,
    };
    render(); return;
  }
  if (act === "matrix-new-sync") {
    // Open picker with blank model — user picks source + types path
    state.sync_picker = {
      open: true, model: "", presentOn: [],
      source: null, target_mode: "group",
      group: state.matrix_group !== "all" ? state.matrix_group : "default",
      targets: {},
    };
    render(); return;
  }
  if (act === "sync-picker-close") { state.sync_picker = null; render(); return; }
  if (act === "sync-pick-source")  { if (!state.sync_picker) return; state.sync_picker.source = v; render(); return; }
  if (act === "sync-pick-source-sel") {
    if (!state.sync_picker) return;
    state.sync_picker.source = el.value;
    render(); return;
  }
  if (act === "sync-target-mode")  {
    if (!state.sync_picker) return;
    state.sync_picker.target_mode = v;
    render(); return;
  }
  if (act === "sync-target-group") {
    if (!state.sync_picker) return;
    state.sync_picker.group = el.value;
    render(); return;
  }
  if (act === "sync-pick-target")  {
    if (!state.sync_picker) return;
    state.sync_picker.targets = state.sync_picker.targets || {};
    state.sync_picker.targets[v] = !state.sync_picker.targets[v];
    render(); return;
  }
  if (act === "sync-path-input") {
    if (!state.sync_picker) return;
    state.sync_picker.model = el.value;
    return;  // no render — input update only
  }
  if (act === "sync-picker-start") {
    const p = state.sync_picker;
    if (!p?.source) { toast("pick a source host", "err"); return; }
    if (!p?.model || !p.model.trim()) { toast("model path required", "err"); return; }
    // Resolve effective targets
    let targets = [];
    if (p.target_mode === "group") {
      const ids = matrixGroupHostIds(p.group) || [];
      const hosts = state.matrix?.hosts || [];
      targets = ids.filter(id => id !== p.source && hosts.find(h => h.id === id)?.reachable);
    } else {
      targets = Object.entries(p.targets || {}).filter(([, on]) => on).map(([k]) => k);
    }
    if (targets.length === 0) { toast("no targets resolved", "err"); return; }
    try {
      const r = await postJson("/admin/sync/rsync", { model: p.model.trim(), source: p.source, targets });
      toast("Sync " + r.id + " started → " + targets.join(", "), "ok");
      state.sync_picker = null;
      refreshAll();
    } catch (err) { toast("sync failed: " + err.message, "err"); }
    return;
  }
  if (act === "sync-job-cancel") {
    if (!confirm("Cancel this sync job?")) return;
    try { await delJson("/admin/sync/jobs/" + el.dataset.id); toast("sync job cancelled", "ok"); }
    catch (err) { toast("cancel failed: " + err.message, "err"); }
    refreshAll(); return;
  }
  if (act === "sync-job-remove") {
    // Terminal job → same DELETE endpoint, which removes (not cancels) a finished one.
    try { await delJson("/admin/sync/jobs/" + el.dataset.id); }
    catch (err) { toast("remove failed: " + err.message, "err"); }
    refreshAll(); return;
  }
  if (act === "sync-job-retry") {
    try { const r = await postJson(`/admin/sync/jobs/${el.dataset.id}/retry`, {}); toast("retry started → " + r.id, "ok"); }
    catch (err) { toast("retry failed: " + err.message, "err"); }
    refreshAll(); return;
  }
  if (act === "sync-jobs-clear") {
    if (!confirm("Remove all finished/failed sync jobs from the list?")) return;
    try { const r = await postJson("/admin/sync/jobs/clear", {}); toast(`cleared ${(r.removed_active||0)+(r.removed_history||0)} job(s)`, "ok"); }
    catch (err) { toast("clear failed: " + err.message, "err"); }
    refreshAll(); return;
  }

  // HF download — multi-target via /admin/downloads. Targets are the
  // cluster nodes the user checked in the form. hf_token (if entered) is
  // sent so private/gated repos work.
  if (act === "dl-start") {
    if (!f.hf_repo || !f.hf_repo.includes("/")) { toast("repo must be org/name", "err"); return; }
    // Use the cluster the form was actually rendered for (Settings / matrix
    // view), NOT state.selected_cluster — that mismatch was the "Select at
    // least one node" bug when the form cluster ≠ the main-view cluster.
    const cluster = f.dl_cluster || state.selected_cluster || "default";
    const nodes = clusterTargetNodes(cluster);
    const tgtState = f.default_targets || {};
    const targets = nodes.filter(n => tgtState[n.host] === true).map(n => n.host);
    if (targets.length === 0) {
      toast("Select at least one node to download to", "err");
      return;
    }
    const body = { repo: f.hf_repo, targets };
    // Token resolution priority at submit time :
    //   1. A freshly-typed value in the input (anything not starting with •).
    //   2. The localStorage-persisted token (what the "saved" pip represents).
    // Sending nothing is valid — many HF repos are public. The token only
    // matters for gated / private repos.
    const tokenEl = document.querySelector('[data-act="form-hf-token"]');
    const typed = tokenEl?.value || "";
    if (typed && !typed.startsWith("•")) {
      body.hf_token = typed;
      try { localStorage.setItem("odyssai.hf_token", typed); } catch {}
    } else {
      try {
        const stored = localStorage.getItem("odyssai.hf_token");
        if (stored) body.hf_token = stored;
      } catch {}
    }
    try {
      const r = await postJson("/admin/downloads", body);
      toast(`download started on ${targets.length} node${targets.length>1?"s":""}: ${r.id}`, "ok");
    } catch(err) { toast("dl err: " + err.message, "err"); }
    refreshAll(); return;
  }
  if (act === "dl-cancel") {
    if (!confirm("Cancel download? Partial files are kept; click Resume to continue.")) return;
    try { await delJson("/admin/downloads/" + el.dataset.id); toast("cancelled", "ok"); }
    catch(err){ toast("err: " + err.message, "err"); }
    refreshAll(); return;
  }
  if (act === "dl-resume") {
    try {
      await postJson(`/admin/downloads/${el.dataset.id}/resume`, {});
      toast("resumed", "ok");
    } catch(err){ toast("resume failed: " + err.message, "err"); }
    refreshAll(); return;
  }
}

// ─── Boot ───────────────────────────────────────────────────────────
(async () => {
  await refreshAll();
  await loadModelLists();
  render();
  // Fire-and-forget: pull the sync matrix so the dry-run plan has real model sizes.
  // Cached server-side 60 s; cheap on repeat hits.
  fetchMatrix(false).catch(() => {});
})();

// Freeze auto-refresh while the user is editing a draft (provider, cluster,
// future modals). The 5s polling otherwise re-renders the whole DOM, which
// drops scroll position and steals input focus mid-typing.
//
// Once the user saves/discards, the next tick fires normally — saved state
// reaches the server immediately via PUT/POST, so we're not hiding fresh
// data, just deferring a cosmetic refresh.
function _isEditing() {
  // A provider draft is open (new or editing existing)
  if (state.providers_draft) return true;
  // A cluster draft has unsaved changes (cluster_draft is keyed by cluster id)
  const cd = state.cluster_draft || {};
  if (Object.values(cd).some(v => v && Object.keys(v).length > 0)) return true;
  // A native <select> (the model picker) or a text <input> is focused right
  // now — the user has the dropdown OPEN and is browsing/picking. The 8s
  // window below only starts on a `change` event (i.e. AFTER a pick), so it
  // never covered the open-but-not-yet-picked moment: a 5s poll landing then
  // re-renders via `$("root").innerHTML = ...`, collapsing the dropdown and
  // swallowing the click (#60 — single click never selects, list refreshes
  // mid-pick; the "add a second instance" picker has the same native select).
  // Defer for the WHOLE time a form control holds focus; the next blur lets
  // polling resume within one tick. (A model load disables the picker, so a
  // focused-but-disabled select can't stall load-progress refresh.)
  const _ae = document.activeElement;
  if (_ae && (_ae.tagName === "SELECT" || _ae.tagName === "INPUT")) {
    return true;
  }
  // Recent form interaction (model picker, node pills, mode toggle, KV checkbox).
  // Defer the polled re-render long enough that picking a model doesn't get
  // overwritten by a 5s poll landing mid-click. 8s is short enough that fresh
  // load progress shows up quickly, long enough to cover the "user opens the
  // dropdown, browses, picks an option" workflow without flapping.
  if (state.form_interaction_at &&
      Date.now() - state.form_interaction_at < 8000) {
    return true;
  }
  // The settings modal happens to be open and we're in a tab where draft
  // edits matter — be permissive here so we don't surprise the user.
  // Note: opening the settings modal alone doesn't freeze; only an active
  // draft does.
  return false;
}

let _pollHandle = null;
function _scheduleNextPoll() {
  const loading = state.default?.loading || state.busy_default_load;
  // Quick re-check (1s) while editing — so the freeze releases promptly
  // when the user clicks Save/Discard. Network call still skipped.
  const editing = _isEditing();
  const delay = editing ? 1000 : (loading ? 1000 : 5000);
  if (_pollHandle) clearTimeout(_pollHandle);
  _pollHandle = setTimeout(async () => {
    if (!_isEditing()) {
      await refreshAll();
    }
    _scheduleNextPoll();
  }, delay);
}
_scheduleNextPoll();
</script>
</body>
</html>
